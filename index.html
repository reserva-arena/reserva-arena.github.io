const fmtHoje=()=>{const d=new Date();return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;};
function isDiaLetivo(data){
  if(!data)return false;
  const[a,m,d]=data.split("-").map(Number);
  const dt=new Date(a,m-1,d),dow=dt.getDay();
  if(dow===0||dow===6)return false;
  if(NAO_LETIVOS.has(data))return false;
  if(data<"2026-01-19"||data>"2026-12-10")return false;
  return true;
}
function isDiaLetivoTurma(data,turma){
  if(!isDiaLetivo(data))return false;
  const a=parseInt(turma);
  if(a>=1&&a<=5&&NAO_LETIVOS_INICIAIS.has(data))return false;
  return true;
}
function diasLetivosAte(dataStr){
  const agora=new Date();
  const[a,m,d]=dataStr.split("-").map(Number);
  const alvo=new Date(a,m-1,d,7,10,0);
  let count=0;
  const cur=new Date(agora);cur.setHours(0,0,0,0);
  const fim=new Date(alvo);fim.setHours(0,0,0,0);
  while(cur<fim){
    const ds=`${cur.getFullYear()}-${String(cur.getMonth()+1).padStart(2,"0")}-${String(cur.getDate()).padStart(2,"0")}`;
    if(isDiaLetivo(ds))count++;
    cur.setDate(cur.getDate()+1);
  }
  return count;
}
function isUrgente(data,horario){
  try{
    const agora=new Date();
    const[a,m,d]=data.split("-").map(Number);
    const[h,mn]=horario.split(":").map(Number);
    const ev=new Date(a,m-1,d,h,mn);
    const diff=(ev-agora)/3600000;
    if(diff<=0)return false;
    if(diff<24)return true;
    const dow=agora.getDay(),hora=agora.getHours()+agora.getMinutes()/60;
    if((dow===5&&hora>=17||dow===6||dow===0&&hora<7)&&diasLetivosAte(data)<1)return true;
    if(isDiaLetivo(data)&&diasLetivosAte(data)<1)return true;
    return false;
  }catch{return false;}
}
function isDiaUrgente(data){

    if(isDiaLetivo(data)&&diasLetivosAte(data)<1)return true;
    return false;
  }catch{return false;}
}
function addDias(s,n){
  const[a,m,d]=s.split("-").map(Number);
  const dt=new Date(Date.UTC(a,m-1,d+n));
  return dt.toISOString().split("T")[0];
}

function inp(){const c=C();return`width:100%;padding:10px 12px;border-radius:8px;font-size:13.5px;border:1.5px solid ${c.inputBorder};background:${c.inputBg};color:${c.text};outline:none;box-sizing:border-box;font-family:inherit`;}

function btn(variant="primary",disabled=false,size="md"){
  const c=C();
  const VM={primary:{bg:c.blueMid,col:"#fff",b:c.blueMid},navy:{bg:c.navy,col:"#fff",b:c.navy},danger:{bg:"#dc2626",col:"#fff",b:"#dc2626"},success:{bg:"#1a6b47",col:"#fff",b:"#1a6b47"},ghost:{bg:"transparent",col:c.textMid,b:c.border},amber:{bg:"#d97706",col:"#fff",b:"#d97706"}};
  const v=VM[variant]||VM.primary;
  const P={sm:"5px 12px",md:"9px 18px",lg:"12px 24px"};
  const F={sm:"12",md:"13.5",lg:"14.5"};
  return`background:${disabled?"#cbd5e1":v.bg};color:${disabled?"#94a3b8":v.col};border:1.5px solid ${disabled?"#cbd5e1":v.b};border-radius:8px;font-weight:700;cursor:${disabled?"not-allowed":"pointer"};padding:${P[size]||P.md};font-size:${F[size]||F.md}px;font-family:inherit`;
}

function alertHTML(type,msg){const c=C();const cfg={error:{bg:c.redBg,b:c.redBorder,col:c.red},success:{bg:c.greenBg,b:c.greenBorder,col:c.green},warning:{bg:c.amberBg,b:c.amberBorder,col:c.amber}};const v=cfg[type]||cfg.error;return`<div style="background:${v.bg};border:1px solid ${v.b};border-radius:8px;padding:10px 14px;font-size:13px;color:${v.col};line-height:1.5;margin-bottom:12px">${msg}</div>`;}

// ─── CALENDÁRIO MENSAL (componente) ──────────────────────────────────────────
function calMensalHTML(cid,ano,mes,porData,dataSel){
  const c=C(),h=fmtHoje();
  const primeiroDia=new Date(Date.UTC(ano,mes,1));
  const diasNoMes=new Date(Date.UTC(ano,mes+1,0)).getUTCDate();
  const inicioGrid=primeiroDia.getUTCDay();
  const cells=[];for(let i=0;i<inicioGrid;i++)cells.push(null);for(let d=1;d<=diasNoMes;d++)cells.push(d);

  let dias="";
  cells.forEach((d,i)=>{
    if(!d){dias+=`<div></div>`;return;}
    const ds=`${ano}-${String(mes+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
    const isH=ds===h,isPast=ds<h,isSel=ds===dataSel,letivo=isDiaLetivo(ds);
    const dow=new Date(Date.UTC(ano,mes,d)).getUTCDay(),isFim=dow===0||dow===6;
    const nao=!letivo&&!isPast;
    const bg=isSel?"#40b07a":isH?"rgba(26,107,71,.12)":nao?"rgba(239,68,68,.08)":"transparent";
    const col=isSel?"#fff":isPast?"#cbd5e1":nao?"#fca5a5":isFim?"#ef4444":c.navy;
    const temRes=(porData[ds]||[]).length>0;
    dias+=`<button onclick="window._calClick('${cid}','${ds}')" ${isPast||!letivo?"disabled":""}
      style="aspect-ratio:1;border-radius:8px;border:none;cursor:${isPast||!letivo?"not-allowed":"pointer"};background:${bg};color:${col};font-weight:${isH||isSel?800:500};font-size:13.5px;position:relative;opacity:${isPast?.4:1};transition:all .15s;font-family:inherit">
      ${d}${temRes&&!isSel?`<div style="position:absolute;bottom:3px;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;background:#40b07a"></div>`:""}
    </button>`;
  });

  return`<div style="background:${c.surface};border-radius:16px;border:1px solid ${c.border};overflow:hidden">
    <div style="display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid ${c.border}">
      <button onclick="window._calNav('${cid}',-1)" style="background:none;border:1px solid ${c.border};border-radius:8px;width:34px;height:34px;cursor:pointer;color:${c.textMid};font-size:16px;font-family:inherit">‹</button>
      <div style="text-align:center"><p style="font-size:17px;font-weight:800;color:${c.navy}">${MESES[mes]}</p><p style="font-size:12px;color:${c.textMuted}">${ano}</p></div>
      <button onclick="window._calNav('${cid}',1)" style="background:none;border:1px solid ${c.border};border-radius:8px;width:34px;height:34px;cursor:pointer;color:${c.textMid};font-size:16px;font-family:inherit">›</button>
    </div>
    <div style="padding:12px 16px 16px">
      <div style="display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:6px">
        ${["D","S","T","Q","Q","S","S"].map((n,i)=>`<div style="text-align:center;font-size:10px;font-weight:700;color:${i===0||i===6?"#ef4444":c.textMuted};padding:4px 0">${n}</div>`).join("")}
      </div>
      <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px">${dias}</div>
    </div>
  </div>`;
}

function re(){
  const c=C();
  document.body.style.background=c.bg;

  if(!_usuario){renderPublica();return;}
  if(_usuario.perfil==="sem_acesso"||_usuario.ativo===false){renderSemAcesso();return;}
  if(_usuario.perfil==="fotografo"){renderFotografo();return;}
  renderApp();
}

window.fazerLogin=async()=>{
  const email=$("inp-email")?.value?.trim(),senha=$("inp-senha")?.value;
  if(!email||!senha){render("login-erro",alertHTML("error","Preencha e-mail e senha."));return;}

  catch{render("login-erro",alertHTML("error","E-mail ou senha inválidos."));}
};
window.recuperarSenha=async()=>{
  const email=$("inp-email")?.value?.trim();
  if(!email){render("login-erro",alertHTML("warning","Digite seu e-mail acima."));return;}
  try{await sendPasswordResetEmail(auth,email);render("login-erro",alertHTML("success",`Link enviado para ${email}`));}
  catch{render("login-erro",alertHTML("error","Erro ao enviar. Verifique o e-mail."));}
};

    const ehMeu=r=>r.professorId===_usuario?.uid||r.professor===_usuario?.nome;

    if(_P.modoVisu==="semana"){
      const dias=Array.from({length:5},(_,i)=>addDias(_P.semIni,i));
      const nomes=["Seg.","Ter.","Qua.","Qui.","Sex."];
      html+=`<div style="display:grid;grid-template-columns:repeat(5,minmax(100px,1fr));gap:4px;padding:8px;overflow-x:auto;-webkit-overflow-scrolling:touch;max-width:100%">`;
      dias.forEach((d,i)=>{
        const[,,dia]=d.split("-");const isH=d===h;
        const rsD=fonte.filter(r=>r.data===d).sort((a,b)=>a.horario>b.horario?1:-1);
        const naoL=!isDiaLetivo(d)&&d>=h&&new Date(d).getDay()!==0&&new Date(d).getDay()!==6;
        html+=`<div style="background:${isH?"rgba(26,107,71,.06)":naoL?"rgba(239,68,68,.04)":c.bg};border:1px solid ${isH?c.blueMid:c.borderLight};border-radius:10px;padding:10px 8px;min-height:80px;cursor:pointer" onclick="pClicarDia('${d}')">
          <div style="text-align:center;margin-bottom:6px">
            <p style="font-size:10px;font-weight:700;color:${naoL?"#ef4444":c.textMuted};text-transform:uppercase">${nomes[i]}</p>
            <p style="font-size:18px;font-weight:900;line-height:1;color:${isH?c.blueMid:naoL?"#ef4444":c.navy}">${dia}</p>
            ${naoL?`<p style="font-size:8px;color:#ef4444;font-weight:700">não letivo</p>`:""}
          </div>`;
        if(!rsD.length)html+=`<p style="font-size:9px;color:${c.textMuted};opacity:.5;text-align:center">-</p>`;
        else rsD.forEach(r=>{
          const isMeu=ehMeu(r),isPend=r.status==="pendente";
          html+=`<div style="background:${isMeu?"rgba(187,235,210,.65)":c.surface};border-radius:5px;padding:3px 5px;border:1px solid ${isMeu?"#40b07a":c.border};border-left:3px solid ${isMeu?"#1a6b47":"#cbd5e1"};margin-bottom:3px">
            <div style="display:flex;align-items:baseline;gap:3px">
              <p style="font-size:10px;font-weight:800;font-family:'DM Mono',monospace;color:${isMeu?c.green:"#64748b"}">${r.horario}</p>
              <p style="font-size:10px;font-weight:700;color:${c.navy};white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${r.espaco.split(" ")[0]}</p>
              ${isMeu&&isPend?`<span style="font-size:9px;color:${c.amber}">⏳</span>`:""}
              ${r.precisaFoto?`<span style="font-size:9px">📸</span>`:""}
              ${r.espaco==="Áudio/Visual"||r.localMontagem?`<span style="font-size:9px">🎙️</span>`:""}
            </div>
            <p style="font-size:9px;color:${c.textMuted};white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${r.turma}·${nomeProf(r.professor)}</p>
          </div>`;
        });
        html+=`</div>`;
      });
      html+=`</div><p style="font-size:10px;color:${c.textMuted};opacity:.7;text-align:right;padding:0 14px 10px">Clique no dia para detalhes</p>`;
    }

    if(_P.modoVisu==="mes"){
      const{a,m}=_P.mesCal;
      const porData={};fonte.forEach(r=>{if(!porData[r.data])porData[r.data]=[];porData[r.data].push(r);});
      html+=`<div style="padding:10px 12px">
        ${calMensalHTML("pmes",a,m,porData,_P.diaSel)}
      </div>`;
    }
  }

  if(_P.modoCard==="lista"){
    html+=`<div style="padding:14px">`;
    html+=`<div id="lista-futuras"></div>`;

    // ── Seção pendentes ──
    if(pendentes.length){
      html+=`<div data-filtro="pendente" style="margin-bottom:16px">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
          <div style="width:8px;height:8px;border-radius:50%;background:${c.amber}"></div>
          <p style="font-size:12px;font-weight:800;color:${c.amber};text-transform:uppercase">⏳ Pendentes · ${pendentes.length}</p>
          <div style="flex:1;height:1px;background:${c.amberBorder}"></div>
        </div>`;
      if(_P.filtroPendente){
        pendentes.sort((a,b)=>a.data>b.data?1:a.data<b.data?-1:a.horario>b.horario?1:-1).forEach(r=>{html+=profRRow(r);});
      } else {
        html+=`<div onclick="_P.filtroPendente=true;re()" style="background:${c.amberBg};border:1.5px solid ${c.amberBorder};border-radius:10px;padding:10px 14px;cursor:pointer;display:flex;align-items:center;justify-content:space-between">
          <p style="font-size:13px;font-weight:700;color:${c.amber}">${pendentes.length} agendamento${pendentes.length!==1?"s":""} aguardando aprovação</p>
          <span style="color:${c.amber};font-size:14px">▼ ver</span>
        </div>`;
      }
      html+=`</div>`;
    }

    // ── Seção futuras ──
    const futurasSemPend=futuras.filter(r=>r.status!=="pendente");
    if(!futurasSemPend.length&&!pendentes.length)html+=`<p style="text-align:center;color:${c.textMuted};padding:32px 0;font-size:13px">Nenhum agendamento futuro.</p>`;
    if(futurasSemPend.length){
      const porData={};futurasSemPend.sort((a,b)=>a.data>b.data?1:a.data<b.data?-1:a.horario>b.horario?1:-1).forEach(r=>{if(!porData[r.data])porData[r.data]=[];porData[r.data].push(r);});
      Object.entries(porData).forEach(([data,rs])=>{
        const[,mes,dia]=data.split("-");const isH=data===h;
        html+=`<div style="margin-bottom:14px"><div style="display:flex;align-items:center;gap:8px;margin-bottom:6px"><span style="font-size:11px;font-weight:700;color:${isH?c.green:c.textMid};background:${isH?c.greenBg:"transparent"};padding:${isH?"2px 8px":"0"};border-radius:${isH?20:0}px">${isH?"📌 Hoje":`${dia}/${mes}`}</span><div style="flex:1;height:1px;background:${c.borderLight}"></div></div>`;
        rs.forEach(r=>{html+=profRRow(r);});
        html+=`</div>`;
      });
    }
    if(passadas.length){
      html+=`<div style="margin-top:16px;border-top:1px solid ${c.borderLight};padding-top:12px">
        <button onclick="_P.mostrarHistorico=!_P.mostrarHistorico;re()" style="display:flex;align-items:center;gap:8px;background:none;border:none;cursor:pointer;font-family:inherit;width:100%;padding:4px 0">
          <span style="font-size:11px;font-weight:700;color:${c.textMuted};text-transform:uppercase">🕐 Histórico (${passadas.length})</span>
          <span style="font-size:12px;color:${c.textMuted}">${_P.mostrarHistorico?"▲ fechar":"▼ ver"}</span>
        </button>
        ${_P.mostrarHistorico?passadas.slice(0,10).map(r=>profRRow(r)).join(""):""}
      </div>`;
    }
    html+=`</div>`;
  }

  html+=`</div>`; // fim card
  html+=`</div>`;
  return html;
}

function profRRow(r){
  const c=C(),h=fmtHoje();
  const isMeu=r.professorId===_usuario?.uid;
  const isPend=r.status==="pendente";
  const bg=isMeu?(isPend?"rgba(255,237,213,.85)":"rgba(187,235,210,.6)"):c.surface;
  const bl=isMeu?(isPend?"#f97316":"#1a6b47"):"#e2e8f0";
  const ex=extraInfo(r);
  return`<div class="row-hover" style="display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:8px;background:${bg};border:1px solid ${c.border};margin-bottom:4px;border-left:4px solid ${bl}">
    <span style="font-size:13px;font-family:'DM Mono',monospace;font-weight:800;color:${isMeu?c.green:"#64748b"};min-width:42px;flex-shrink:0">${r.horario}</span>
    <div style="flex:1;min-width:0">
      <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:2px">
        <span style="font-weight:700;font-size:13px;color:${c.navy}">${r.espaco}</span>
        <span style="font-size:11px;color:${c.textMuted}">·</span>
        <span style="font-size:12px;color:${c.textMid}">${r.turma}</span>
        ${ex?`<span style="font-size:11px;background:#e2f4ea;color:#0f4c2b;border:1px solid #86efac;border-radius:6px;padding:1px 6px;font-weight:700">${ex}</span>`:""}
        <span style="font-size:11px;color:${isMeu?c.green:c.textMuted};background:${c.bg};padding:1px 8px;border-radius:10px;border:1px solid ${c.borderLight};font-weight:${isMeu?700:400}">${isMeu?"👤 eu":r.professor?.split(" ")[0]||""}</span>
      </div>
      <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
        ${isPend?`<span style="font-size:11.5px;font-weight:800;background:${c.amberBg};color:${c.amber};border:1.5px solid ${c.amberBorder};border-radius:20px;padding:2px 10px">⏳ Pendente</span>`:badge(r.status)}
      </div>
    </div>
    <div style="display:flex;gap:4px;flex-shrink:0">
      ${isMeu&&r.data>=h&&r.status!=="recusado"?`<button onclick="abrirEdicao('${r.id}')" style="background:none;border:none;color:${c.textMuted};cursor:pointer;font-size:13px;padding:5px 8px">✏️</button><button onclick="cancelarR('${r.id}')" style="background:none;border:none;color:${c.textMuted};cursor:pointer;font-size:13px;padding:5px 8px">✕</button>`:""}
    </div>
  </div>`;
}


function renderProfAgendar(){
  const c=C(),m=_MA;
  const titulos=["Selecione o espaço","Selecione a data","Preencha os horários"];
  let html="";

  if(m.sucesso){
    html+=`<div style="padding:20px 14px;text-align:center">
      <div style="width:64px;height:64px;border-radius:50%;background:${m.sucesso==="confirmado"?"#1a6b47":"#fff7ed"};color:${m.sucesso==="confirmado"?"#fff":"#7c2d12"};display:flex;align-items:center;justify-content:center;font-size:28px;margin:0 auto 16px">${m.sucesso==="confirmado"?"✓":"⏳"}</div>
      <h3 style="font-size:20px;font-weight:800;color:${m.sucesso==="confirmado"?c.green:c.amber};margin-bottom:8px">${m.sucesso==="confirmado"?"Confirmado!":"Pendente — aguardando aprovação"}</h3>
      <p style="font-size:13px;color:${c.textMuted};margin-bottom:20px">${m.espaco} · ${m.data.split("-").reverse().join("/")}</p>
      <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap">
        <button onclick="pSetModoProf('agendar')" style="${btn("success")};padding:10px 24px">＋ Novo agendamento</button>
        <button onclick="pSetModoProf('ver')" style="${btn("ghost")};padding:10px 24px">Ver agendamentos</button>
      </div>
    </div>`;
    return html;
  }

  if(m.resumo){ html+=renderMAResumo(); return html; }

  // Barra de progresso
  html+=`<div style="padding:16px 14px 0">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">
      ${m.step>1?`<button onclick="maBack()" style="background:none;border:1px solid ${c.border};border-radius:8px;width:32px;height:32px;cursor:pointer;color:${c.textMid};font-size:15px;font-family:inherit">‹</button>`:""}
      <div><p style="font-size:11px;color:${c.textMuted};font-weight:700;text-transform:uppercase">Passo ${m.step}/3</p><p style="font-size:16px;font-weight:800;color:${c.navy}">${titulos[m.step-1]}</p></div>
    </div>
    <div style="display:flex;gap:4px;margin-bottom:16px">
      ${[1,2,3].map(s=>`<div style="flex:1;height:3px;border-radius:2px;background:${m.step>=s?"#40b07a":c.borderLight};transition:background .3s"></div>`).join("")}
    </div>`;
  if(m.erro)html+=alertHTML("error",m.erro);

  if(m.step===1){
    ["espaco","laboratorio","equipamento","audiovisual"].forEach(tipo=>{
      const lbl={espaco:"🏛️ Espaços",laboratorio:"🔬 Laboratórios",equipamento:"💻 Equipamentos"}[tipo];
      html+=`<p style="font-size:11px;font-weight:700;color:${c.textMuted};text-transform:uppercase;margin:14px 0 8px">${lbl}</p><div style="display:grid;gap:8px">`;
      ESPACOS.filter(e=>e.tipo===tipo).forEach(e=>{
        const eidx=ESPACOS.indexOf(e);
        html+=`<button onclick="maEspaco(${eidx})" style="display:flex;align-items:center;gap:12px;padding:12px 16px;border-radius:10px;border:1.5px solid ${c.border};background:${c.surface};cursor:pointer;text-align:left;width:100%;font-family:inherit"><span style="font-size:20px">${tipoIcon(tipo,e.nome)}</span><span style="font-size:14px;font-weight:700;color:${c.navy}">${e.nome}</span>${e.estoque?`<span style="font-size:11px;color:${c.textMuted};margin-left:auto">${e.estoque} disp.</span>`:""}</button>`;
      });
      html+=`</div>`;
    });
  }

  if(m.step===2){
    html+=`<div style="display:flex;align-items:center;gap:10px;padding:10px 14px;background:${c.greenBg};border-radius:10px;margin-bottom:16px;border:1px solid ${c.greenBorder}"><span style="font-size:18px">${tipoIcon(ESPACOS.find(e=>e.nome===m.espaco)?.tipo,m.espaco)}</span><span style="font-size:13px;font-weight:700;color:${c.green}">${m.espaco}</span><button onclick="maBack()" style="margin-left:auto;background:none;border:none;color:${c.textMuted};cursor:pointer;font-size:12px;font-family:inherit">Trocar</button></div>`;
    const porData={};_todas.filter(r=>r.espaco===m.espaco&&r.status!=="recusado").forEach(r=>{if(!porData[r.data])porData[r.data]=[];porData[r.data].push(r);});
    html+=calMensalHTML("pagin",m.calA,m.calM,porData,m.data);
    window._calClick=(cid,data)=>{
      if(cid==="pagin"){
        if(!isDiaLetivo(data)){alert("Este dia não é letivo.");return;}
        _MA.data=data;_MA.step=3;_MA.blocos=[bVazio()];re();
      } else if(cid==="ma"){
        if(!isDiaLetivo(data)){alert("Este dia não é letivo.");return;}
        _MA.data=data;_MA.step=3;_MA.blocos=[bVazio()];renderMA();
      } else {
        if(data>=fmtHoje()&&isDiaLetivo(data)&&_P.modoProf==="ver"){
          _P.modoProf="agendar";
          _MA={step:1,espaco:"",data:data,blocos:[bVazio()],resumo:false,salvando:false,sucesso:null,erro:"",calA:new Date().getFullYear(),calM:new Date().getMonth()};
          re();
        } else {
          _P.diaSel=_P.diaSel===data?null:data;re();
        }
      }
    };
    window._calNav=(cid,dir)=>{
      if(cid==="pagin"||cid==="ma"){
        let nm=_MA.calM+dir,na=_MA.calA;if(nm>11){nm=0;na++;}if(nm<0){nm=11;na--;}_MA.calM=nm;_MA.calA=na;re();
      } else {
        let nm=_P.mesCal.m+dir,na=_P.mesCal.a;if(nm>11){nm=0;na++;}if(nm<0){nm=11;na--;}_P.mesCal={a:na,m:nm};re();
      }
    };
  }

  if(m.step===3){
    html+=`<div style="background:linear-gradient(135deg,#1a6b47,#0f4c2b);padding:10px 14px;border-radius:10px;margin-bottom:14px"><p style="font-size:11px;color:rgba(255,255,255,.7);font-weight:700;text-transform:uppercase;margin-bottom:2px">Agendando em</p><p style="font-size:14px;font-weight:800;color:#fff">${tipoIcon(ESPACOS.find(e=>e.nome===m.espaco)?.tipo,m.espaco)} ${m.espaco} · ${m.data.split("-").reverse().join("/")}</p></div>`;
    if(isDiaUrgente(m.data))html+=alertHTML("warning","⚠️ Menos de 24h de antecedência. Contate o T.E. para garantir disponibilidade.");
      const _espacosComAV=["Biblioteca","Sala Multifuncional","Sala de Dança","Ateliê de Artes"];
      if(_espacosComAV.includes(m.espaco)){
        html+=`<div style="background:#f0f9ff;border:1.5px solid #bae6fd;border-radius:10px;padding:12px 14px;margin-bottom:14px">
          <p style="font-size:13px;font-weight:800;color:#0369a1;margin-bottom:8px">🎙️ Precisa de equipamentos de Áudio/Visual?</p>
          <p style="font-size:11px;color:#64748b;margin-bottom:8px">Microfone, caixa de som ou projetor para a aula.</p>
          <div style="display:flex;gap:8px;margin-bottom:6px">
            <button onclick="setBibAV(true)" style="flex:1;padding:9px;border-radius:8px;border:2px solid ${_MA.bibAV===true?'#0369a1':'#bae6fd'};background:${_MA.bibAV===true?'#e0f2fe':'#fff'};font-weight:700;font-size:13px;cursor:pointer;color:#0369a1">✓ Sim</button>
            <button onclick="setBibAV(false)" style="flex:1;padding:9px;border-radius:8px;border:2px solid ${_MA.bibAV===false?'#64748b':'#e2e8f0'};background:${_MA.bibAV===false?'#f1f5f9':'#fff'};font-weight:700;font-size:13px;cursor:pointer;color:#64748b">✕ Não</button>
          </div>
          ${_MA.bibAV===true?"<p style=\"font-size:11px;color:#0369a1\">O Áudio/Visual será agendado automaticamente no mesmo horário, se disponível.</p>":""}
        </div>`;
      }
    m.blocos.forEach((b,i)=>{html+=maBlocoHTML(b,i);});
    const ult=m.blocos[m.blocos.length-1];
    const eo=ESPACOS.find(e=>e.nome===m.espaco);
    const bVal=b=>b.horario&&b.turma&&b.conteudo&&(eo?.tipo!=="laboratorio"||b.laboratorista);
    const ultVal=bVal(ult),todosVal=m.blocos.every(bVal);
    if(m.blocos.length<HORARIOS.length)html+=`<button id="btn-add-inline" onclick="maAddBloco()" ${!ultVal?"disabled":""} style="${btn(ultVal?"success":"ghost",!ultVal)};width:100%;margin-top:10px;padding:11px;border:2px dashed ${ultVal?"#40b07a":"#cbd5e1"}">+ Agendar outra turma neste dia</button>`;
    html+=`<button id="btn-conf-inline" onclick="maConfirmar()" ${!todosVal?"disabled":""} style="${btn("success",!todosVal)};width:100%;margin-top:14px;padding:14px;font-size:15px;border-radius:12px">${todosVal?`Confirmar ${m.blocos.length} agendamento${m.blocos.length>1?"s":""}`:"Preencha todos os campos"}</button>`;
  }

  html+=`</div>`;
  // Agendar atualização dos botões após renderização
  setTimeout(()=>{atualizarBotoesAgendar();},30);
  return html;
}

function bindProf(){
  // _calClick já definido em renderProfAgendar de forma unificada

  window._calNav=(cid,dir)=>{let nm=_P.mesCal.m+dir,na=_P.mesCal.a;if(nm>11){nm=0;na++;}if(nm<0){nm=11;na--;}_P.mesCal={a:na,m:nm};re();};
}
window.pSetModoProf=v=>{_P.modoProf=v;if(v==='agendar'){_MA={step:1,espaco:"",data:"",blocos:[bVazio()],resumo:false,salvando:false,sucesso:null,erro:"",calA:new Date().getFullYear(),calM:new Date().getMonth(),bibAV:null};}re();};
window.pSetModo=v=>{_P.modoCard=v;re();};
window.pFiltroRapido=tipo=>{
  if(tipo==='pendente'){
    _P.modoProf='ver';_P.modoCard='lista';_P.filtroPendente=true;re();
    setTimeout(()=>{const el=document.querySelector('[data-filtro="pendente"]');if(el)el.scrollIntoView({behavior:'smooth'});},200);
  } else if(tipo==='semana'){
    _P.modoProf='ver';_P.modoCard='calendario';_P.modoVisu='semana';_P.semIni=getSegunda(fmtHoje());re();
  } else if(tipo==='proximos'){
    _P.modoProf='ver';_P.modoCard='lista';re();
    setTimeout(()=>{const el=document.getElementById('lista-futuras');if(el)el.scrollIntoView({behavior:'smooth'});},200);
  }
};
window.pSetVisu=v=>{_P.modoVisu=v;re();};
window.pSetGrade=v=>{_P.filtroGrade=v;re();};
window.pSetEspaco=v=>{_P.filtroEspaco=v;re();};
window.pNavSem=dir=>{_P.semIni=addDias(_P.semIni,dir*7);re();};
window.pNavMes=dir=>{let nm=_P.mesCal.m+dir,na=_P.mesCal.a;if(nm>11){nm=0;na++;}if(nm<0){nm=11;na--;}_P.mesCal={a:na,m:nm};re();};
window.pSetDia=data=>{_P.diaSel=_P.diaSel===data?null:data;re();};
window.pClicarDia=data=>{
  if(data>=fmtHoje()&&isDiaLetivo(data)){
    // Entra no modo agendar com data preenchida (pula para step 2 se espaco já selecionado ou step 1)
    _P.modoProf="agendar";
    _MA={step:1,espaco:"",data:data,blocos:[bVazio()],resumo:false,salvando:false,sucesso:null,erro:"",calA:new Date().getFullYear(),calM:new Date().getMonth()};
    re();
  } else {
    _P.diaSel=_P.diaSel===data?null:data;re();
  }
};
window.cancelarR=async id=>{if(!confirm("Cancelar esta reserva?"))return;await deleteDoc(doc(db,"reservas",id));};

function fabHTML(){return'';} // FAB removido — usa tab Agendar

function modalAgendarHTML(){const c=C();return`<div id="mod-ag" style="display:none;position:fixed;inset:0;z-index:1100;align-items:flex-end;justify-content:center"><div onclick="fecharModalAgendar()" style="position:absolute;inset:0;background:rgba(0,0,0,.5)"></div><div id="mod-ag-inner" style="position:relative;background:${c.surface};border-radius:20px 20px 0 0;width:100%;max-width:600px;max-height:92vh;overflow-y:auto;box-shadow:0 -8px 40px rgba(0,0,0,.25)"><div id="mod-ag-body"></div></div></div>`;}

let _MA={step:1,espaco:"",data:"",blocos:[],resumo:false,salvando:false,sucesso:null,erro:"",calA:new Date().getFullYear(),calM:new Date().getMonth()};
const bVazio=()=>({horario:"",turma:"",conteudo:"",paginas:"",laboratorista:"",quantidade:1});

window.abrirModalAgendar=(dataIni="")=>{
  _MA={step:dataIni?2:1,espaco:"",data:dataIni,blocos:[bVazio()],resumo:false,salvando:false,sucesso:null,erro:"",calA:new Date().getFullYear(),calM:new Date().getMonth(),bibAV:null};
  $("mod-ag").style.display="flex";
  renderMA();
};
window.fecharModalAgendar=()=>{$("mod-ag").style.display="none";};

function renderMA(){
  const c=C(),m=_MA;
  const titulos=["Selecione o espaço","Selecione a data","Preencha os horários"];
  let body="";

  if(m.sucesso){
    body=`<div style="padding:28px 20px;text-align:center">
      <div style="width:64px;height:64px;border-radius:50%;background:${m.sucesso==="confirmado"?"#1a6b47":"#fff7ed"};color:${m.sucesso==="confirmado"?"#fff":"#7c2d12"};display:flex;align-items:center;justify-content:center;font-size:28px;margin:0 auto 16px">${m.sucesso==="confirmado"?"✓":"⏳"}</div>
      <h3 style="font-size:20px;font-weight:800;color:${m.sucesso==="confirmado"?c.green:c.amber};margin-bottom:8px">${m.sucesso==="confirmado"?"Confirmado!":"Pendente — aguardando aprovação"}</h3>
      <p style="font-size:13px;color:${c.textMuted};margin-bottom:20px">${m.espaco} · ${m.data.split("-").reverse().join("/")}</p>
      <button onclick="fecharModalAgendar()" style="${btn("navy")};width:100%;padding:12px">Fechar</button>
    </div>`;
  } else if(m.resumo){
    body=renderMAResumo();
  } else {
    // Header sticky
    body=`<div style="position:sticky;top:0;background:${c.surface};z-index:10;border-bottom:1px solid ${c.borderLight}">
      <div style="display:flex;align-items:center;justify-content:space-between;padding:16px 20px 12px">
        <div style="display:flex;align-items:center;gap:12px">
          ${m.step>1?`<button onclick="maBack()" style="background:none;border:1px solid ${c.border};border-radius:8px;width:32px;height:32px;cursor:pointer;color:${c.textMid};font-size:15px">‹</button>`:""}
          <div><p style="font-size:11px;color:${c.textMuted};font-weight:700;text-transform:uppercase">Passo ${m.step}/3</p><p style="font-size:15px;font-weight:800;color:${c.navy}">${titulos[m.step-1]}</p></div>
        </div>
        <button onclick="fecharModalAgendar()" style="background:none;border:none;font-size:22px;cursor:pointer;color:${c.textMuted}">✕</button>
      </div>
      <div style="display:flex;gap:4px;padding:0 20px 12px">
        ${[1,2,3].map(s=>`<div style="flex:1;height:3px;border-radius:2px;background:${m.step>=s?"#40b07a":c.borderLight};transition:background .3s"></div>`).join("")}
      </div>
    </div><div style="padding:16px 20px 24px">`;
    if(m.erro)body+=alertHTML("error",m.erro);

    if(m.step===1){
      ["espaco","laboratorio","equipamento"].forEach(tipo=>{
        const lbl={espaco:"🏛️ Espaços",laboratorio:"🔬 Laboratórios",equipamento:"💻 Equipamentos"}[tipo];
        body+=`<p style="font-size:11px;font-weight:700;color:${c.textMuted};text-transform:uppercase;margin:14px 0 8px">${lbl}</p><div style="display:grid;gap:8px">`;
        ESPACOS.filter(e=>e.tipo===tipo).forEach(e=>{
          const midx=ESPACOS.indexOf(e);
          body+=`<button onclick="maEspaco(${midx})" style="display:flex;align-items:center;gap:12px;padding:12px 16px;border-radius:10px;border:1.5px solid ${c.border};background:${c.surface};cursor:pointer;text-align:left;width:100%"><span style="font-size:20px">${tipoIcon(tipo,e.nome)}</span><span style="font-size:14px;font-weight:700;color:${c.navy}">${e.nome}</span>${e.estoque?`<span style="font-size:11px;color:${c.textMuted};margin-left:auto">${e.estoque} disp.</span>`:""}</button>`;
        });
        body+=`</div>`;
      });
    }

    if(m.step===2){
      body+=`<div style="display:flex;align-items:center;gap:10px;padding:10px 14px;background:${c.greenBg};border-radius:10px;margin-bottom:16px;border:1px solid ${c.greenBorder}"><span style="font-size:18px">${tipoIcon(ESPACOS.find(e=>e.nome===m.espaco)?.tipo,m.espaco)}</span><span style="font-size:13px;font-weight:700;color:${c.green}">${m.espaco}</span><button onclick="maBack()" style="margin-left:auto;background:none;border:none;color:${c.textMuted};cursor:pointer;font-size:12px">Trocar</button></div>`;
      const porData={};_todas.filter(r=>r.espaco===m.espaco&&r.status!=="recusado").forEach(r=>{if(!porData[r.data])porData[r.data]=[];porData[r.data].push(r);});
      body+=calMensalHTML("ma",m.calA,m.calM,porData,m.data);
      // _calClick e _calNav tratados globalmente
    }

    if(m.step===3){
      body+=`<div style="background:linear-gradient(135deg,#1a6b47,#0f4c2b);padding:10px 14px;border-radius:10px;margin-bottom:14px"><p style="font-size:11px;color:rgba(255,255,255,.7);font-weight:700;text-transform:uppercase;margin-bottom:2px">Agendando em</p><p style="font-size:14px;font-weight:800;color:#fff">${tipoIcon(ESPACOS.find(e=>e.nome===m.espaco)?.tipo,m.espaco)} ${m.espaco} · ${m.data.split("-").reverse().join("/")}</p></div>`;
      if(isDiaUrgente(m.data))body+=alertHTML("warning","⚠️ Menos de 24h de antecedência. Contate o T.E. para garantir disponibilidade.");
      m.blocos.forEach((b,i)=>{body+=maBlocoHTML(b,i);});
      const ult=m.blocos[m.blocos.length-1];
      const eo=ESPACOS.find(e=>e.nome===m.espaco);
      const bVal=b=>b.horario&&b.turma&&b.conteudo&&(eo?.tipo!=="laboratorio"||b.laboratorista);
      const ultVal=bVal(ult);
      const todosVal=m.blocos.every(bVal);
      if(m.blocos.length<HORARIOS.length)body+=`<button onclick="maAddBloco()" ${!ultVal?"disabled":""} style="${btn(ultVal?"success":"ghost",!ultVal)};width:100%;margin-top:10px;padding:11px;border:2px dashed ${ultVal?"#40b07a":"#cbd5e1"}">+ Agendar outra turma neste dia</button>`;
      body+=`<button onclick="maConfirmar()" ${!todosVal?"disabled":""} style="${btn("success",!todosVal)};width:100%;margin-top:14px;padding:14px;font-size:15px;border-radius:12px">${todosVal?`Confirmar ${m.blocos.length} agendamento${m.blocos.length>1?"s":""}`:"Preencha todos os campos"}</button>`;
    }
    body+=`</div>`;
  }
  render("mod-ag-body",body);
}

function maBlocoHTML(b,i){
  const c=C(),m=_MA;
  const eo=ESPACOS.find(e=>e.nome===m.espaco);
  const isLab=eo?.tipo==="laboratorio",isEquip=eo?.tipo==="equipamento";
  const ocpFire=_todas.filter(r=>r.espaco===m.espaco&&r.data===m.data&&r.status!=="recusado").map(r=>r.horario);
  const ocpOut=m.blocos.filter((_,idx)=>idx!==i).map(b=>b.horario).filter(Boolean);
  const ocpTodos=[...new Set([...ocpFire,...ocpOut])];
  let slots=`<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-top:6px">`;
  HORARIOS.forEach(h=>{
    const ocp=ocpTodos.includes(h),sel=h===b.horario;
    slots+=`<button onclick="maSetHorario(${i},'${h}')" ${ocp?"disabled":""} style="padding:9px 4px;border-radius:8px;border:${sel?"2px solid "+c.blueMid:ocp?"1.5px solid "+c.redBorder:"1.5px solid "+c.greenBorder};background:${sel?c.greenBg:ocp?c.redBg:c.greenBg};color:${sel?c.blueMid:ocp?c.red:c.green};font-size:12px;font-weight:700;cursor:${ocp?"not-allowed":"pointer"};display:flex;flex-direction:column;align-items:center;gap:3px;font-family:'DM Mono',monospace">${h}<span style="font-size:8px;font-weight:600;font-family:inherit">${ocp?"● Ocup":sel?"✓ Sel":"○ Livre"}</span></button>`;
  });
  slots+=`</div>`;
  return`<div style="background:${c.bg};border:1.5px solid ${b.horario?c.blueMid+"55":c.border};border-radius:12px;padding:16px;margin-bottom:12px">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
      <div style="display:flex;align-items:center;gap:8px"><div style="width:24px;height:24px;border-radius:50%;background:${b.horario?"#40b07a":"#cbd5e1"};color:#fff;font-weight:800;font-size:12px;display:flex;align-items:center;justify-content:center">${i+1}</div><span style="font-size:13px;font-weight:700;color:${c.navy}">${b.horario?`Turma ${i+1} · ${b.horario}`:`Turma ${i+1}`}</span></div>
      ${i>0?`<button onclick="maRemBloco(${i})" style="background:none;border:none;color:#ef4444;cursor:pointer;font-size:18px">✕</button>`:""}
    </div>
    <div style="display:grid;gap:13px">
      <div><label style="font-size:12px;font-weight:700;color:${c.textMuted};text-transform:uppercase">Horário *</label>${slots}</div>
      ${isEquip?`<div><label style="font-size:12px;font-weight:700;color:${c.textMuted};text-transform:uppercase">Quantidade (máx ${eo.estoque}) *</label><br><input type="number" min="1" max="${eo.estoque}" value="${b.quantidade||1}" oninput="maSetBlocoRe(${i},'quantidade',this.value)" style="${inp()};width:140px;margin-top:5px"></div>`:""}
      ${isLab?`<div><label style="font-size:12px;font-weight:700;color:${c.textMuted};text-transform:uppercase">Laboratorista? *</label><div style="display:flex;gap:20px;margin-top:4px">${["Sim","Não"].map(op=>`<label style="display:flex;align-items:center;gap:7px;cursor:pointer;font-size:13.5px"><input type="radio" name="lab${i}" value="${op}" ${b.laboratorista===op?"checked":""} onchange="maSetBloco(${i},'laboratorista','${op}')">${op}</label>`).join("")}</div></div>`:""}
      <div><label style="font-size:12px;font-weight:700;color:${c.textMuted};text-transform:uppercase">Turma *</label><br><select onchange="maSetBlocoRe(${i},'turma',this.value)" style="${sel()};margin-top:5px"><option value="">Selecione...</option><optgroup label="Anos Iniciais">${TURMAS.filter(t=>parseInt(t)<=5).map(t=>`<option ${b.turma===t?"selected":""}>${t}</option>`).join("")}</optgroup><optgroup label="Anos Finais">${TURMAS.filter(t=>parseInt(t)>=6).map(t=>`<option ${b.turma===t?"selected":""}>${t}</option>`).join("")}</optgroup></select></div>
      ${(m.espaco==="Maker 1"||m.espaco==="Maker 2")?`<div><label style="font-size:12px;font-weight:700;color:${c.textMuted};text-transform:uppercase">Tipo de Atividade *</label><br><select oninput="maSetBlocoRe(${i},'tipoAtividade',this.value)" style="${inp()};margin-top:5px"><option value="">Selecione...</option><option value="Nave a Vela" ${b.tipoAtividade==="Nave a Vela"?"selected":""}>🚀 Nave a Vela</option><option value="Outros" ${b.tipoAtividade==="Outros"?"selected":""}>📋 Outros</option></select></div>`:""}
      <div><label style="font-size:12px;font-weight:700;color:${c.textMuted};text-transform:uppercase">Conteúdo da Aula *</label><br><textarea oninput="maSetBlocoRe(${i},'conteudo',this.value)" rows="2" placeholder="Descreva o conteúdo..." style="${inp()};resize:vertical;line-height:1.6;margin-top:5px">${b.conteudo}</textarea></div>
      <div><label style="font-size:12px;font-weight:700;color:${c.textMuted};text-transform:uppercase">Páginas do Livro</label><br><input value="${b.paginas}" oninput="maSetBlocoRe(${i},'paginas',this.value)" placeholder="Ex: pp. 45-62" style="${inp()};margin-top:5px"></div>

      ${m.espaco==="Fazendinha"?`<div><label style="font-size:12px;font-weight:700;color:${c.textMuted};text-transform:uppercase">Observações</label><br><textarea oninput="maSetBlocoRe(${i},'observacoes',this.value)" rows="2" placeholder="Ex: Piquenique, área sombreada necessária..." style="${inp()};resize:none;margin-top:5px">${b.observacoes||""}</textarea></div>`:""}
      ${m.espaco==="Sala Multifuncional"?`<div style="background:${c.bg};border-radius:10px;padding:12px;border:1px solid ${c.border};display:grid;gap:10px">
        <p style="font-size:12px;font-weight:700;color:${c.navy}">💻 Equipamentos para a aula</p>
        <p style="font-size:11px;color:${c.textMuted}">Se precisar de tablets ou notebooks, selecione abaixo. A reserva será feita automaticamente.</p>
        <div style="display:grid;gap:8px">
          ${[{k:"multTablets",l:"📱 Tablets",max:18},{k:"multNotebooks",l:"💻 Notebooks",max:16},{k:"multProjetor",l:"📽️ Projetor",max:3}].map(eq=>`
            <div style="display:flex;align-items:center;gap:12px;padding:10px 14px;background:${c.surface};border-radius:8px;border:1.5px solid ${b[eq.k]>0?c.blueMid:c.border}">
              <span style="font-size:16px">${eq.l.split(" ")[0]}</span>
              <div style="flex:1">
                <p style="font-size:13px;font-weight:700;color:${c.navy}">${eq.l.split(" ").slice(1).join(" ")}</p>
                <p style="font-size:11px;color:${c.textMuted}">Máx. ${eq.max} disponíveis</p>
              </div>
              <div style="display:flex;align-items:center;gap:8px">
                <button onclick="maSetBlocoRe(${i},'${eq.k}',Math.max(0,Number(_MA.blocos[${i}]['${eq.k}']||0)-1))" style="width:28px;height:28px;border-radius:50%;border:1.5px solid ${c.border};background:${c.surface};cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;font-family:inherit">−</button>
                <span style="font-size:16px;font-weight:800;color:${c.navy};min-width:24px;text-align:center">${b[eq.k]||0}</span>
                <button onclick="maSetBlocoRe(${i},'${eq.k}',Math.min(${eq.max},Number(_MA.blocos[${i}]['${eq.k}']||0)+1))" style="width:28px;height:28px;border-radius:50%;border:1.5px solid ${c.border};background:${c.surface};cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;font-family:inherit">+</button>
              </div>
            </div>
          `).join("")}
        </div>
      </div>`:""}
      ${m.espaco==="Áudio/Visual"?`<div style="background:${c.bg};border-radius:10px;padding:12px;border:1px solid ${c.border};display:grid;gap:10px">
        <p style="font-size:12px;font-weight:700;color:${c.navy}">🎙️ Equipamentos necessários</p>
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px">
          ${[{k:"microfones",l:"🎤 Microfones"},{k:"caixasom",l:"🔊 Caixa de som"},{k:"projetor",l:"📽️ Projetor"}].map(eq=>`<div><label style="font-size:10px;font-weight:700;color:${c.textMuted};text-transform:uppercase">${eq.l}</label><br><input type="number" min="0" value="${b[eq.k]||0}" oninput="maSetBlocoRe(${i},'${eq.k}',this.value)" style="${inp()};margin-top:4px;text-align:center"></div>`).join("")}
        </div>
        <div><label style="font-size:12px;font-weight:700;color:${c.textMuted};text-transform:uppercase">📍 Local de montagem *</label><br><input value="${b.localMontagem||""}" oninput="maSetBlocoRe(${i},'localMontagem',this.value)" placeholder="Ex: Sala 302, Pátio, Auditório..." style="${inp()};margin-top:5px"></div>
        <div><label style="font-size:12px;font-weight:700;color:${c.textMuted};text-transform:uppercase">💬 Observações *</label><br><textarea oninput="maSetBlocoRe(${i},'observacoes',this.value)" rows="2" placeholder="Como os equipamentos serão utilizados..." style="${inp()};resize:none;margin-top:5px">${b.observacoes||""}</textarea></div>
      </div>`:""}
      <div style="display:flex;align-items:center;gap:10px;padding:10px 12px;background:${c.greenBg};border-radius:8px;border:1px solid ${c.greenBorder};cursor:pointer">
        <input type="checkbox" id="chk-foto-${i}" ${b.precisaFoto?"checked":""} onchange="maSetBlocoRe(${i},'precisaFoto',this.checked)" style="width:18px;height:18px;accent-color:#1a6b47;cursor:pointer;flex-shrink:0">
        <label for="chk-foto-${i}" style="cursor:pointer"><p style="font-size:13px;font-weight:700;color:${c.navy}">📸 Solicitar fotógrafo</p><p style="font-size:11px;color:${c.textMuted}">A equipe de fotografia será notificada</p></label>
      </div>
    </div>
  </div>`;
}

function renderMAResumo(){
  const c=C(),m=_MA;
  const[ano,mes,dia]=m.data.split("-");
  const dow=new Date(Date.UTC(+ano,+mes-1,+dia)).getUTCDay();
  const fimSem=dow===0||dow===6;
  const urgentes=m.blocos.filter(b=>isUrgente(m.data,b.horario));
  const precisaCiencia=urgentes.length>0||fimSem;
  let html=`<div style="padding:28px 20px">
    <div style="text-align:center;margin-bottom:20px"><div style="width:52px;height:52px;border-radius:50%;background:${precisaCiencia?"#fff7ed":"#e2f4ea"};display:flex;align-items:center;justify-content:center;font-size:24px;margin:0 auto 12px">${precisaCiencia?"⚠️":"📋"}</div><h3 style="font-size:17px;font-weight:800;color:${c.navy}">Revisar agendamento</h3></div>`;
  if(precisaCiencia)html+=`<div style="background:#fff7ed;border:1.5px solid #fed7aa;border-radius:10px;padding:10px 14px;margin-bottom:12px"><p style="font-size:12.5px;font-weight:800;color:#7c2d12">${fimSem?"⚠️ Agendamento fora do horário do T.E.":"⚠️ Menos de 24h de antecedência"}</p><p style="font-size:12px;color:#92400e;margin-top:5px;line-height:1.5">${fimSem?"Agendamento em fim de semana fica pendente até aprovação.":"Contate o T.E. para garantir disponibilidade."}</p></div>`;
  html+=`<div style="background:${c.bg};border-radius:10px;padding:12px 16px;margin-bottom:12px"><p style="font-size:11px;font-weight:700;color:${c.textMuted};text-transform:uppercase;margin-bottom:6px">Local e data</p><p style="font-size:14px;font-weight:700;color:${c.navy}">📍 ${m.espaco}</p><p style="font-size:13px;color:${c.textMid};margin-top:2px">📅 ${dia}/${mes}/${ano}</p></div>`;
  html+=`<div style="display:grid;gap:8px;margin-bottom:${precisaCiencia?16:20}px">`;
  m.blocos.forEach((b,i)=>{
    const isUrg=urgentes.includes(b);
    const extras=[];
    if(b.paginas)extras.push("📖 "+b.paginas);
    if(b.laboratorista)extras.push("🔬 "+(b.laboratorista==="Sim"?"Com laboratorista":"Sem laboratorista"));
    if(Number(b.quantidade)>0)extras.push("📦 "+b.quantidade+" un.");
    if(Number(b.multTablets)>0)extras.push("📱 "+b.multTablets+" tablet"+(b.multTablets>1?"s":""));
    if(Number(b.multNotebooks)>0)extras.push("💻 "+b.multNotebooks+" notebook"+(b.multNotebooks>1?"s":""));
    if(Number(b.multProjetor)>0)extras.push("📽️ "+b.multProjetor+" projetor"+(b.multProjetor>1?"es":""));
    if(Number(b.microfones)>0)extras.push("🎤 "+b.microfones+" mic.");
    if(Number(b.caixasom)>0)extras.push("🔊 "+b.caixasom+" caixa");
    if(Number(b.projetor)>0)extras.push("📽️ "+b.projetor+" proj.");
    if(b.localMontagem)extras.push("📍 "+b.localMontagem);
    if(b.tipoAtividade)extras.push("🏷️ "+b.tipoAtividade);    if(b.observacoes)extras.push("💬 "+b.observacoes);
    if(b.precisaFoto)extras.push("📸 Fotógrafo solicitado");
    html+=`<div style="display:flex;gap:12px;align-items:flex-start;padding:10px 14px;background:${c.surface};border:1px solid ${isUrg?"#fed7aa":c.border};border-radius:8px;border-left:3px solid ${isUrg?"#f97316":"#40b07a"}">
      <div style="min-width:42px"><span style="font-family:'DM Mono',monospace;font-weight:800;color:${isUrg?"#c2410c":"#40b07a"};font-size:13px">${b.horario}</span>${isUrg?`<p style="font-size:9px;color:#c2410c;font-weight:700">urgente</p>`:""}</div>
      <div style="flex:1"><p style="font-size:13px;font-weight:700;color:${c.navy}">${b.turma}</p><p style="font-size:12px;color:${c.textMuted};margin-top:2px">${b.conteudo}</p>
        ${extras.length?`<div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:6px">${extras.map(e=>`<span style="font-size:11px;background:${c.bg};border:1px solid ${c.border};border-radius:6px;padding:2px 8px;color:${c.textMid}">${e}</span>`).join("")}</div>`:""}
      </div>
    </div>`;
  });
  html+=`</div>`;
  if(precisaCiencia)html+=`<label style="display:flex;align-items:flex-start;gap:10px;margin-bottom:18px;cursor:pointer;padding:12px 14px;background:${c.surface};border:1.5px solid ${c.border};border-radius:10px"><input type="checkbox" id="chk-ciente" onchange="cienteChanged(this.checked)" style="width:18px;height:18px;margin-top:1px;accent-color:#1a6b47;flex-shrink:0;cursor:pointer"><span style="font-size:12px;color:${c.navy};line-height:1.5">${fimSem?"Estou ciente: agendamento em fim de semana fica pendente até aprovação do administrador.":"Estou ciente de que este agendamento tem menos de 24h. Entrarei em contato com o T.E. para garantir disponibilidade."}</span></label>`;
  html+=`<div style="display:flex;gap:10px"><button onclick="maVoltarRevisao()" style="${btn("ghost")};flex:1;padding:11px">✏️ Editar</button><button id="btn-conf" onclick="if(!this.disabled)maSalvar()" style="flex:2;padding:11px;font-size:13.5px;border-radius:8px;border:none;font-weight:700;font-family:inherit;cursor:${precisaCiencia?'not-allowed':'pointer'};background:${precisaCiencia?'#cbd5e1':'#1a6b47'};color:${precisaCiencia?'#94a3b8':'#fff'}" ${precisaCiencia?"data-needs-ciente=true":""}>${m.salvando?"Salvando...":"✓ Confirmar"}</button></div></div>`;
  return html;
}

window.maEspaco=v=>{
  // Aceita índice numérico ou string
  _MA.espaco = (typeof v==="number"||(!isNaN(v)&&v!=="")) ? ESPACOS[parseInt(v)].nome : v;
  _MA.step=2;
  if(_P.modoProf==="agendar"){re();}else{renderMA();}
};
window.maBack=()=>{if(_MA.step===3){_MA.data="";_MA.blocos=[bVazio()];}else if(_MA.step===2)_MA.espaco="";_MA.step--;if(_P.modoProf==="agendar"){re();}else{renderMA();}};
window.maSetHorario=(i,h)=>{
  _MA.blocos[i].horario=h;
  if(_P.modoProf==="agendar"){re();}else{renderMA();}
  // Atualizar botões após render
  setTimeout(atualizarBotoesAgendar,50);
};
window.maSetBloco=(i,k,v)=>{_MA.blocos[i][k]=v;};
window.cienteChanged=function(checked){
  ['btn-conf','btn-conf-inline'].forEach(id=>{
    const b=document.getElementById(id);
    if(b){
      b.disabled=!checked;
      b.setAttribute('style', b.getAttribute('style')
        .replace(/background:[^;]+/,'background:'+(checked?'#1a6b47':'#cbd5e1'))
        .replace(/color:[^;]+/,'color:'+(checked?'#fff':'#94a3b8'))
        .replace(/cursor:[^;]+/,'cursor:'+(checked?'pointer':'not-allowed'))
      );
    }
  });
};
window.maSetBlocoRe=(i,k,v)=>{
  _MA.blocos[i][k]=v;
  atualizarBotoesAgendar();
};
function atualizarBotoesAgendar(){
  const eo=ESPACOS.find(e=>e.nome===_MA.espaco);
  const bVal=b=>b.horario&&b.turma&&b.conteudo&&(eo?.tipo!=="laboratorio"||b.laboratorista);
  const todosVal=_MA.blocos.every(bVal);
  const ultVal=bVal(_MA.blocos[_MA.blocos.length-1]);
  const btnConf=document.getElementById("btn-conf-inline");
  if(btnConf){
    btnConf.disabled=!todosVal;
    btnConf.style.background=todosVal?"#40b07a":"#cbd5e1";
    btnConf.style.color=todosVal?"#fff":"#94a3b8";
    btnConf.style.cursor=todosVal?"pointer":"not-allowed";
    btnConf.textContent=todosVal?`Confirmar ${_MA.blocos.length} agendamento${_MA.blocos.length>1?"s":""}`:"Preencha todos os campos";
  }
  const btnAdd=document.getElementById("btn-add-inline");
  if(btnAdd){
    btnAdd.disabled=!ultVal;
    btnAdd.style.borderColor=ultVal?"#40b07a":"#cbd5e1";
    btnAdd.style.color=ultVal?"#40b07a":"#cbd5e1";
    btnAdd.style.cursor=ultVal?"pointer":"not-allowed";
    btnAdd.style.opacity=ultVal?"1":"0.5";
  }
}
window.maAddBloco=()=>{_MA.blocos.push(bVazio());if(_P.modoProf==="agendar"){re();}else{renderMA();}};
window.maRemBloco=i=>{_MA.blocos.splice(i,1);if(_P.modoProf==="agendar"){re();}else{renderMA();}};
window.maConfirmar=()=>{_MA.resumo=true;if(_P.modoProf==="agendar"){re();}else{renderMA();}};
window.maSalvar=async()=>{
  _MA.salvando=true;_MA.erro="";
  if(_P.modoProf==="agendar"){re();}else{renderMA();}
  const{espaco,data,blocos}=_MA;
  try{
    for(const b of blocos){
      const snap=await getDocs(query(collection(db,"reservas"),where("espaco","==",espaco),where("data","==",data),where("horario","==",b.horario)));
      const existe=snap.docs.map(d=>d.data()).find(r=>r?.status!=="recusado");
      if(existe){_MA.erro=`Horário ${b.horario} já reservado por ${existe.professor}.`;_MA.salvando=false;_MA.resumo=false;if(_P.modoProf==="agendar"){re();}else{renderMA();}return;}
    }
    const eo=ESPACOS.find(e=>e.nome===espaco);
    let algPend=false;
    for(const b of blocos){
      const urg=isUrgente(data,b.horario);
      const[a,m,d]=data.split("-").map(Number);
      const dow=new Date(Date.UTC(a,m-1,d)).getUTCDay();
      const st=(urg||dow===0||dow===6)?"pendente":"confirmado";
      if(st==="pendente")algPend=true;
      await addDoc(collection(db,"reservas"),{professor:_usuario.nome,professorId:_usuario.uid,professorEmail:_usuario.email,turma:b.turma,espaco,data,horario:b.horario,conteudo:b.conteudo,paginas:b.paginas||"",laboratorista:b.laboratorista||"",quantidade:eo?.tipo==="equipamento"?Number(b.quantidade):null,status:st,criadoEm:Timestamp.now(),precisaFoto:b.precisaFoto||false,observacoes:b.observacoes||"",localMontagem:b.localMontagem||"",microfones:Number(b.microfones)||0,caixasom:Number(b.caixasom)||0,projetor:Number(b.projetor)||0,multTablets:Number(b.multTablets)||0,multNotebooks:Number(b.multNotebooks)||0,multProjetor:Number(b.multProjetor)||0,tipoAtividade:b.tipoAtividade||""});
    }
    // Sala Multifuncional: criar reservas automáticas de tablets/notebooks
    if(espaco==="Sala Multifuncional"){
      const equips=[
        {nome:"Tablets (18 disp.)",qtd:Number(b.multTablets)||0},
        {nome:"Computadores (16 disp.)",qtd:Number(b.multNotebooks)||0}
      ];
      for(const eq of equips){
        if(eq.qtd>0){
          const eqSnap=await getDocs(query(collection(db,"reservas"),where("espaco","==",eq.nome),where("data","==",data),where("horario","==",b.horario)));
          const eqOcup=eqSnap.docs.find(d=>d.data()?.status!=="recusado");
          if(!eqOcup){
            const[a2,m2,d2]=data.split("-").map(Number);
            const dow2=new Date(Date.UTC(a2,m2-1,d2)).getUTCDay();
            const urg2=isUrgente(data,b.horario);
            const st2=(urg2||dow2===0||dow2===6)?"pendente":"confirmado";
            await addDoc(collection(db,"reservas"),{
              professor:_usuario.nome,professorId:_usuario.uid,professorEmail:_usuario.email,
              turma:b.turma,espaco:eq.nome,data,horario:b.horario,
              conteudo:"Vinculado à Sala Multifuncional — "+b.conteudo,
              quantidade:eq.qtd,status:st2,criadoEm:Timestamp.now(),
              precisaFoto:false,paginas:"",laboratorista:"",observacoes:"Agendado automaticamente via Sala Multifuncional",
              localMontagem:"",microfones:0,caixasom:0,projetor:0,multTablets:0,multNotebooks:0
            });
          } else {
            _MA.erro=`${eq.nome} já está reservado no horário ${b.horario}.`;
          }
        }
      }
    }
    // Biblioteca + bibAV=true: criar reserva de A/V no mesmo horário
    if(["Biblioteca","Sala Multifuncional","Sala de Dança","Ateliê de Artes"].includes(espaco)&&_MA.bibAV===true){
      for(const b of blocos){
        const avSnap=await getDocs(query(collection(db,"reservas"),where("espaco","==","Áudio/Visual"),where("data","==",data),where("horario","==",b.horario)));
        const avOcup=avSnap.docs.find(d=>d.data()?.status!=="recusado");
        if(!avOcup){
          const[a,m,d2]=data.split("-").map(Number);
          const dow=new Date(Date.UTC(a,m-1,d2)).getUTCDay();
          const urg=isUrgente(data,b.horario);
          const st=(urg||dow===0||dow===6)?"pendente":"confirmado";
          await addDoc(collection(db,"reservas"),{
            professor:_usuario.nome,professorId:_usuario.uid,professorEmail:_usuario.email,
            turma:b.turma,espaco:"Áudio/Visual",data,horario:b.horario,
            conteudo:"A/V vinculado à Biblioteca — "+b.conteudo,
            localMontagem:"Biblioteca",observacoes:"Agendado automaticamente junto com a Biblioteca",
            status:st,criadoEm:Timestamp.now(),
            precisaFoto:false,paginas:"",laboratorista:"",quantidade:null,
            microfones:0,caixasom:0,projetor:0
          });
        }
      }
    }
    _MA.sucesso=algPend?"pendente":"confirmado";_MA.salvando=false;if(_P.modoProf==="agendar"){re();}else{renderMA();};
  }catch(e){_MA.erro="Erro ao salvar. Tente novamente.";_MA.salvando=false;_MA.resumo=false;if(_P.modoProf==="agendar"){re();}else{renderMA();};}
};

        <div style="text-align:center;min-width:130px"><p style="font-size:18px;font-weight:800;color:${c.navy}">${MESES[mes]} ${ano}</p><p style="font-size:11px;color:${c.textMuted}">${filtradas.filter(r=>r.status!=="recusado"&&r.data.startsWith(`${ano}-${String(mes+1).padStart(2,"0")}`)).length} agendamentos</p></div>
        <button onclick="aNavMes(1)" style="background:${c.surface};border:1px solid ${c.border};border-radius:8px;width:34px;height:34px;cursor:pointer;color:${c.textMid};font-size:16px">›</button>
      </div>
      <button onclick="const d=new Date();_A.mesCal={a:d.getFullYear(),m:d.getMonth()};_A.diaSel=null;re()" style="${btn("ghost")};padding:6px 14px;font-size:12px">Hoje</button>
    </div>
    <div style="background:${c.surface};border-radius:16px;border:1px solid ${c.border};overflow:auto;box-shadow:${c.cardShadow};-webkit-overflow-scrolling:touch">
      <div style="display:grid;grid-template-columns:repeat(7,1fr);border-bottom:2px solid ${c.border};min-width:0">
        ${["Dom.","Seg.","Ter.","Qua.","Qui.","Sexta","Sáb."].map((d,i)=>`<div style="padding:10px 0;text-align:center;font-size:11px;font-weight:700;color:${i===0||i===6?"#ef4444":c.textMuted};text-transform:uppercase">${d}</div>`).join("")}
      </div>
      <div style="display:grid;grid-template-columns:repeat(7,1fr)">`;

    cells.forEach((d,i)=>{
      if(!d){html+=`<div style="min-height:90px;border-right:1px solid ${c.borderLight};border-bottom:1px solid ${c.borderLight}"></div>`;return;}
      const ds=`${ano}-${String(mes+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
      const isPast=ds<h,isH=ds===h,isSel=ds===_A.diaSel;
      const rsdia=porData[ds]||[];
      const urg=rsdia.filter(r=>isUrgente(r.data,r.horario));
      const pend=rsdia.filter(r=>r.status==="pendente"&&!isUrgente(r.data,r.horario));
      const conf=rsdia.filter(r=>r.status==="confirmado");
      const dow=new Date(Date.UTC(ano,mes,d)).getUTCDay();
      const naoL=!isDiaLetivo(ds)&&!isPast&&dow!==0&&dow!==6;
      html+=`<div onclick="_A.diaSel=_A.diaSel==='${ds}'?null:'${ds}';re()"
        data-ds="${ds}"
        onmouseenter="admDayHover('${ds}',event)"
        onmouseleave="admDayLeave()"
        style="min-height:90px;border-right:1px solid ${c.borderLight};border-bottom:1px solid ${c.borderLight};padding:6px 8px;cursor:pointer;background:${isSel?"rgba(26,107,71,.08)":isH?"rgba(26,107,71,.04)":naoL?"rgba(239,68,68,.04)":isPast?"rgba(0,0,0,.015)":"transparent"};transition:background .15s">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
          <span style="font-size:13.5px;font-weight:${isH?900:500};color:${isSel?"#40b07a":isH?"#40b07a":isPast?c.textMuted:naoL?"#ef4444":dow===0||dow===6?"#ef4444":c.navy};width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:${isH?"rgba(26,107,71,.15)":naoL?"rgba(239,68,68,.12)":"transparent"}">${d}</span>
          ${naoL?`<span style="font-size:7.5px;font-weight:700;color:#ef4444;background:rgba(239,68,68,.1);border-radius:3px;padding:1px 3px">não letivo</span>`:""}
        </div>
        <div style="display:flex;flex-direction:column;gap:2px">
          ${urg.slice(0,1).map(r=>`<div style="background:#fff7ed;border:1px solid #f97316;border-radius:4px;padding:2px 5px;font-size:9px;font-weight:700;color:#c2410c;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">⚡${r.horario} ${r.espaco.split(" ")[0]} · ${r.professor.split(" ")[0]}${r.precisaFoto?" 📸":""}</div>`).join("")}
          ${pend.slice(0,1).map(r=>`<div style="background:${c.amberBg};border:1px solid ${c.amberBorder};border-radius:4px;padding:2px 5px;font-size:9px;font-weight:700;color:${c.amber};white-space:nowrap;overflow:hidden;text-overflow:ellipsis">⏳${r.horario} ${r.espaco.split(" ")[0]} · ${r.professor.split(" ")[0]}${r.precisaFoto?" 📸":""}</div>`).join("")}
          ${conf.slice(0,2).map(r=>`<div style="background:${c.greenBg};border:1px solid ${c.greenBorder};border-radius:4px;padding:2px 5px;font-size:9px;font-weight:600;color:${c.green};white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${r.horario} ${r.espaco.split(" ")[0]} · ${r.professor.split(" ")[0]}${r.precisaFoto?" 📸":""}${r.espaco==="Áudio/Visual"?" 🎙️":""}</div>`).join("")}
          ${rsdia.length>3?`<div style="font-size:9px;color:${c.blueMid};font-weight:700;padding-left:2px">+${rsdia.length-3} mais</div>`:""}
        </div>
      </div>`;
    });
    html+=`</div></div>`;

    // Legenda + detalhe dia
    html+=`<div style="display:flex;gap:16px;margin-top:10px;flex-wrap:wrap;align-items:center">${[{l:"Urgente",bg:"#fff7ed",b:"#f97316"},{l:"Pendente",bg:c.amberBg,b:c.amberBorder},{l:"Confirmado",bg:c.greenBg,b:c.greenBorder}].map(l=>`<div style="display:flex;align-items:center;gap:5px"><div style="width:14px;height:14px;border-radius:3px;background:${l.bg};border:1.5px solid ${l.b}"></div><span style="font-size:11.5px;color:${c.textMuted};font-weight:600">${l.l}</span></div>`).join("")}<span style="margin-left:auto;font-size:11px;color:${c.textMuted}">Clique no dia para detalhes</span></div>`;

    if(_A.diaSel){
      const[a2,m2,d2]=_A.diaSel.split("-");
      const rsdia=(porData[_A.diaSel]||[]).sort((a,b)=>a.horario>b.horario?1:-1);
      html+=`<div class="fade-in" style="margin-top:16px;background:${c.surface};border-radius:14px;border:1px solid ${c.border};overflow:hidden;box-shadow:${c.cardShadow}">
        <div style="background:linear-gradient(135deg,#1a6b47,#0f4c2b);padding:12px 18px;display:flex;align-items:center;justify-content:space-between">
          <div><p style="font-size:11px;color:rgba(255,255,255,.75);font-weight:700;text-transform:uppercase">Agendamentos do dia</p><p style="font-size:16px;font-weight:800;color:#fff;margin-top:2px">📅 ${d2}/${m2}/${a2}</p></div>
          <button onclick="_A.diaSel=null;re()" style="background:rgba(255,255,255,.2);border:none;border-radius:8px;color:#fff;font-size:13px;font-weight:700;padding:5px 12px;cursor:pointer">✕ Fechar</button>
        </div>
        <div style="padding:14px 18px">
          ${!rsdia.length?`<p style="font-size:13px;color:${c.textMuted};text-align:center;padding:16px 0">🎉 Nenhum agendamento neste dia.</p>`:rsdia.map(r=>admRow(r)).join("")}
        </div>
      </div>`;
    }
  }

  // MODO AGENDA
  if(_A.modoVisu==="agenda"){
    const urg=filtradas.filter(r=>r.status==="pendente"&&isUrgente(r.data,r.horario));
    const pend=filtradas.filter(r=>r.status==="pendente"&&!isUrgente(r.data,r.horario));
    const conf=filtradas.filter(r=>r.status!=="pendente"&&(_A.historico||r.data>=h));

    html+=`<div style="display:flex;gap:2px;margin-bottom:18px;background:${c.surface};border-radius:10px;padding:4px;border:1px solid ${c.border};width:fit-content">
      ${[{id:"reservas",l:"📋 Reservas"},{id:"espacos",l:"🏛️ Por Espaço"},{id:"turma",l:"🎓 Por Turma"},{id:"fotos",l:"📸 Fotos"}].map(t=>`<button onclick="aSetAba('${t.id}')" style="${btn(_A.aba===t.id?"navy":"ghost")};padding:7px 15px;font-size:12.5px;white-space:nowrap">${t.l}</button>`).join("")}
    </div>`;

    if(_A.aba==="reservas"){
      if(urg.length){
        html+=`<div style="margin-bottom:18px"><div style="display:flex;align-items:center;gap:8px;margin-bottom:10px"><div style="width:8px;height:8px;border-radius:50%;background:#f97316"></div><p style="font-size:12px;font-weight:800;color:#c2410c;text-transform:uppercase">⚡ Curto prazo · ${urg.length}</p><div style="flex:1;height:1px;background:#fed7aa"></div></div>`;
        urg.sort((a,b)=>a.data>b.data?1:a.data<b.data?-1:a.horario>b.horario?1:-1).forEach(r=>{html+=admRow(r,true);});
        html+=`</div>`;
      }
      if(pend.length){
        html+=`<div style="margin-bottom:18px"><div style="display:flex;align-items:center;gap:8px;margin-bottom:10px"><div style="width:8px;height:8px;border-radius:50%;background:#d97706"></div><p style="font-size:12px;font-weight:800;color:${c.amber};text-transform:uppercase">Pendentes · ${pend.length}</p><div style="flex:1;height:1px;background:${c.amberBorder}"></div></div>`;
        pend.sort((a,b)=>a.data>b.data?1:a.data<b.data?-1:a.horario>b.horario?1:-1).forEach(r=>{html+=admRow(r,true);});
        html+=`</div>`;
      }
      if(conf.length){
        const pd={};conf.sort((a,b)=>a.data>b.data?1:a.data<b.data?-1:a.horario>b.horario?1:-1).forEach(r=>{if(!pd[r.data])pd[r.data]=[];pd[r.data].push(r);});
        html+=`<div><div style="display:flex;align-items:center;gap:8px;margin-bottom:12px"><div style="width:8px;height:8px;border-radius:50%;background:${c.green}"></div><p style="font-size:12px;font-weight:800;color:${c.green};text-transform:uppercase">Confirmados · ${conf.length}</p><div style="flex:1;height:1px;background:${c.greenBorder}"></div></div>`;
        Object.entries(pd).forEach(([data,rs])=>{
          const[a2,m2,d2]=data.split("-");const isH=data===h,isFut=data>=h;
          html+=`<div style="margin-bottom:14px"><div style="display:flex;align-items:center;gap:10px;margin-bottom:8px"><div style="background:${isH?"#40b07a":isFut?c.navy:c.textMuted};color:#fff;border-radius:7px;padding:3px 12px;font-size:11.5px;font-weight:700;white-space:nowrap">${isH?"📌 Hoje":`${d2}/${m2}/${a2}`}</div><div style="flex:1;height:1px;background:${c.borderLight}"></div></div>`;
          rs.forEach(r=>{html+=admRow(r);});
          html+=`</div>`;
        });
        html+=`</div>`;
      }
      if(!urg.length&&!pend.length&&!conf.length)html+=`<p style="text-align:center;padding:32px;color:${c.textMuted};font-size:13px">Nenhuma reserva encontrada.</p>`;
    }

    if(_A.aba==="espacos"){
      ESPACOS.filter(e=>!_A.fEspaco||e.nome===_A.fEspaco).forEach(esp=>{
        const rs=filtradas.filter(r=>r.espaco===esp.nome&&r.status!=="recusado").sort((a,b)=>a.data>b.data?1:a.data<b.data?-1:a.horario>b.horario?1:-1);
        if(!rs.length)return;
        const pd={};rs.forEach(r=>{if(!pd[r.data])pd[r.data]=[];pd[r.data].push(r);});
        const livresHj=HORARIOS.length-rs.filter(r=>r.data===h).length;
        html+=`<div style="margin-bottom:16px;border-radius:12px;border:1px solid ${c.border};overflow:hidden">
          <div style="background:linear-gradient(135deg,${c.navy},${c.navyMid});padding:12px 18px;display:flex;align-items:center;justify-content:space-between">
            <div style="display:flex;align-items:center;gap:10px"><span style="font-size:18px">${tipoIcon(esp.tipo,esp.nome)}</span><div><p style="font-size:14px;font-weight:800;color:#fff">${esp.nome}</p><p style="font-size:11px;color:rgba(255,255,255,.65)">${rs.length} reserva${rs.length!==1?"s":""}</p></div></div>
            <div style="text-align:right"><p style="font-size:20px;font-weight:900;color:#fff;line-height:1">${livresHj}</p><p style="font-size:10px;color:rgba(255,255,255,.7);font-weight:700">livres hoje</p></div>
          </div>
          <div style="background:${c.surface};padding:10px 16px">`;
        Object.entries(pd).forEach(([data,drs])=>{
          const[a2,m2,d2]=data.split("-");const isH=data===h;
          html+=`<p style="font-size:11px;font-weight:700;color:${isH?"#40b07a":c.textMuted};font-family:'DM Mono',monospace;margin-bottom:6px">${isH?"📌 Hoje":`${d2}/${m2}/${a2}`}</p><div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px">`;
          drs.forEach(r=>{html+=`<div style="background:${c.bg};border:1px solid ${c.border};border-radius:8px;padding:6px 12px;font-size:12px;display:flex;align-items:center;gap:8px"><span style="font-weight:800;color:${c.blueMid};font-family:'DM Mono',monospace">${r.horario}</span><span style="color:${c.textMid};font-weight:600">${r.professor.split(" ")[0]}</span><span style="color:${c.textMuted}">${r.turma}</span>${badge(r.status)}</div>`;});
          html+=`</div>`;
        });
        html+=`</div></div>`;
      });
    }

    if(_A.aba==="fotos"){
      const comFoto=_todas.filter(r=>r.precisaFoto&&r.status!=="recusado"&&(_A.historico||r.data>=h)).sort((a,b)=>a.data>b.data?1:a.data<b.data?-1:a.horario>b.horario?1:-1);
      if(!comFoto.length)html+=`<div style="text-align:center;padding:32px;color:${c.textMuted}"><p style="font-size:28px">📷</p><p style="margin-top:8px">Nenhuma solicitação de foto.</p></div>`;
      else{
        const pd={};comFoto.forEach(r=>{if(!pd[r.data])pd[r.data]=[];pd[r.data].push(r);});
        html+=`<div style="display:flex;align-items:center;gap:8px;margin-bottom:14px"><div style="width:8px;height:8px;border-radius:50%;background:#7c3aed"></div><p style="font-size:12px;font-weight:800;color:#7c3aed;text-transform:uppercase">📸 Solicitações · ${comFoto.length}</p><div style="flex:1;height:1px;background:#ddd6fe"></div></div>`;
        Object.entries(pd).forEach(([data,rs])=>{
          const[a2,m2,d2]=data.split("-");const isH=data===h;
          html+=`<div style="margin-bottom:14px"><div style="display:flex;align-items:center;gap:10px;margin-bottom:8px"><div style="background:${isH?"#7c3aed":"#64748b"};color:#fff;border-radius:7px;padding:3px 12px;font-size:11.5px;font-weight:700">${isH?"📌 Hoje":`${d2}/${m2}/${a2}`}</div><div style="flex:1;height:1px;background:#ddd6fe"></div></div>`;
          rs.forEach(r=>{html+=`<div style="display:flex;gap:10px;padding:10px 14px;border-radius:10px;margin-bottom:6px;background:${c.surface};border:1px solid #ddd6fe;border-left:4px solid #7c3aed"><div style="min-width:52px;text-align:center"><p style="font-size:13px;font-family:'DM Mono',monospace;font-weight:800;color:#7c3aed">${r.horario}</p></div><div style="flex:1"><div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:3px"><span style="font-weight:700;font-size:13px;color:${c.navy}">${tipoIcon(ESPACOS.find(e=>e.nome===r.espaco)?.tipo,r.espaco)} ${r.espaco}</span><span style="font-size:11px;color:${c.textMuted}">·</span><span style="font-size:12px;color:${c.textMid}">${r.professor}</span><span style="font-size:11px;color:${c.textMuted}">·</span><span style="font-size:12px;color:${c.textMuted}">${r.turma}</span></div><p style="font-size:12px;color:${c.textMuted}">${r.conteudo}</p></div></div>`;});
          html+=`</div>`;
        });
      }
    }
    if(_A.aba==="turma"){
      const turmas=[...new Set(filtradas.map(r=>r.turma))].filter(Boolean).sort();
      turmas.forEach(turma=>{
        const rs=filtradas.filter(r=>r.turma===turma&&r.status!=="recusado").sort((a,b)=>a.data>b.data?1:a.data<b.data?-1:a.horario>b.horario?1:-1);
        if(!rs.length)return;
        html+=`<div style="margin-bottom:14px;border-radius:12px;border:1px solid ${c.border};overflow:hidden"><div style="background:${c.surface};padding:10px 16px;border-bottom:1px solid ${c.border};display:flex;align-items:center;gap:10px"><span style="font-size:16px">🎓</span><p style="font-size:14px;font-weight:800;color:${c.navy}">${turma}</p><span style="font-size:12px;color:${c.textMuted}">${rs.length} reserva${rs.length!==1?"s":""}</span></div><div style="padding:10px 16px">`;
        rs.forEach(r=>{html+=admRow(r,true);});
        html+=`</div></div>`;
      });
    }
  }

  html+=`</div>`;
  return html;
}

function admRow(r,showDate=false){
  const c=C(),h=fmtHoje();
  const urg=isUrgente(r.data,r.horario);
  const bc=r.status==="confirmado"?"#1a6b47":r.status==="pendente"?"#d97706":"#dc2626";
  const[a2,m2,d2]=r.data.split("-");
  const ex=extraInfo(r);
  return`<div class="row-hover" style="display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:10px;margin-bottom:6px;background:${urg&&r.status==="pendente"?"#fff7ed":r.data===h?"rgba(26,107,71,.05)":c.surface};border:1px solid ${urg&&r.status==="pendente"?"#f97316":r.data===h?"#40b07a44":c.border};border-left:4px solid ${urg&&r.status==="pendente"?"#f97316":bc}">
    <div style="min-width:52px;flex-shrink:0;text-align:center"><p style="font-size:13px;font-family:'DM Mono',monospace;font-weight:800;color:${urg&&r.status==="pendente"?"#c2410c":c.blueMid}">${r.horario}</p>${showDate?`<p style="font-size:10px;color:${c.textMuted};margin-top:1px">${d2}/${m2}</p>`:""}</div>
    <div style="width:1px;height:38px;background:${c.borderLight};flex-shrink:0"></div>
    <div style="flex:1;min-width:0">
      <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:3px">
        <span style="font-weight:700;font-size:13px;color:${c.navy}">${r.espaco}</span>
        <span style="font-size:11px;color:${c.textMuted}">·</span>
        <span style="font-size:12.5px;color:${c.textMid};font-weight:600">${r.professor}</span>
        <span style="font-size:11px;color:${c.textMuted}">·</span>
        <span style="font-size:12px;color:${c.textMuted}">${r.turma}</span>
      </div>
      <div style="display:flex;align-items:center;gap:7px;flex-wrap:wrap">
        ${badge(r.status)}
        ${urg&&r.status==="pendente"?`<span style="font-size:10.5px;font-weight:800;background:#fff7ed;color:#c2410c;border:1.5px solid #f97316;padding:1px 8px;border-radius:10px">⚡ URGENTE</span>`:""}
        ${r.precisaFoto?`<span style="font-size:10.5px;font-weight:800;background:#f5f3ff;color:#7c3aed;border:1.5px solid #ddd6fe;padding:1px 8px;border-radius:10px">📸 Foto</span>`:""}
        ${r.espaco==="Áudio/Visual"||r.observacoes?.includes("automaticamente")?`<span style="font-size:10.5px;font-weight:800;background:#f0f9ff;color:#0369a1;border:1.5px solid #bae6fd;padding:1px 8px;border-radius:10px">🎙️ A/V</span>`:""}
        ${r.conteudo?`<span style="font-size:11.5px;color:${c.textMuted};overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:180px">${r.conteudo}</span>`:""}
        ${ex?`<span style="font-size:11px;color:${c.textMuted};background:${c.bg};padding:1px 7px;border-radius:10px;border:1px solid ${c.border}">${ex}</span>`:""}
      </div>
    </div>
    <div style="display:flex;gap:5px;flex-shrink:0;align-items:center">
      <button onclick="abrirEdicao('${r.id}')" style="background:none;border:none;color:${c.textMuted};cursor:pointer;font-size:13px;padding:5px 8px">✏️</button>
      ${r.status==="pendente"?`<button onclick="aModerar('${r.id}','confirmado')" style="${btn("success","","sm")}">✓ Aprovar</button><button onclick="aModerar('${r.id}','recusado')" style="${btn("danger","","sm")}">✗</button>`:""}
      ${r.status==="confirmado"?`<button onclick="aModerar('${r.id}','recusado')" style="${btn("danger","","sm")}">✕ Cancelar</button>`:""}
      <button onclick="aExcluir('${r.id}')" style="background:none;border:none;color:${c.textMuted};cursor:pointer;font-size:13px;padding:4px">🗑</button>
    </div>
  </div>`;
}

function bindAdmin(){
  // Bind selects de filtro via addEventListener
  setTimeout(()=>{
    const se=document.getElementById("adm-sel-espaco");
    const sp=document.getElementById("adm-sel-prof");
    const ss=document.getElementById("adm-sel-status");
    const bl=document.getElementById("adm-btn-limpar");
    const bh=document.getElementById("adm-btn-hist");
    if(se)se.addEventListener("change",e=>{_A.fEspaco=e.target.value;re();});
    if(sp)sp.addEventListener("change",e=>{_A.fProf=e.target.value;re();});
    if(ss)ss.addEventListener("change",e=>{_A.fStatus=e.target.value;re();});
    if(bl)bl.addEventListener("click",()=>{_A.fEspaco="";_A.fProf="";_A.fStatus="";re();});
    if(bh)bh.addEventListener("click",()=>{_A.historico=!_A.historico;re();});
  },50);
}

// Tooltip do dia no admin
window.admDayHover=function(ds,evt){
  let tip=document.getElementById("adm-tip");
  if(!tip){tip=document.createElement("div");tip.id="adm-tip";tip.className="adm-day-tooltip";document.body.appendChild(tip);}
  // Buscar reservas do dia diretamente do estado
  const rs=_todas.filter(r=>r.data===ds&&r.status!=="recusado").sort((a,b)=>a.horario>b.horario?1:-1);

window.guCriarDireto=async()=>{
  const nome=document.getElementById("gu-nome")?.value?.trim();
  const email=document.getElementById("gu-email")?.value?.trim();
  const senha=document.getElementById("gu-senha")?.value;
  const perfil=document.getElementById("gu-perfil")?.value||"professor";
  const flash=document.getElementById("mod-gu-flash");
  if(!nome||!email||!senha||senha.length<6){
    if(flash)flash.innerHTML='<div style="background:#fef2f2;border:1px solid #fca5a5;border-radius:8px;padding:10px 14px;font-size:13px;color:#7f1d1d;margin-bottom:12px">Preencha todos os campos (senha mín. 6 chars).</div>';
    return;
  }
  const btn=document.querySelector('#mod-gu button[onclick="guCriarDireto()"]');
  if(btn)btn.textContent="Salvando...";
  try{
    const cred=await createUserWithEmailAndPassword(secAuth,email,senha);
    await secAuth.signOut();
    const p=email===ADMIN_EMAIL?"admin":perfil;
    await setDoc(doc(db,"usuarios",cred.user.uid),{nome,email,perfil:p,ativo:true,criadoEm:Timestamp.now()});
    document.getElementById("gu-nome").value="";
    document.getElementById("gu-email").value="";
    document.getElementById("gu-senha").value="";
    if(flash)flash.innerHTML='<div style="background:#e2f4ea;border:1px solid #6ee7a0;border-radius:8px;padding:10px 14px;font-size:13px;color:#0f4c2b;margin-bottom:12px">✅ '+nome+' cadastrado(a) com sucesso!</div>';
    renderGuLista();
  }catch(e){
    const msg=e.code==="auth/email-already-in-use"?"E-mail já cadastrado.":"Erro ao cadastrar: "+e.message;
    if(flash)flash.innerHTML='<div style="background:#fef2f2;border:1px solid #fca5a5;border-radius:8px;padding:10px 14px;font-size:13px;color:#7f1d1d;margin-bottom:12px">'+msg+'</div>';
  }
  if(btn)btn.textContent="+ Cadastrar";
};

window.guCriar=async()=>{

  try{

    _GU.nome="";_GU.email="";_GU.senha="";

    re();
    // Atualizar lista do modal se estiver aberto
    if(document.getElementById("mod-gu-lista"))renderGuLista();
  });
}
function stopListeners(){[_unsub1,_unsub2,_unsub3].forEach(u=>{try{u&&u();}catch{}});_unsub1=_unsub2=_unsub3=null;}

// ════════════════════════════════════════════════════════════════════════════
// AUTH
// ════════════════════════════════════════════════════════════════════════════
onAuthStateChanged(auth,async user=>{
  stopListeners();
  _todas=[];_minhas=[];_usuarios=[];
  if(user){
    try{
      const snap=await getDoc(doc(db,"usuarios",user.uid));
      _usuario=snap.exists()?{uid:user.uid,...snap.data()}:{uid:user.uid,email:user.email,perfil:"sem_acesso",ativo:false};
    }catch{_usuario={uid:user.uid,email:user.email,perfil:"sem_acesso",ativo:false};}
    if(_usuario.perfil!=="sem_acesso"&&_usuario.ativo!==false)startListeners(user.uid);
    else re();
  }else{
    _usuario=null;
    // Reservas públicas
    _unsub1=onSnapshot(collection(db,"reservas"),snap=>{
      _todas=snap.docs.map(d=>({id:d.id,...d.data()})).filter(r=>r&&r.professor&&r.data&&r.horario);
      re();
    });
    re();
  }
});
</script>
