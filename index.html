function vapidToUint8(base64String){
  const padding='='.repeat((4-base64String.length%4)%4);
  const base64=(base64String+padding).replace(/-/g,'+').replace(/_/g,'/');
  const rawData=window.atob(base64);
  const outputArray=new Uint8Array(rawData.length);
  for(let i=0;i<rawData.length;++i)outputArray[i]=rawData.charCodeAt(i);
  return outputArray;
}

window.ativarNotificacoes=async()=>{
  const uid=_usuario?.uid;
  if(!uid){alert("Faça login primeiro.");return;}
  if(!("Notification" in window)){alert("Seu navegador não suporta notificações.");return;}
  const btn=document.getElementById("btn-ativar-notif");
  try{
    if(btn){btn.textContent="⏳ Ativando...";btn.disabled=true;}
    // Pedir permissão primeiro
    const perm=await Notification.requestPermission();
    if(perm!=="granted"){
      if(btn){btn.textContent="🔔 Ativar notificações";btn.disabled=false;}
      alert("Permissão negada. Vá em Configurações → Reserva Arena → Notificações e ative.");
      return;
    }
    // Registrar SW e aguardar estar ativo
    const swReg=await navigator.serviceWorker.register("/firebase-messaging-sw.js",{scope:"/"});
    await navigator.serviceWorker.ready;
    // Tentar obter token sem passar serviceWorkerRegistration (compatibilidade iOS)
    let fcmToken=null;
    try{
      fcmToken=await getToken(_messaging,{applicationServerKey:vapidToUint8(VAPID_KEY),serviceWorkerRegistration:swReg});
    }catch(e1){
      console.warn("FCM tentativa 1 falhou:",e1.message);
      try{
        fcmToken=await getToken(_messaging,{applicationServerKey:vapidToUint8(VAPID_KEY)});
      }catch(e2){
        console.warn("FCM tentativa 2 falhou:",e2.message);
        throw e2;
      }
    }
    if(fcmToken){
      await updateDoc(doc(db,"usuarios",uid),{fcmToken});
      if(_usuario)_usuario.fcmToken=fcmToken; // atualiza estado local
      if(btn){btn.textContent="✅ Notificações ativas!";btn.style.background="#1a6b47";btn.style.color="#fff";btn.style.border="none";}
      setTimeout(()=>re(),2000);
    }else{
      if(btn){btn.textContent="🔔 Ativar notificações";btn.disabled=false;}
      alert("Não foi possível obter token. Tente novamente.");
    }
  }catch(e){
    console.warn("FCM erro:",e.code,e.message);
    if(btn){btn.textContent="🔔 Ativar notificações";btn.disabled=false;}
    alert("Erro ao ativar: "+e.message);
  }
};
async function iniciarNotificacoes(userId) {
  if (!_messaging || !('Notification' in window)) {
    console.warn('FCM: messaging indisponível ou Notification não suportado');
    return;
  }
  try {
    const swReg = await navigator.serviceWorker.register('/firebase-messaging-sw.js', { scope: '/' });
    console.log('FCM SW registrado:', swReg.scope);
    const perm = await Notification.requestPermission();
    console.log('FCM permissão:', perm);
    if (perm !== 'granted') return;
    const fcmToken = await getToken(_messaging, { applicationServerKey: vapidToUint8(VAPID_KEY), serviceWorkerRegistration: swReg });
    console.log('FCM token:', fcmToken ? fcmToken.slice(0,20)+'...' : 'VAZIO');
    if (fcmToken) {
      await updateDoc(doc(db, 'usuarios', userId), { fcmToken });
      console.log('✅ FCM token salvo no Firestore');
    } else {
      console.warn('FCM: token vazio — verifique VAPID key e SW');
    }
    onMessage(_messaging, payload => {
      const { title, body } = payload.notification || {};
      if (title) {
        const n = new Notification(title, { body, icon: '/icon-192.png', badge: '/icon-192.png' });
        n.onclick = () => { window.focus(); n.close(); };
      }
    });
  } catch(e) {
    console.warn('FCM erro:', e.code, e.message);
  }
}

const fmtHoje=()=>{const d=new Date();return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;};
function isDiaLetivo(data){
  if(!data)return false;
  const[a,m,d]=data.split("-").map(Number);
  const dt=new Date(a,m-1,d),dow=dt.getDay();
  if(dow===0||dow===6)return false;
  if(NAO_LETIVOS.has(data))return false;
  if(data<"2026-01-19"||data>"2026-12-10")return false;
  return true;
}
function isDiaLetivoTurma(data,turma){
  if(!isDiaLetivo(data))return false;
  const a=parseInt(turma);
  if(a>=1&&a<=5&&NAO_LETIVOS_INICIAIS.has(data))return false;
  return true;
}
function diasLetivosAte(dataStr){
  const agora=new Date();
  const[a,m,d]=dataStr.split("-").map(Number);
  const alvo=new Date(a,m-1,d,7,10,0);
  let count=0;
  const cur=new Date(agora);cur.setHours(0,0,0,0);
  const fim=new Date(alvo);fim.setHours(0,0,0,0);
  while(cur<fim){
    const ds=`${cur.getFullYear()}-${String(cur.getMonth()+1).padStart(2,"0")}-${String(cur.getDate()).padStart(2,"0")}`;
    if(isDiaLetivo(ds))count++;
    cur.setDate(cur.getDate()+1);
  }
  return count;
}
function isUrgente(data,horario){
  try{
    const agora=new Date();
    const[a,m,d]=data.split("-").map(Number);
    const[h,mn]=horario.split(":").map(Number);
    const ev=new Date(a,m-1,d,h,mn);
    const diff=(ev-agora)/3600000;
    if(diff<=0)return false;
    if(diff<24)return true;
    const dow=agora.getDay(),hora=agora.getHours()+agora.getMinutes()/60;
    if((dow===5&&hora>=17||dow===6||dow===0&&hora<7)&&diasLetivosAte(data)<1)return true;
    if(isDiaLetivo(data)&&diasLetivosAte(data)<1)return true;
    return false;
  }catch{return false;}
}
function isDiaUrgente(data){
  try{

    const[a,m,d]=data.split("-").map(Number);

    if(diff<=0)return false;
    if(diff<24)return true;
    const dow=agora.getDay(),hora=agora.getHours()+agora.getMinutes()/60;
    if((dow===5&&hora>=17||dow===6||dow===0&&hora<7)&&diasLetivosAte(data)<1)return true;
    if(isDiaLetivo(data)&&diasLetivosAte(data)<1)return true;
    return false;
  }catch{return false;}
}
function addDias(s,n){
  const[a,m,d]=s.split("-").map(Number);
  const dt=new Date(Date.UTC(a,m-1,d+n));
  return dt.toISOString().split("T")[0];
}
function getSegunda(s){
  const[a,m,d]=s.split("-").map(Number);
  const dt=new Date(Date.UTC(a,m-1,d));
  const dow=dt.getUTCDay();
  return addDias(s,dow===0?-6:1-dow);
}

  const iIni=HORARIOS.indexOf(ini),iFim=HORARIOS.indexOf(fim);
  if(iIni<0||iFim<0||iFim<iIni)return ini?[ini]:[];

}

function sel(){return inp()+";cursor:pointer";}
function btn(variant="primary",disabled=false,size="md"){
  const c=C();
  // No dark, navy vira verde real para manter legibilidade
  const navyBg=_dark?"#1a6b47":c.navy;
  const VM={primary:{bg:c.blueMid,col:"#fff",b:c.blueMid},navy:{bg:navyBg,col:"#fff",b:navyBg},danger:{bg:"#dc2626",col:"#fff",b:"#dc2626"},success:{bg:"#1a6b47",col:"#fff",b:"#1a6b47"},ghost:{bg:"transparent",col:c.text,b:c.border},amber:{bg:"#d97706",col:"#fff",b:"#d97706"}};
  const v=VM[variant]||VM.primary;
  const P={sm:"5px 12px",md:"9px 18px",lg:"12px 24px"};
  const F={sm:"12",md:"13.5",lg:"14.5"};
  return`background:${disabled?"#cbd5e1":v.bg};color:${disabled?"#94a3b8":v.col};border:1.5px solid ${disabled?"#cbd5e1":v.b};border-radius:8px;font-weight:700;cursor:${disabled?"not-allowed":"pointer"};padding:${P[size]||P.md};font-size:${F[size]||F.md}px;font-family:inherit`;
}
function alertHTML(type,msg){const c=C();const cfg={error:{bg:c.redBg,b:c.redBorder,col:c.red},success:{bg:c.greenBg,b:c.greenBorder,col:c.green},warning:{bg:c.amberBg,b:c.amberBorder,col:c.amber}};const v=cfg[type]||cfg.error;return`<div style="background:${v.bg};border:1px solid ${v.b};border-radius:8px;padding:10px 14px;font-size:13px;color:${v.col};line-height:1.5;margin-bottom:12px">${msg}</div>`;}

// ─── CALENDÁRIO MENSAL ────────────────────────────────────────────────────────
function calMensalHTML(cid,ano,mes,porData,dataSel){
  const c=C(),h=fmtHoje();
  const primeiroDia=new Date(Date.UTC(ano,mes,1));
  const diasNoMes=new Date(Date.UTC(ano,mes+1,0)).getUTCDate();
  const inicioGrid=primeiroDia.getUTCDay();
  const cells=[];for(let i=0;i<inicioGrid;i++)cells.push(null);for(let d=1;d<=diasNoMes;d++)cells.push(d);
  let dias="";
  cells.forEach((d,i)=>{
    if(!d){dias+=`<div></div>`;return;}
    const ds=`${ano}-${String(mes+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
    const isH=ds===h,isPast=ds<h,isSel=ds===dataSel,letivo=isDiaLetivo(ds);
    const dow=new Date(Date.UTC(ano,mes,d)).getUTCDay(),isFim=dow===0||dow===6;
    const nao=!letivo&&!isPast;
    const bg=isSel?"#40b07a":isH?"rgba(26,107,71,.12)":nao?"rgba(239,68,68,.08)":"transparent";
    const col=isSel?"#fff":isPast?"#cbd5e1":nao?"#fca5a5":isFim?"#ef4444":c.navy;
    const temRes=(porData[ds]||[]).length>0;
    dias+=`<button onclick="window._calClick('${cid}','${ds}')" ${isPast||!letivo?"disabled":""}
      style="aspect-ratio:1;border-radius:8px;border:none;cursor:${isPast||!letivo?"not-allowed":"pointer"};background:${bg};color:${col};font-weight:${isH||isSel?800:500};font-size:13.5px;position:relative;opacity:${isPast?.4:1};transition:all .15s;font-family:inherit">
      ${d}${temRes&&!isSel?`<div style="position:absolute;bottom:3px;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;background:#40b07a"></div>`:""}
    </button>`;
  });
  return`<div style="background:${c.surface};border-radius:16px;border:1px solid ${c.border};overflow:hidden">
    <div style="display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid ${c.border}">
      <button onclick="calNavMA(-1)" style="background:none;border:1px solid ${c.border};border-radius:8px;width:34px;height:34px;cursor:pointer;color:${c.textMid};font-size:16px;font-family:inherit">‹</button>
      <div style="text-align:center"><p style="font-size:17px;font-weight:800;color:${c.navy}">${MESES[mes]}</p><p style="font-size:12px;color:${c.textMuted}">${ano}</p></div>
      <button onclick="calNavMA(1)" style="background:none;border:1px solid ${c.border};border-radius:8px;width:34px;height:34px;cursor:pointer;color:${c.textMid};font-size:16px;font-family:inherit">›</button>
    </div>
    <div style="padding:12px 16px 16px">
      <div style="display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:6px">
        ${["D","S","T","Q","Q","S","S"].map((n,i)=>`<div style="text-align:center;font-size:10px;font-weight:700;color:${i===0||i===6?"#ef4444":c.textMuted};padding:4px 0">${n}</div>`).join("")}
      </div>
      <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px">${dias}</div>
    </div>
  </div>`;
}

let _usuario=null,_todas=[],_minhas=[],_usuarios=[];
let _unsub1=null,_unsub2=null,_unsub3=null;

function exigePermissao(perfisPermitidos){
  if(!_usuario){console.warn('Acesso negado: não autenticado');return false;}
  if(_usuario.ativo===false){console.warn('Acesso negado: conta inativa');return false;}
  if(!perfisPermitidos.includes(_usuario.perfil)){console.warn('Acesso negado: perfil sem permissão');return false;}
  return true;
}
function re(){
  const c=C();
  document.body.style.background=c.bg;
  document.body.style.color=c.text;
  if(!_usuario){renderPublica();return;}
  if(_usuario.perfil==="sem_acesso"||_usuario.ativo===false){renderSemAcesso();return;}
  if(_usuario.perfil==="fotografo"||_usuario.perfil==="marketing"){renderMarketing();return;}
  if(_usuario.perfil==="ti"){renderTI();return;}
  renderApp();
}

function renderPubConteudo(){
  const c=C(),h=fmtHoje();
  const ps=_pubState;
  const fonte=_todas.filter(r=>!r.reservaAutomatica&&r.status!=="recusado"&&(!ps.filtroEspaco||r.espaco===ps.filtroEspaco));
  let html="";

  // Card de cada reserva — sempre mostra tudo
  const pubCard=(r,compact=false)=>{
    const range=r.horarioFim&&r.horarioFim!==r.horario?`→${r.horarioFim}`:"";
    const turma=(r.turmaInicio||r.turma||"")+(r.turmaFim&&r.turmaFim!==(r.turmaInicio||r.turma)?` → ${r.turmaFim}`:"");
    const prof=nomeProf(r.professor);
    if(compact){
      return`<div style="background:${c.greenBg};border-radius:6px;padding:4px 6px;border-left:3px solid #1a6b47;margin-bottom:4px">
        <p style="font-size:9px;font-weight:800;font-family:'DM Mono',monospace;color:${c.green}">${r.horario}${range}</p>
        <p style="font-size:9px;font-weight:700;color:${c.navy};white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${tipoIcon(ESPACOS.find(e=>e.nome===r.espaco)?.tipo,r.espaco)} ${r.espaco.split(" ")[0]}</p>
        <p style="font-size:8px;color:${c.textMid};white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${turma} · ${prof}</p>
      </div>`;
    }
    return`<div style="display:flex;gap:10px;padding:10px 12px;border-radius:8px;background:${c.surface};border:1px solid ${c.border};border-left:4px solid #1a6b47;margin-bottom:6px">
      <div style="min-width:70px;flex-shrink:0">
        <p style="font-family:'DM Mono',monospace;font-weight:800;color:#40b07a;font-size:12px">${r.horario}${range?` ${range}`:""}</p>
      </div>
      <div style="flex:1;min-width:0">
        <p style="font-size:13px;font-weight:700;color:${c.navy}">${tipoIcon(ESPACOS.find(e=>e.nome===r.espaco)?.tipo,r.espaco)} ${r.espaco}</p>
        <p style="font-size:11px;color:${c.textMid};margin-top:2px">👤 ${r.professor}</p>
        <p style="font-size:11px;color:${c.textMuted};margin-top:1px">🎓 ${turma}</p>
      </div>
    </div>`;
  };

  if(ps.modo==="semana"){
    const dias=[];let dc=h;
    while(dias.length<5){const dow=new Date(dc+"T12:00:00").getDay();if(dow!==0&&dow!==6&&isDiaLetivo(dc))dias.push(dc);dc=addDias(dc,1);if(dc>addDias(h,30))break;}
    while(dias.length<5)dias.push(addDias(dias[dias.length-1],1));
    const nomes=dias.map(d=>{const dow=new Date(d+"T12:00:00").getDay();return["Dom","Seg","Ter","Qua","Qui","Sex","Sáb"][dow]+"."});
    html+=`<div style="display:grid;grid-template-columns:repeat(5,minmax(80px,1fr));gap:6px;overflow-x:auto">`;
    dias.forEach((d,i)=>{
      const[,,dia]=d.split("-");const isH=d===h;
      const rsD=fonte.filter(r=>r.data===d).sort((a,b)=>a.horario>b.horario?1:-1);
      html+=`<div style="background:${isH?"rgba(26,107,71,.06)":c.surface};border:1.5px solid ${isH?c.blueMid:c.border};border-radius:10px;padding:8px 6px;min-height:80px">
        <div style="text-align:center;margin-bottom:6px">
          <p style="font-size:10px;font-weight:700;color:${c.textMid};text-transform:uppercase">${nomes[i]}</p>
          <p style="font-size:18px;font-weight:900;line-height:1;color:${isH?c.blueMid:c.text}">${dia}</p>
        </div>`;
      if(!rsD.length)html+=`<p style="font-size:9px;color:${c.textMuted};opacity:.5;text-align:center">livre</p>`;
      else rsD.forEach(r=>{html+=pubCard(r,true);});
      html+=`</div>`;
    });
    html+=`</div>`;
  }

  if(ps.modo==="mes"){
    const{a,m}=ps.mesCal;
    const porData={};fonte.forEach(r=>{if(!porData[r.data])porData[r.data]=[];porData[r.data].push(r);});
    html+=calMensalHTML("pub",a,m,porData,ps.diaSel);
    if(ps.diaSel){
      const[a2,m2,d2]=ps.diaSel.split("-");
      const rs=fonte.filter(r=>r.data===ps.diaSel).sort((a,b)=>a.horario>b.horario?1:-1);
      html+=`<div class="fade-in" style="margin-top:10px;background:${c.surface};border-radius:12px;border:1px solid ${c.border};overflow:hidden">
        <div style="background:linear-gradient(135deg,#1a6b47,#0f4c2b);padding:10px 16px;display:flex;justify-content:space-between;align-items:center">
          <p style="font-size:14px;font-weight:800;color:#fff">📅 ${d2}/${m2}/${a2}</p>
          <button onclick="_pubState.diaSel=null;renderPubConteudo()" style="background:rgba(255,255,255,.2);border:none;border-radius:6px;color:#fff;padding:3px 10px;cursor:pointer;font-size:12px">✕</button>
        </div>
        <div style="padding:12px">`;
      if(!rs.length)html+=`<p style="font-size:13px;color:${c.textMuted};text-align:center;padding:12px 0">🎉 Dia livre.</p>`;
      else rs.forEach(r=>{html+=pubCard(r,false);});
      html+=`<div style="margin-top:10px;padding-top:10px;border-top:1px solid ${c.borderLight}"><button onclick="abrirLogin()" style="background:#1a6b47;color:#fff;border:none;border-radius:8px;font-weight:700;cursor:pointer;padding:9px 18px;font-size:13px;font-family:inherit;width:100%">+ Agendar neste dia</button></div>`;
      html+=`</div></div>`;
    }
  }

  if(ps.modo==="agenda"){
    const futuras=fonte.filter(r=>r.data>=h).sort((a,b)=>a.data>b.data?1:a.data<b.data?-1:a.horario>b.horario?1:-1);
    if(!futuras.length){html+=`<p style="text-align:center;padding:32px;color:${c.textMuted}">Nenhum agendamento futuro.</p>`;}
    else{
      const porData={};futuras.forEach(r=>{if(!porData[r.data])porData[r.data]=[];porData[r.data].push(r);});
      Object.entries(porData).forEach(([data,rs])=>{
        const[,m2,d2]=data.split("-");const isH=data===h;
        html+=`<div style="margin-bottom:16px">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
            <span style="font-size:11px;font-weight:700;color:${isH?c.green:c.textMid};background:${isH?c.greenBg:"transparent"};padding:${isH?"2px 8px":"0"};border-radius:20px">${isH?"📌 Hoje":`${d2}/${m2}`}</span>
            <div style="flex:1;height:1px;background:${c.borderLight}"></div>
          </div>`;
        rs.forEach(r=>{html+=pubCard(r,false);});
        html+=`</div>`;
      });
    }
  }

  render("pub-conteudo",html);
}

function bindPub(){
  window._calClick=(cid,data)=>{
    if(cid==="pub"){_pubState.diaSel=_pubState.diaSel===data?null:data;renderPubConteudo();}
  };
  window._calNav=(cid,dir)=>{
    if(cid==="pub"){let nm=_pubState.mesCal.m+dir,na=_pubState.mesCal.a;if(nm>11){nm=0;na++;}if(nm<0){nm=11;na--;}_pubState.mesCal={a:na,m:nm};renderPubConteudo();}
  };
}

let _pubState=null;
window.pubSetModo=m=>{_pubState.modo=m;renderPubConteudo();};
window.pubSetEspaco=v=>{_pubState.filtroEspaco=v;renderPubConteudo();};


window.abrirLogin=()=>{const m=$("modal-login");if(m)m.style.display="flex";};
window.fecharLogin=()=>{const m=$("modal-login");if(m)m.style.display="none";};
window.fazerLogin=async()=>{
  const email=$("inp-email")?.value?.trim(),senha=$("inp-senha")?.value;
  if(!email||!senha){render("login-erro",alertHTML("error","Preencha e-mail e senha."));return;}
  try{await signInWithEmailAndPassword(auth,email,senha);fecharLogin();}
  catch{render("login-erro",alertHTML("error","E-mail ou senha inválidos."));}
};
window.recuperarSenha=async()=>{
  const email=$("inp-email")?.value?.trim();
  if(!email){render("login-erro",alertHTML("warning","Digite seu e-mail acima."));return;}
  try{await sendPasswordResetEmail(auth,email);render("login-erro",alertHTML("success",`Link enviado para ${email}`));}
  catch{render("login-erro",alertHTML("error","Erro ao enviar. Verifique o e-mail."));}
};

function tiCard(r,pend){
  const c=C(),h=fmtHoje();
  const[a,m2,d]=r.data.split("-");
  const isH=r.data===h;
  const dias=["Dom","Seg","Ter","Qua","Qui","Sex","Sáb"];
  const dow=dias[new Date(r.data+"T12:00:00").getDay()];
  return`<div style="background:${c.surface};border-radius:12px;border:1.5px solid ${pend?"#fed7aa":"#a7f3d0"};padding:14px 18px;margin-bottom:10px;border-left:4px solid ${pend?"#f97316":"#1a6b47"}">
    <div style="display:flex;gap:14px;align-items:flex-start">
      <div style="text-align:center;min-width:52px;background:${pend?"#fff7ed":"#e2f4ea"};border-radius:8px;padding:6px 8px">
        <p style="font-size:11px;font-weight:700;color:${pend?"#c2410c":"#1a6b47"};text-transform:uppercase">${dow}</p>
        <p style="font-size:20px;font-weight:900;color:${pend?"#c2410c":"#1a6b47"};line-height:1">${d}</p>
        <p style="font-size:10px;color:${pend?"#c2410c":"#1a6b47"}">${m2}/${a.slice(2)}</p>
      </div>
      <div style="flex:1">
        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:4px">
          <span style="font-family:'DM Mono',monospace;font-weight:800;color:${pend?"#c2410c":"#1a6b47"};font-size:14px">${r.horario}${r.horarioFim&&r.horarioFim!==r.horario?" → "+r.horarioFim:""}</span>
          <span style="font-size:13px;font-weight:700;color:${c.navy}">${r.espaco}</span>
          ${isH?`<span style="background:#1a6b47;color:#fff;font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px">📌 Hoje</span>`:""}
          ${pend?`<span style="background:#fff7ed;color:#c2410c;font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;border:1px solid #fed7aa">⏳ Pendente</span>`:r.statusEquip==="recusado"?`<span style="background:#fef2f2;color:#dc2626;font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;border:1px solid #fecaca">❌ Equip. recusado</span>`:`<span style="background:#e2f4ea;color:#1a6b47;font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;border:1px solid #a7f3d0">✅ Confirmado</span>`}
        </div>
        <p style="font-size:12px;color:${c.textMid};margin-bottom:2px">👤 ${r.professor} · ${r.turmaInicio||r.turma||"—"}</p>
        <p style="font-size:12px;color:${c.textMuted}">${r.conteudo}</p>
        ${r.local?`<p style="font-size:11px;color:#0369a1;margin-top:3px;font-weight:700">📍 ${r.local}${r.localDevolucao&&r.localDevolucao!==r.local?" → "+r.localDevolucao:""}</p>`:""}
        ${(r.microfones>0||r.caixasom>0||r.projetor>0||r.bibMic>0||r.bibCaixa>0||r.bibProj>0)?`<div style="display:flex;flex-wrap:wrap;gap:5px;margin-top:6px">${(r.microfones||r.bibMic)>0?`<span style="background:#e0f2fe;color:#0369a1;font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;border:1px solid #bae6fd">🎤 ${(r.microfones||0)+(r.bibMic||0)} microfone(s)</span>`:""} ${(r.caixasom||r.bibCaixa)>0?`<span style="background:#e0f2fe;color:#0369a1;font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;border:1px solid #bae6fd">🔊 ${(r.caixasom||0)+(r.bibCaixa||0)} caixa(s)</span>`:""} ${(r.projetor||r.bibProj)>0?`<span style="background:#e0f2fe;color:#0369a1;font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;border:1px solid #bae6fd">📽️ ${(r.projetor||0)+(r.bibProj||0)} projetor(es)</span>`:""}</div>`:""}
      </div>
    </div>
    ${pend?`<div style="display:flex;gap:8px;margin-top:12px">
      <button onclick="window.tiAprovar('${r.id}')" style="flex:1;padding:9px;border-radius:8px;border:none;background:#1a6b47;color:#fff;font-weight:700;font-size:13px;cursor:pointer">✅ Aprovar</button>

    </div>`}
  </div>`;
}
window.tiAprovar=async(id)=>{
  
  const r=_todas.find(r=>r.id===id);
  // Marca apenas equipamento como aprovado — NÃO altera status da reserva
  try{await updateDoc(doc(db,"reservas",id),{statusEquip:"aprovado"});}catch(e){alert("Erro ao aprovar: "+e.message);return;}
  if(r){
    const dataFmt=r.data.split("-").reverse().join("/");
    await gravarNotif(r.professorId,"✅ Equipamento confirmado pelo T.I.",`${r.espaco} — ${dataFmt} às ${r.horario}`,"aprovacao");
    _usuarios.filter(u=>u.perfil==="admin").forEach(u=>
      gravarNotif(u.uid,"✅ T.I. confirmou equipamento",`${r.professor} — ${r.espaco} ${dataFmt} às ${r.horario}`,"info")
    );
  }
  re();
};
window.tiRecusar=async(id)=>{
  
  const r=_todas.find(r=>r.id===id);
  // Apenas marca equipamento como recusado — NÃO altera status da reserva de espaço
  try{await updateDoc(doc(db,"reservas",id),{statusEquip:"recusado"});}catch(e){alert("Erro ao recusar: "+e.message);return;}
  if(r){
    const dataFmt=r.data.split("-").reverse().join("/");
    await gravarNotif(r.professorId,"❌ Equipamento indisponível",`T.I. informou que não haverá equipamento disponível para ${r.espaco} — ${dataFmt} às ${r.horario}. Sua reserva do espaço continua confirmada.`,"recusa");
    _usuarios.filter(u=>u.perfil==="admin").forEach(u=>
      gravarNotif(u.uid,"❌ T.I. recusou equipamento",`${r.professor} — ${r.espaco} ${dataFmt} às ${r.horario}`,"info")
    );
  }
  re();
};

  html+=`</div></div>`;

function profRRow(r){

  const isMeu=r.professorId===_usuario?.uid;
  const isPend=r.status==="pendente";
  const bg=isMeu?(isPend?"rgba(255,237,213,.85)":"rgba(187,235,210,.6)"):c.surface;
  const bl=isMeu?(isPend?"#f97316":"#1a6b47"):"#e2e8f0";
  const ex=extraInfo(r);
  const range=r.horarioFim&&r.horarioFim!==r.horario?` → ${r.horarioFim}`:"";
  const turmaLabel=r.turmaInicio||(r.turma||"");
  const turmaFimLabel=r.turmaFim&&r.turmaFim!==r.turmaInicio?` → ${r.turmaFim}`:"";
  return`<div class="row-hover" style="display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:8px;background:${bg};border:1px solid ${c.border};margin-bottom:4px;border-left:4px solid ${bl}">
    <span style="font-size:13px;font-family:'DM Mono',monospace;font-weight:800;color:${isMeu?c.green:"#64748b"};min-width:42px;flex-shrink:0">${r.horario}</span>
    <div style="flex:1;min-width:0">
      <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:2px">
        <span style="font-weight:700;font-size:13px;color:${c.navy}">${r.espaco}</span>
        ${range?`<span style="font-size:11px;font-weight:700;color:${c.blueMid};background:${c.greenBg};padding:1px 7px;border-radius:10px">${r.horario}${range}</span>`:""}
        <span style="font-size:11px;color:${c.textMuted}">·</span>
        <span style="font-size:12px;color:${c.textMid}">${turmaLabel}${turmaFimLabel}</span>
        ${ex?`<span style="font-size:11px;background:#e2f4ea;color:#0f4c2b;border:1px solid #86efac;border-radius:6px;padding:1px 6px;font-weight:700">${ex}</span>`:""}
        <span style="font-size:11px;color:${isMeu?c.green:c.textMuted};background:${c.bg};padding:1px 8px;border-radius:10px;border:1px solid ${c.borderLight};font-weight:${isMeu?700:400}">${isMeu?"👤 eu":r.professor?.split(" ")[0]||""}</span>
      </div>
      <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
        ${isPend?`<span style="font-size:11.5px;font-weight:800;background:${c.amberBg};color:${c.amber};border:1.5px solid ${c.amberBorder};border-radius:20px;padding:2px 10px">⏳ Pendente</span>`:badge(r.status)}
      </div>
    </div>
    <div style="display:flex;gap:4px;flex-shrink:0">
      ${isMeu&&r.data>=h&&r.status!=="recusado"?`<button onclick="abrirEdicao('${r.id}')" style="background:none;border:none;color:${c.textMuted};cursor:pointer;font-size:13px;padding:5px 8px">✏️</button><button onclick="cancelarR('${r.id}')" style="background:none;border:none;color:${c.textMuted};cursor:pointer;font-size:13px;padding:5px 8px">✕</button>`:""}
    </div>
  </div>`;
}

function bindProf(){

// Função de limpeza — use no console: limparHorariosTravados("Lab. de Matemática","2026-06-17")
window.limparHorariosTravados=async(espaco,data)=>{
  const snap=await getDocs(query(collection(db,"reservas"),where("espaco","==",espaco),where("data","==",data)));
  if(!snap.docs.length){console.log("Nenhuma reserva encontrada");return;}
  const b=writeBatch(db);
  snap.docs.forEach(d=>b.delete(doc(db,"reservas",d.id)));
  await b.commit();
  console.log(`✅ ${snap.docs.length} reservas removidas de ${espaco} em ${data}`);
};
window.cancelarR=async id=>{
  if(!confirm("Cancelar esta reserva?"))return;
  // Buscar a reserva principal para saber espaco, data, horario
  const r=_todas.find(r=>r.id===id);
  if(!r){await deleteDoc(doc(db,"reservas",id));return;}
  // Deletar reserva principal
  const b=writeBatch(db);
  b.delete(doc(db,"reservas",id));
  // Deletar todas as reservas automáticas do mesmo espaco+data+professor
  _todas.filter(a=>
    a.reservaAutomatica&&
    a.espaco===r.espaco&&
    a.data===r.data&&
    a.professorId===r.professorId
  ).forEach(a=>b.delete(doc(db,"reservas",a.id)));
  await b.commit();
};

    </div>`;
  }).join(""):`<p style="text-align:center;color:${c.textMuted};padding:32px 0;font-size:13px">Nenhuma notificação ainda</p>`;
  overlay.innerHTML=`<div style="background:${c.surface};border:1.5px solid ${c.border};border-radius:16px;width:100%;max-width:360px;max-height:80vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 8px 32px rgba(0,0,0,.18)">

      <div style="display:flex;gap:8px;align-items:center">
        ${temNaoLidas?`<button onclick="marcarTodasLidas()" style="font-size:11px;font-weight:700;color:#1a6b47;background:none;border:1.5px solid #1a6b47;border-radius:20px;padding:3px 10px;cursor:pointer;font-family:inherit">✓ Marcar lidas</button>`:""} 
        <button onclick="fecharPainelNotif()" style="background:none;border:none;font-size:20px;cursor:pointer;color:${c.textMuted};line-height:1">×</button>
      </div>
    </div>
    <div style="overflow-y:auto;padding:14px 14px">${lista}</div>
  </div>`;
  document.body.appendChild(overlay);
  // Marcar como lidas ao abrir
  if(temNaoLidas){
    const batch=writeBatch(db);
    snap.docs.filter(d=>!d.data().lida).forEach(d=>batch.update(d.ref,{lida:true}));
    await batch.commit();
  }
}

window.marcarTodasLidas=async function marcarTodasLidas(){

// ─── BLOCO MULTI-HORÁRIO (range) ──────────────────────────────────────────
function maBlocoMultiHTML(b,i,eo){
  const c=C(),m=_MA;
  const tipo=eo?.tipo;
  const isEquip=tipo==="equipamento"||tipo==="audiovisual";
  const temEquipAuto=eo?.equipAuto&&eo.equipAuto.length>0;

  // Horários ocupados no espaço nesta data
  const ocpFire=_todas.filter(r=>r.espaco===m.espaco&&r.data===m.data&&r.status!=="recusado").flatMap(r=>{
    if(r.horarioFim&&r.horarioFim!==r.horario)return horariosRange(r.horario,r.horarioFim);
    return[r.horario];
  });
  // Bloqueios fixos por espaço (seg-sex)
  const BLOQUEIOS_FIXOS=[
    {espaco:"Sala de Dança",inicio:"11:45",fim:"13:45",label:"🌙 Soninho"}
  ];
  const [ano2,mes2,dia2]=(_MA.data||"2000-01-01").split("-").map(Number);
  const dowData=new Date(Date.UTC(ano2,mes2-1,dia2)).getUTCDay();
  const isDiaUtil=dowData>=1&&dowData<=5;
  const isBloqueado=(h)=>{
    if(m.espaco==="Sala de Dança"&&isDiaUtil){
      const [hh,mm]=h.split(":").map(Number);
      const minutos=hh*60+mm;
      return minutos>=11*60+45&&minutos<13*60+45;
    }
    return false;
  };

  // Horários disponíveis para fim (a partir do início)
  let dispFim=[];
  if(b.horario){
    const iIni=HORARIOS.indexOf(b.horario);
    dispFim=[b.horario];
    for(let idx=iIni+1;idx<HORARIOS.length;idx++){
      if(ocpFire.includes(HORARIOS[idx])||isBloqueado(HORARIOS[idx]))break;
      dispFim.push(HORARIOS[idx]);
    }
  }

  // Range de horários selecionado
  const rangeAtual=b.horario&&b.horarioFim?horariosRange(b.horario,b.horarioFim):[];

  // Validação: equipamentos precisam de local, outros precisam de pelo menos 1 turma no range
  const isAvulso=eo?.equipAvulso;
  const bValMulti=b=>{
    if(!b.horario||!b.horarioFim)return false;
    // Marketing: precisa de sala e pelo menos foto ou vídeo
    if(eo?.tipo==="marketing")return !!(b.salaAtividade&&b.conteudo&&(b.precisaFoto||b.precisaVideo));
    // Equipamentos avulsos: precisam de local início, término e conteúdo
    if(isAvulso)return !!(b.local&&b.conteudo); // localDevolucao opcional se 1 horário só
    // Equipamentos auto (Sala Multifuncional, Lab Mat): só precisam de conteúdo
    if(isEquip)return !!b.conteudo;
    // Labs de ciências: exige laboratorista
    if(eo?.tipo==="laboratorio"&&!b.laboratorista)return false;
    // Espaços com rotação: todos os horários do range precisam de turma
    if(rangeAtual.length===0)return false;
    const turmasOk=rangeAtual.every(h=>b.turmasPorHorario&&b.turmasPorHorario[h]);
    return turmasOk&&!!b.conteudo;
  };

  // Helper para select de turma
  const SEGMENTOS=[
  {id:"infantil",l:"Infantil",turmas:[
    {label:"Matutino",items:TURMAS_INFANTIL_MAT},
    {label:"Vespertino",items:TURMAS_INFANTIL_VESP}
  ]},
  {id:"fund1",l:"Fund. 1",turmas:[{label:"Fund. 1",items:TURMAS_FUND1}]},
  {id:"fund2",l:"Fund. 2",turmas:[{label:"Fund. 2",items:TURMAS_FUND2}]},
  {id:"outros",l:"Integral/Extras",turmas:[
    {label:"Integral",items:TURMAS_INTEGRAL},
    {label:"Extras",items:TURMAS_EXTRAS}
  ]},
];
const segAtual=b._segmento||"";
const turmasSeg=segAtual?SEGMENTOS.find(s=>s.id===segAtual)?.turmas||[]:[]; 
const selTurma=(horario,val)=>`
  <div style="display:flex;flex-direction:column;gap:6px">
    <div style="display:flex;gap:5px;flex-wrap:wrap">
      ${SEGMENTOS.map(s=>`<button onclick="window.maSetSegmento(${i},'${s.id}')" style="padding:5px 10px;font-size:11px;font-weight:700;border-radius:20px;border:1.5px solid ${segAtual===s.id?'#1a6b47':'#cbd5e1'};background:${segAtual===s.id?'#1a6b47':'transparent'};color:${segAtual===s.id?'#fff':'#475569'};cursor:pointer;font-family:inherit">${s.l}</button>`).join("")}
    </div>
    ${segAtual?`<select onchange="maSetTurmaPorHorario(${i},'${horario}',this.value)" style="${sel()};font-size:13px;padding:7px 10px">
      <option value="">Turma...</option>
      ${turmasSeg.map(g=>`<optgroup label="${g.label}">${g.items.map(t=>`<option ${val===t?"selected":""}>${t}</option>`).join("")}</optgroup>`).join("")}
    </select>`:""}
  </div>`;

  let html=`<div style="background:${c.bg};border:1.5px solid ${bValMulti(b)?c.blueMid+"55":c.border};border-radius:12px;padding:16px;margin-bottom:12px">
    <div style="display:grid;gap:14px">`;

  // ── Horário de início ──
  html+=`<div>
    <label style="font-size:12px;font-weight:700;color:${c.textMuted};text-transform:uppercase">🕐 Horário de início *</label>
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:8px">
      ${HORARIOS.map(h=>{
        const ocp=ocpFire.includes(h)&&h!==b.horario;
        const sel2=h===b.horario;
        // Bloquear horários já passados no dia de hoje
        const agoraRef=new Date();
        const hojeStr=agoraRef.toLocaleDateString('sv-SE');
        const [hh,mm]=h.split(':').map(Number);
        const passado=_MA.data===hojeStr&&(hh<agoraRef.getHours()||(hh===agoraRef.getHours()&&mm<=agoraRef.getMinutes()));
        const soninho=isBloqueado(h)&&h!==b.horario;
        const bloq=ocp||passado||soninho;
        return`<button onclick="maSetHorarioMulti(${i},'ini','${h}')" ${bloq?"disabled":""}
          style="padding:8px 4px;border-radius:8px;border:${sel2?"2px solid "+c.blueMid:bloq?"1.5px solid "+c.redBorder:"1.5px solid "+c.greenBorder};background:${sel2?c.greenBg:bloq?c.redBg:c.surface};color:${sel2?c.blueMid:bloq?c.red:c.green};font-size:11px;font-weight:700;cursor:${bloq?"not-allowed":"pointer"};font-family:'DM Mono',monospace;display:flex;flex-direction:column;align-items:center;gap:2px">
          ${h}<span style="font-size:8px">${ocp?"● Ocup":passado?"● Pass":soninho?"🌙 Son":sel2?"✓ Ini":"○"}</span>
        </button>`;

  return html;

// ─── BLOCO INDIVIDUAL (espaços não-multiHorario) ──────────────────────────
function maBlocoHTML(b,i,eo){
  const c=C(),m=_MA;
  const isLab=eo?.tipo==="laboratorio",isEquip=eo?.tipo==="equipamento";
  const ocpFire=_todas.filter(r=>r.espaco===m.espaco&&r.data===m.data&&r.status!=="recusado").map(r=>r.horario);
  const ocpOut=m.blocos.filter((_,idx)=>idx!==i).map(b=>b.horario).filter(Boolean);
  const ocpTodos=[...new Set([...ocpFire,...ocpOut])];
  let slots=`<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-top:6px">`;
  HORARIOS.forEach(h=>{
    const ocp=ocpTodos.includes(h),sel=h===b.horario;
    slots+=`<button onclick="maSetHorario(${i},'${h}')" ${ocp?"disabled":""}
      style="padding:9px 4px;border-radius:8px;border:${sel?"2px solid "+c.blueMid:ocp?"1.5px solid "+c.redBorder:"1.5px solid "+c.greenBorder};background:${sel?c.greenBg:ocp?c.redBg:c.greenBg};color:${sel?c.blueMid:ocp?c.red:c.green};font-size:12px;font-weight:700;cursor:${ocp?"not-allowed":"pointer"};display:flex;flex-direction:column;align-items:center;gap:3px;font-family:'DM Mono',monospace">${h}<span style="font-size:8px;font-weight:600;font-family:inherit">${ocp?"● Ocup":sel?"✓ Sel":"○ Livre"}</span></button>`;
  });
  slots+=`</div>`;
  return`<div style="background:${c.bg};border:1.5px solid ${b.horario?c.blueMid+"55":c.border};border-radius:12px;padding:16px;margin-bottom:12px">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
      <div style="display:flex;align-items:center;gap:8px"><div style="width:24px;height:24px;border-radius:50%;background:${b.horario?"#40b07a":"#cbd5e1"};color:#fff;font-weight:800;font-size:12px;display:flex;align-items:center;justify-content:center">${i+1}</div><span style="font-size:13px;font-weight:700;color:${c.navy}">${b.horario?`Turma ${i+1} · ${b.horario}`:`Turma ${i+1}`}</span></div>
      ${i>0?`<button onclick="maRemBloco(${i})" style="background:none;border:none;color:#ef4444;cursor:pointer;font-size:18px">✕</button>`:""}
    </div>
    <div style="display:grid;gap:13px">
      <div><label style="font-size:12px;font-weight:700;color:${c.textMuted};text-transform:uppercase">Horário *</label>${slots}</div>

function renderMAResumo(){
  const c=C(),m=_MA;
  const eo=ESPACOS.find(e=>e.nome===m.espaco);
  const isMulti=eo?.multiHorario;
  const[ano,mes,dia]=m.data.split("-");

  const dow=new Date(Date.UTC(+ano,+mes-1,+dia)).getUTCDay();
  const fimSem=dow===0||dow===6;
  const rangeHors=isMulti?horariosRange(b.horario,b.horarioFim):[];

    ?rangeHors.filter(h=>isUrgente(m.data,h))

          <p style="font-size:12px;font-weight:700;color:${c.green}">${rangeHors.length} horário${rangeHors.length!==1?"s":""} · ${m.espaco}</p>

          ${b.precisaFoto?`<p style="font-size:11px;color:#7c3aed;margin-top:2px">📸 Foto solicitada</p>`:""}${b.precisaVideo?`<p style="font-size:11px;color:#1d4ed8;margin-top:2px">🎬 Vídeo solicitado</p>`:""}

          ${b.qtdTablets>0?`<p style="font-size:11px;color:#0369a1;margin-top:2px">📱 ${b.qtdTablets} tablet${b.qtdTablets>1?"s":""}</p>`:""}
          ${b.qtdNotebooks>0?`<p style="font-size:11px;color:#0369a1;margin-top:2px">💻 ${b.qtdNotebooks} computador${b.qtdNotebooks>1?"es":""}</p>`:""}
        </div>
      </div>
      ${!isEquipResumo?`<div style="padding:8px 14px;display:grid;gap:4px">
        ${rangeHors.map(h=>{const t=tphResumo[h]||"—";return`<div style="display:flex;align-items:center;gap:10px;padding:5px 8px;border-radius:6px;background:${t!=="—"?c.greenBg+"80":c.bg};border:1px solid ${t!=="—"?c.greenBorder:c.borderLight}">
          <span style="font-family:'DM Mono',monospace;font-weight:800;color:${c.blueMid};font-size:12px;min-width:42px">${h}</span>
          <span style="font-size:13px;font-weight:700;color:${t!=="—"?c.navy:c.textMuted}">${t}</span>
          ${t!=="—"?`<span style="font-size:11px;color:${c.green};margin-left:auto">✓</span>`:`<span style="font-size:11px;color:${c.textMuted};margin-left:auto">sem turma</span>`}
        </div>`;}).join("")}
      </div>`:""}
      <div style="padding:8px 14px;border-top:1px solid ${c.borderLight}">

        <p style="font-size:12px;color:${c.textMuted}">${b.conteudo}</p>
      </div>
    </div>`;
  } else {
    html+=`<div style="display:grid;gap:8px;margin-bottom:12px">`;
    m.blocos.forEach((bl,i)=>{
      const isUrg=isUrgente(m.data,bl.horario);
      html+=`<div style="display:flex;gap:12px;align-items:flex-start;padding:10px 14px;background:${c.surface};border:1px solid ${isUrg?"#fed7aa":c.border};border-radius:8px;border-left:3px solid ${isUrg?"#f97316":"#40b07a"}">
        <div style="min-width:42px"><span style="font-family:'DM Mono',monospace;font-weight:800;color:${isUrg?"#c2410c":"#40b07a"};font-size:13px">${bl.horario}</span></div>
        <div style="flex:1"><p style="font-size:13px;font-weight:700;color:${c.navy}">${bl.turma}</p><p style="font-size:12px;color:${c.textMuted};margin-top:2px">${bl.conteudo}</p></div>
      </div>`;
    });
    html+=`</div>`;
  }

  if(precisaCiencia)html+=`<label style="display:flex;align-items:flex-start;gap:10px;margin-bottom:18px;cursor:pointer;padding:12px 14px;background:${c.surface};border:1.5px solid ${c.border};border-radius:10px"><input type="checkbox" id="chk-ciente" onchange="cienteChanged(this.checked)" style="width:18px;height:18px;margin-top:1px;accent-color:#1a6b47;flex-shrink:0;cursor:pointer"><span style="font-size:12px;color:${c.navy};line-height:1.5">${fimSem?"Estou ciente: ficará pendente até aprovação.":"Estou ciente do curto prazo. Entrarei em contato com o T.E."}</span></label>`;
  html+=`<div style="display:flex;gap:10px"><button onclick="maVoltarRevisao()" style="${btn("ghost")};flex:1;padding:11px">✏️ Editar</button><button id="btn-conf" onclick="maSalvar()" style="flex:2;padding:11px;font-size:13.5px;border-radius:8px;border:none;font-weight:700;font-family:inherit;cursor:${precisaCiencia?'not-allowed':'pointer'};background:${precisaCiencia?'#cbd5e1':'#1a6b47'};color:${precisaCiencia?'#94a3b8':'#fff'}" ${precisaCiencia?"disabled":""}>${m.salvando?"⏳ Aguarde...":"✓ Confirmar"}</button></div></div>`;
  return html;
}

};
window.maSetHorario=(i,h)=>{_MA.blocos[i].horario=h;re();setTimeout(atualizarBotoesAgendar,50);};
window.maSetHorarioMulti=(i,tipo,h)=>{
  if(tipo==="ini"){
    _MA.blocos[i].horario=h;
    _MA.blocos[i].horarioFim=h;
  } else {
    _MA.blocos[i].horarioFim=h;
  }
  // Verificar conflito em tempo real após selecionar horário
  _MA.avisoConflito="";
  const eo=ESPACOS.find(e=>e.nome===_MA.espaco);
  if(!eo?.equipAvulso&&_MA.blocos[i].horario){
    const range=horariosRange(_MA.blocos[i].horario,_MA.blocos[i].horarioFim||_MA.blocos[i].horario);
    const conflitos=_todas.filter(r=>
      r.professorId===_usuario?.uid&&
      r.data===_MA.data&&
      r.status!=="recusado"&&
      !r.reservaAutomatica&&
      r.espaco!==_MA.espaco&&
      !ESPACOS.find(e=>e.nome===r.espaco)?.equipAvulso&&
      range.includes(r.horario)
    );
    if(conflitos.length>0){
      const c=conflitos[0];
      _MA.avisoConflito=`Você já tem o <strong>${c.espaco}</strong> reservado às <strong>${c.horario}</strong>. Confirme se este é o horário correto.`;
    }

  re();
};
window.maSetBloco=(i,k,v)=>{_MA.blocos[i][k]=v;};
window.maIncEquip=(i,campo,max)=>{_MA.blocos[i][campo]=Math.min(max,(_MA.blocos[i][campo]||0)+1);re();};

window.bibInc=(campo,max)=>{_MA[campo]=Math.min(max||10,(_MA[campo]||0)+1);re();};
window.bibDec=(campo)=>{_MA[campo]=Math.max(0,(_MA[campo]||0)-1);re();};
window.avInc=(i,campo,max)=>{_MA.blocos[i][campo]=Math.min(max||10,Number(_MA.blocos[i][campo]||0)+1);re();};
window.avDec=(i,campo)=>{_MA.blocos[i][campo]=Math.max(0,Number(_MA.blocos[i][campo]||0)-1);re();};
window.maDecEquip=(i,campo)=>{_MA.blocos[i][campo]=Math.max(0,(_MA.blocos[i][campo]||0)-1);re();};
window.maSetTurmaPorHorario=(i,horario,turma)=>{
  if(!_MA.blocos[i].turmasPorHorario)_MA.blocos[i].turmasPorHorario={};
  _MA.blocos[i].turmasPorHorario[horario]=turma;
  // Propagar para horários seguintes que ainda estão vazios
  const b=_MA.blocos[i];
  const eo=ESPACOS.find(e=>e.nome===_MA.espaco);
  if(b.horario&&b.horarioFim){
    const range=gerarRange(b.horario,b.horarioFim,eo);
    let propagando=false;
    for(const h of range){
      if(h===horario){propagando=true;continue;}
      if(propagando&&!b.turmasPorHorario[h])b.turmasPorHorario[h]=turma;
    }
  }
  re();
};

window.maSetConteudo=(i,v)=>{_MA.blocos[i].conteudo=v;};

// ─── SALVAR AGENDAMENTO ───────────────────────────────────────────────────
window.maSalvar=async()=>{
  // Bloquear se precisaCiencia e checkbox não marcado
  const chkCiente=document.getElementById('chk-ciente');
  if(chkCiente&&!chkCiente.checked){
    alert('Marque a caixa de ciência antes de confirmar.');
    return;
  }
  _MA.salvando=true;_MA.erro="";re();
  const{espaco,data,blocos}=_MA;
  const eo=ESPACOS.find(e=>e.nome===espaco);

  try{
    const b=blocos[0];
    const rangeHors=horariosRange(b.horario,b.horarioFim);

    // 1. Verificar conflitos de espaço (mesmo espaço, mesmo horário)
    const snapConflitos=await Promise.all(rangeHors.map(h=>
      getDocs(query(collection(db,"reservas"),where("espaco","==",espaco),where("data","==",data),where("horario","==",h)))
    ));
    for(let i=0;i<rangeHors.length;i++){
      const existe=snapConflitos[i].docs.map(d=>d.data()).find(r=>r?.status!=="recusado");
      if(existe){_MA.erro=`Horário ${rangeHors[i]} já reservado por ${existe.professor}.`;_MA.salvando=false;_MA.resumo=false;re();return;}
    }

    // 1b. Verificar se o professor já tem outro ESPAÇO reservado nos mesmos horários
    // (equipamentos avulsos não bloqueiam — professor pode ter sala + tablets no mesmo horário)
    const isEquipAvulsoSalvar=eo?.equipAvulso;
    if(!isEquipAvulsoSalvar){
      const snapProfConflitos=await Promise.all(rangeHors.map(h=>
        getDocs(query(collection(db,"reservas"),
          where("professorId","==",_usuario.uid),
          where("data","==",data),
          where("horario","==",h),
          where("reservaAutomatica","==",false)
        ))
      ));
      for(let i=0;i<rangeHors.length;i++){
        const conflito=snapProfConflitos[i].docs.map(d=>d.data()).find(r=>
          r?.status!=="recusado"&&
          r?.espaco!==espaco&&
          !ESPACOS.find(e=>e.nome===r?.espaco)?.equipAvulso
        );
        if(conflito){
          _MA.erro=`Você já tem o <strong>${conflito.espaco}</strong> reservado às <strong>${rangeHors[i]}</strong>. Confirme se este é o horário correto.`;
          _MA.salvando=false;_MA.resumo=false;re();return;
        }
      }
    }

    // 2. Verificar conflitos de equipamentos automáticos em paralelo
    const equipAuto=eo.equipAuto||[];
    const equipSnaps={};
    // Só consulta equipamentos se professor selecionou alguma quantidade
    const qtdTablets=Number(blocos[0]?.qtdTablets)||0;
    const qtdNotebooks=Number(blocos[0]?.qtdNotebooks)||0;
    if(equipAuto.length>0&&(qtdTablets>0||qtdNotebooks>0)){
      const eqPromises=[];
      for(const nomeEquip of equipAuto){
        for(const h of rangeHors){
          eqPromises.push(
            getDocs(query(collection(db,"reservas"),where("espaco","==",nomeEquip),where("data","==",data),where("horario","==",h)))
            .then(snap=>({nomeEquip,h,snap}))
            .catch(()=>({nomeEquip,h,snap:{docs:[]}}))
          );
        }
      }
      const eqResults=await Promise.all(eqPromises).catch(()=>[]);
      eqResults.forEach(({nomeEquip,h,snap})=>{
        if(!equipSnaps[nomeEquip])equipSnaps[nomeEquip]={};
        equipSnaps[nomeEquip][h]=!snap.docs.find(d=>d.data()?.status!=="recusado");
      });
    }

    // 3. Determinar status
    const algUrgente=rangeHors.some(h=>isUrgente(data,h));
    const[ano,mes,dia]=data.split("-").map(Number);
    const dow=new Date(Date.UTC(ano,mes-1,dia)).getUTCDay();
    const eoSalvar=ESPACOS.find(e=>e.nome===espaco);
    const temMidia=blocos[0]?.precisaFoto||blocos[0]?.precisaVideo||eoSalvar?.tipo==="marketing";
    const temBibAV=(_MA.bibAV===true)&&(_MA.bibMic>0||_MA.bibCaixa>0||_MA.bibProj>0);
    const temAV=eoSalvar?.tipo==="audiovisual";
    // Equipe de Marketing: sempre pendente (aguarda aprovação da equipe)
    const statusMarketing=temMidia?"pendente":null;
    // Pendente se: urgente, fim de semana, mídia solicitada OU equipamento AV solicitado
    const st=(algUrgente||dow===0||dow===6||(temAV&&eoSalvar?.tipo==="audiovisual"))?"pendente":"confirmado";

    const tph=b.turmasPorHorario||{};
    const isEquipSalvar=eo?.tipo==="equipamento"||eo?.tipo==="audiovisual";
    const ts=Timestamp.now();

    // 4. Montar todos os documentos e salvar em batch (muito mais rápido)
    const batch=writeBatch(db);

    // Reserva principal
    const dadosPrincipal={
      professor:_usuario.nome,professorId:_usuario.uid,professorEmail:_usuario.email,
      turma:isEquipSalvar?"":(tph[b.horario]||""),
      turmaInicio:isEquipSalvar?"":(tph[b.horario]||""),
      turmaFim:isEquipSalvar?"":(tph[b.horarioFim]||tph[b.horario]||""),
      turmasPorHorario:tph,
      espaco,data,horario:b.horario,horarioFim:b.horarioFim,
      conteudo:b.conteudo,observacoes:b.observacoes||"",
      local:b.local||"",localMontagem:b.local||"",localDevolucao:b.localDevolucao||"",
      quantidade:eo?.tipo==="equipamento"?Number(b.quantidade):null,
      microfones:Number(b.microfones)||0,caixasom:Number(b.caixasom)||0,projetor:Number(b.projetor)||0,
      status:st,criadoEm:ts,precisaFoto:b.precisaFoto||false,precisaVideo:b.precisaVideo||false,objetivoMidia:b.objetivoMidia||"",descritivo:b.descritivo||"",salaAtividade:b.salaAtividade||"",...(statusMarketing?{statusMarketing}:{}),...((temAV||temBibAV)?{statusEquip:"pendente"}:{}),...(_MA.bibAV===true?{bibMic:_MA.bibMic||0,bibCaixa:_MA.bibCaixa||0,bibProj:_MA.bibProj||0}:{}),
      paginas:"",laboratorista:"",reservaAutomatica:false,
      qtdTablets:Number(b.qtdTablets)||0,qtdNotebooks:Number(b.qtdNotebooks)||0,
    };
    batch.set(doc(collection(db,"reservas")),dadosPrincipal);

    // Reservas automáticas (horários intermediários)
    for(let idx=1;idx<rangeHors.length;idx++){
      const hAtual=rangeHors[idx];
      const turmaAtual=isEquipSalvar?"":(tph[hAtual]||"");
      batch.set(doc(collection(db,"reservas")),{
        ...dadosPrincipal,
        horario:hAtual,horarioFim:hAtual,
        turma:turmaAtual,turmaInicio:turmaAtual,turmaFim:turmaAtual,
        reservaAutomatica:true,conteudo:"[Auto] "+b.conteudo
      });
    }

    // Equipamentos automáticos (Sala Multifuncional, Lab Mat)
    for(const nomeEquip of equipAuto){
      const qtd=nomeEquip.includes("Tablet")?Number(b.qtdTablets):Number(b.qtdNotebooks);
      if(!qtd||qtd<=0)continue;
      for(const h of rangeHors){
        if(equipSnaps[nomeEquip]?.[h]){
          batch.set(doc(collection(db,"reservas")),{
            professor:_usuario.nome,professorId:_usuario.uid,professorEmail:_usuario.email,
            turma:tph[h]||"",espaco:nomeEquip,data,horario:h,horarioFim:h,
            conteudo:`Vinculado à ${espaco} — ${b.conteudo}`,
            quantidade:qtd,status:st,criadoEm:ts,
            precisaFoto:false,observacoes:`Agendado automaticamente via ${espaco}`,
            localMontagem:espaco,reservaAutomatica:true,paginas:"",laboratorista:"",
          });
        }
      }
    }

    // A/V automático se bibAV=true
    if(_MA.bibAV===true){
      const avSnaps=await Promise.all(rangeHors.map(h=>
        getDocs(query(collection(db,"reservas"),where("espaco","==","Som, Microfone e Projetor"),where("data","==",data),where("horario","==",h)))
      ));
      rangeHors.forEach((h,idx)=>{
        if(!avSnaps[idx].docs.find(d=>d.data()?.status!=="recusado")){
          batch.set(doc(collection(db,"reservas")),{
            professor:_usuario.nome,professorId:_usuario.uid,professorEmail:_usuario.email,
            turma:tph[h]||"",espaco:"Som, Microfone e Projetor",data,horario:h,horarioFim:h,
            conteudo:`A/V vinculado à ${espaco} — ${b.conteudo}`,
            localMontagem:espaco,status:st,criadoEm:ts,precisaFoto:false,
            paginas:"",laboratorista:"",quantidade:null,reservaAutomatica:true,
            microfones:0,caixasom:0,projetor:0,observacoes:"Auto via "+espaco,
          });
        }
      });
    }

    // ── Recorrência semanal ──
    if(_MA.recorrente&&!isEquipSalvar){
      const serieId=Math.random().toString(36).slice(2,10);
      dadosPrincipal.serieId=serieId;
      dadosPrincipal.recorrente=true;
      const[anoR,mesR,diaR]=data.split("-").map(Number);
      let cursor=new Date(Date.UTC(anoR,mesR-1,diaR));
      cursor.setUTCDate(cursor.getUTCDate()+7);
      const FIM_SEMESTRE="2026-12-10";
      while(true){
        const y=cursor.getUTCFullYear(),mo=String(cursor.getUTCMonth()+1).padStart(2,'0'),d2=String(cursor.getUTCDate()).padStart(2,'0');
        const ds=`${y}-${mo}-${d2}`;
        if(ds>FIM_SEMESTRE)break;
        if(isDiaLetivo(ds)){
          const tphRec={};
          rangeHors.forEach(h=>{tphRec[h]=tph[h]||Object.values(tph)[0]||""});
          // Ocorrências futuras sempre confirmadas — só a primeira segue regra de urgência
          const dadosRec={...dadosPrincipal,data:ds,status:"confirmado",
            turmasPorHorario:tphRec,
            turma:Object.values(tphRec)[0]||"",
            turmaInicio:Object.values(tphRec)[0]||"",
            turmaFim:Object.values(tphRec)[Object.values(tphRec).length-1]||""
          };
          batch.set(doc(collection(db,"reservas")),dadosRec);
          for(let idx2=1;idx2<rangeHors.length;idx2++){
            const hAtu=rangeHors[idx2];
            batch.set(doc(collection(db,"reservas")),{
              ...dadosRec,horario:hAtu,horarioFim:hAtu,
              turma:tphRec[hAtu]||"",turmaInicio:tphRec[hAtu]||"",turmaFim:tphRec[hAtu]||"",
              reservaAutomatica:true,conteudo:"[Auto] "+b.conteudo
            });
          }
        }
        cursor.setUTCDate(cursor.getUTCDate()+7);
      }
    }

    // 5. Commit do batch — uma única operação de rede!
    await Promise.race([
      batch.commit(),
      new Promise((_,rej)=>setTimeout(()=>rej(new Error("Timeout ao salvar")),15000))
    ]);
    _MA.sucesso=st;_MA.temMidia=temMidia||false;_MA.tipoEspaco=eoSalvar?.tipo||"";_MA.salvando=false;re();

    // 6. Notificações push (background) para equipes responsáveis
    try {
      const dataFmt=data.split("-").reverse().join("/");
      const horFmt=blocos[0]?.horario||"";
      const profNome=_usuario?.nome||"Professor";

      // Marketing: agendamento com foto, vídeo ou espaço Equipe de Marketing
      if(temMidia){
        const msgMK=`📸 Nova solicitação de ${(blocos[0]?.precisaFoto&&blocos[0]?.precisaVideo)?"foto e vídeo":blocos[0]?.precisaFoto?"foto":"vídeo"}\n${profNome} · ${eoSalvar?.tipo==="marketing"?(blocos[0]?.salaAtividade||espaco):espaco} · ${dataFmt} às ${horFmt}`;
        _usuarios.filter(u=>(u.perfil==="marketing"||u.perfil==="fotografo")&&u.fcmToken&&u.ativo!==false).forEach(u=>{
          fetch("https://fcm.googleapis.com/fcm/send",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({to:u.fcmToken,notification:{title:"📸 Reserva Arena — Marketing",body:msgMK}})}).catch(()=>{});
        });
      }

      // TI: agendamento audiovisual ou com bibAV pendente
      const temAV=eoSalvar?.tipo==="audiovisual"||((_MA.bibAV===true)&&(_MA.bibMic>0||_MA.bibCaixa>0||_MA.bibProj>0));
      if((temAV||temBibAV)&&(st==="pendente"||temBibAV)){
        _usuarios.filter(u=>u.perfil==="ti"&&u.ativo!==false).forEach(u=>{
          gravarNotif(u.uid,"💻 Nova solicitação de equipamento",`${profNome} · ${espaco} · ${dataFmt} às ${horFmt}`,"ti");
        });
      }

      // Admins: notificar todo novo agendamento
      const statusLabel=st==="pendente"?"⏳ Pendente":"✅ Confirmado";
      const msgAdmin=`📅 Novo agendamento — ${statusLabel}\n${profNome} · ${espaco} · ${dataFmt} às ${horFmt}`;
      _usuarios.filter(u=>u.perfil==="admin"&&u.fcmToken&&u.ativo!==false).forEach(u=>{
        fetch("https://fcm.googleapis.com/fcm/send",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({to:u.fcmToken,notification:{title:"📅 Reserva Arena",body:msgAdmin}})}).catch(()=>{});
      });
    } catch(ne){ console.warn("Push:",ne); }

  }catch(e){
    console.error(e);
    _MA.erro="Erro ao salvar. Tente novamente.";_MA.salvando=false;_MA.resumo=false;re();
  }
};

    ${isLab?`<div><label style="font-size:12px;font-weight:700;color:${c.textMuted};text-transform:uppercase">Laboratorista? *</label><div style="display:flex;gap:20px;margin-top:4px">${["Sim","Não"].map(op=>`<label style="display:flex;align-items:center;gap:7px;cursor:pointer;font-size:13.5px"><input type="radio" name="labEd" value="${op}" ${e.laboratorista===op?"checked":""} onchange="_ED.laboratorista='${op}'">${op}</label>`).join("")}</div></div>`:""}

  </div>`;

window.salvarED=async()=>{
  const e=_ED;
  if(!e.espaco||!e.data||!e.turma||!e.conteudo){render("ed-erro",alertHTML("error","Preencha todos os campos."));return;}
  const eo=ESPACOS.find(esp=>esp.nome===e.espaco);
  const novoSt=isUrgente(e.data,e.horario||"07:10")?"pendente":"confirmado";
  try{
    await updateDoc(doc(db,"reservas",e._id),{espaco:e.espaco,data:e.data,horario:e.horario,turma:e.turma,conteudo:e.conteudo,laboratorista:e.laboratorista||"",quantidade:eo?.tipo==="equipamento"?Number(e.quantidade):null,status:novoSt,editadoEm:Timestamp.now()});
    fecharEdicao();
  }catch{render("ed-erro",alertHTML("error","Erro ao salvar."));}
};

window.admDayHover=function(ds,evt){
  let tip=document.getElementById("adm-tip");
  if(!tip){tip=document.createElement("div");tip.id="adm-tip";tip.className="adm-day-tooltip";document.body.appendChild(tip);}
  const rs=_todas.filter(r=>r.data===ds&&r.status!=="recusado"&&!r.reservaAutomatica).sort((a,b)=>a.horario>b.horario?1:-1);
  const c=C();const[a,m,d]=ds.split("-");
  let html=`<p style="font-size:11px;font-weight:800;color:#1a6b47;margin-bottom:8px">${d}/${m}/${a} · ${rs.length} agendamento${rs.length!==1?"s":""}</p>`;
  if(!rs.length)html+=`<p style="font-size:12px;color:#607060">🎉 Dia livre</p>`;
  else rs.slice(0,6).forEach(r=>{
    const urg=isUrgente(r.data,r.horario);
    const range=r.horarioFim&&r.horarioFim!==r.horario?` → ${r.horarioFim}`:"";
    html+=`<div style="display:flex;gap:8px;align-items:center;padding:4px 0;border-bottom:1px solid #e2f0eb"><span style="font-size:11px;font-family:'DM Mono',monospace;font-weight:800;color:${urg?"#c2410c":"#40b07a"};min-width:80px">${r.horario}${range}</span><div><p style="font-size:12px;font-weight:700;color:#132318">${r.espaco}</p><p style="font-size:11px;color:#607060">${r.professor?.split(" ")[0]||""} · ${r.turmaInicio||r.turma}</p></div></div>`;
  });
  if(rs.length>6)html+=`<p style="font-size:10px;color:#607060;margin-top:6px">+${rs.length-6} mais</p>`;
  tip.innerHTML=html;
  const x=Math.min(evt.clientX+12,window.innerWidth-320),y=Math.min(evt.clientY+12,window.innerHeight-300);
  tip.style.left=x+"px";tip.style.top=y+"px";tip.classList.add("show");

window.aModerar=async(id,status)=>{
  if(!exigePermissao(['admin'])){alert('Acesso negado.');return;}
  if(!confirm(`${status==="confirmado"?"Aprovar":"Recusar"} esta reserva?`))return;
  const r=_todas.find(r=>r.id===id);
  await updateDoc(doc(db,"reservas",id),{status});
  if(r){
    const dataFmt=r.data.split("-").reverse().join("/");
    if(status==="confirmado"){
      await gravarNotif(r.professorId,"✅ Agendamento aprovado",`${r.espaco} — ${dataFmt} às ${r.horario}`,"aprovacao");
    } else {
      await gravarNotif(r.professorId,"❌ Agendamento recusado",`${r.espaco} — ${dataFmt} às ${r.horario}`,"recusa");
    }
  }
};
window.aExcluir=async id=>{
  if(!exigePermissao(['admin'])){alert('Acesso negado.');return;}
  if(!confirm("Excluir esta reserva?"))return;
  const r=_todas.find(r=>r.id===id);
  if(!r){await deleteDoc(doc(db,"reservas",id));return;}
  const b=writeBatch(db);
  b.delete(doc(db,"reservas",id));
  _todas.filter(a=>a.reservaAutomatica&&a.espaco===r.espaco&&a.data===r.data&&a.professorId===r.professorId)
    .forEach(a=>b.delete(doc(db,"reservas",a.id)));
  await b.commit();
};

window.guCriarDireto=async()=>{
  if(!exigePermissao(['admin'])){alert('Acesso negado.');return;}
  const nome=document.getElementById("gu-nome")?.value?.trim();
  const email=document.getElementById("gu-email")?.value?.trim();
  const senha=document.getElementById("gu-senha")?.value;
  const perfil=document.getElementById("gu-perfil")?.value||"professor";

  if(!nome||!email||!senha||senha.length<6){if(flash)flash.innerHTML=`<div style="background:#fef2f2;border:1px solid #fca5a5;border-radius:8px;padding:10px 14px;font-size:13px;color:#7f1d1d;margin-bottom:12px">Preencha todos os campos (senha mín. 6 chars).</div>`;return;}

  const admins=_usuarios.filter(u=>u.perfil==="admin");
  let h='<p style="font-size:12px;font-weight:800;color:#132318;text-transform:uppercase;margin-bottom:12px">Professores ('+profs.length+')</p>';
  if(!profs.length)h+='<p style="font-size:13px;color:#607060;text-align:center;padding:20px">Nenhum professor cadastrado.</p>';
  else{
    h+='<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:13px"><thead><tr style="background:#f8faf8">';
    ['Nome','E-mail','Perfil','Status','Ações'].forEach(t=>{h+='<th style="padding:8px 12px;text-align:left;color:#607060;font-weight:700;border-bottom:2px solid #c7dfd4;font-size:11px;text-transform:uppercase">'+t+'</th>';});
    h+='</tr></thead><tbody>';
    profs.forEach((u,i)=>{
      h+='<tr style="background:'+(i%2===0?'#fff':'#f8faf8')+'">';
      h+='<td style="padding:9px 12px;border-bottom:1px solid #e2f0eb;color:#132318;font-weight:600">'+u.nome+'</td>';
      h+='<td style="padding:9px 12px;border-bottom:1px solid #e2f0eb;color:#607060;font-size:12px">'+u.email+'</td>';
      h+='<td style="padding:9px 12px;border-bottom:1px solid #e2f0eb"><span style="font-size:11px;font-weight:700;padding:2px 8px;border-radius:10px;background:#e0e7ff;color:#3730a3">'+(u.perfil==="fotografo"||u.perfil==="marketing"?"📸 Equipe de Marketing":u.perfil==="ti"?"💻 T.I.":"👨‍🏫 Professor")+'</span></td>';
      h+='<td style="padding:9px 12px;border-bottom:1px solid #e2f0eb"><span style="font-size:11px;font-weight:700;padding:2px 8px;border-radius:10px;background:'+(u.ativo!==false?'#e2f4ea':'#fef2f2')+';color:'+(u.ativo!==false?'#0f4c2b':'#7f1d1d')+'">'+(u.ativo!==false?'● Ativo':'○ Inativo')+'</span></td>';
      h+='<td style="padding:9px 12px;border-bottom:1px solid #e2f0eb"><div style="display:flex;gap:5px">';
      h+='<button data-uid="'+u.id+'" data-ativo="'+(u.ativo!==false?'1':'0')+'" data-nome="'+u.nome+'" class="gu-toggle-btn" style="font-size:11px;padding:4px 10px;border-radius:6px;border:1.5px solid '+(u.ativo!==false?'#fed7aa':'#6ee7a0')+';background:'+(u.ativo!==false?'#fff7ed':'#e2f4ea')+';color:'+(u.ativo!==false?'#7c2d12':'#0f4c2b')+';cursor:pointer;font-weight:700">'+(u.ativo!==false?'🔒 Desativar':'🔓 Ativar')+'</button>';
      h+='<button data-email="'+u.email+'" class="gu-senha-btn" style="font-size:11px;padding:4px 10px;border-radius:6px;border:1.5px solid #c7dfd4;background:#fff;color:#607060;cursor:pointer;font-weight:700">🔑 Senha</button>';
      h+='<button data-uid="'+u.id+'" data-nome="'+u.nome.replace(/"/g,'&quot;')+'" data-email="'+u.email.replace(/"/g,'&quot;')+'" class="gu-editar-btn" style="font-size:11px;padding:4px 10px;border-radius:6px;border:1.5px solid #bfdbfe;background:#eff6ff;color:#1e40af;cursor:pointer;font-weight:700">✏️ Editar</button>';
      h+='</div></td></tr>';
    });
    h+='</tbody></table></div>';
  }
  if(admins.length){
    h+='<div style="margin-top:16px;background:#f5f3ff;border-radius:10px;padding:14px 16px"><p style="font-size:11px;font-weight:700;color:#6d28d9;text-transform:uppercase;margin-bottom:8px">Administradores</p>';
    admins.forEach(u=>{h+='<div style="display:flex;align-items:center;gap:10px;padding:4px 0"><span style="font-size:13px;font-weight:600;color:#132318">'+u.nome+'</span><span style="font-size:12px;color:#607060">'+u.email+'</span></div>';});
    h+='</div>';
  }
  // Modal de edição inline
  h+='<div id="mod-gu-edit" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);align-items:center;justify-content:center;z-index:2000">';
  h+='<div style="background:#fff;border-radius:14px;padding:28px 24px;width:100%;max-width:400px;box-shadow:0 8px 32px rgba(0,0,0,.18)">';
  h+='<p style="font-size:15px;font-weight:800;color:#132318;margin-bottom:18px">✏️ Editar Usuário</p>';
  h+='<label style="font-size:11px;font-weight:700;color:#607060;text-transform:uppercase">Nome</label>';
  h+='<input id="gu-edit-nome" type="text" style="width:100%;padding:9px 12px;border-radius:8px;border:1.5px solid #c7dfd4;font-size:13.5px;outline:none;box-sizing:border-box;margin:5px 0 14px">';
  h+='<label style="font-size:11px;font-weight:700;color:#607060;text-transform:uppercase">E-mail</label>';
  h+='<input id="gu-edit-email" type="email" style="width:100%;padding:9px 12px;border-radius:8px;border:1.5px solid #c7dfd4;font-size:13.5px;outline:none;box-sizing:border-box;margin:5px 0 6px">';
  h+='<p id="gu-edit-aviso" style="font-size:11px;color:#92400e;background:#fffbeb;border-radius:6px;padding:6px 10px;margin-bottom:14px">⚠️ Alterar o e-mail não muda o login do Firebase. O usuário continuará entrando com o e-mail antigo até fazer novo cadastro.</p>';
  h+='<div id="gu-edit-flash" style="margin-bottom:10px"></div>';
  h+='<div style="display:flex;gap:10px;justify-content:flex-end">';
  h+='<button id="gu-edit-cancelar" style="padding:8px 18px;border-radius:8px;border:1.5px solid #c7dfd4;background:#fff;color:#607060;cursor:pointer;font-weight:700;font-size:13px">Cancelar</button>';
  h+='<button id="gu-edit-salvar" style="padding:8px 18px;border-radius:8px;border:none;background:linear-gradient(135deg,#0d2b1a,#1a6b47);color:#fff;cursor:pointer;font-weight:700;font-size:13px">💾 Salvar</button>';
  h+='</div></div></div>';
  lista.innerHTML=h;
  lista.querySelectorAll('.gu-toggle-btn').forEach(b=>{
    b.addEventListener('click',()=>{
      const uid=b.getAttribute('data-uid');const ativo=b.getAttribute('data-ativo')==='1';const nome=b.getAttribute('data-nome');
      if(confirm((ativo?'Desativar':'Ativar')+' '+nome+'?'))updateDoc(doc(db,'usuarios',uid),{ativo:!ativo}).then(()=>setTimeout(renderGuLista,500));
    });
  });
  lista.querySelectorAll('.gu-senha-btn').forEach(b=>{
    b.addEventListener('click',()=>{
      const email=b.getAttribute('data-email');
      if(confirm('Enviar redefinição de senha para '+email+'?'))sendPasswordResetEmail(auth,email).then(()=>alert('Link enviado!')).catch(()=>alert('Erro ao enviar.'));
    });
  });
  let _editUID=null;
  lista.querySelectorAll('.gu-editar-btn').forEach(b=>{
    b.addEventListener('click',()=>{
      _editUID=b.getAttribute('data-uid');
      document.getElementById('gu-edit-nome').value=b.getAttribute('data-nome');
      document.getElementById('gu-edit-email').value=b.getAttribute('data-email');
      document.getElementById('gu-edit-flash').innerHTML='';
      document.getElementById('mod-gu-edit').style.display='flex';
    });
  });
  document.getElementById('gu-edit-cancelar').addEventListener('click',()=>{
    document.getElementById('mod-gu-edit').style.display='none';
  });
  document.getElementById('gu-edit-salvar').addEventListener('click',()=>{
    const nome=document.getElementById('gu-edit-nome').value.trim();
    const email=document.getElementById('gu-edit-email').value.trim();
    const flash=document.getElementById('gu-edit-flash');
    if(!nome||!email){flash.innerHTML='<p style="color:#7f1d1d;font-size:12px">Preencha todos os campos.</p>';return;}
    if(!_editUID){return;}
    const btn=document.getElementById('gu-edit-salvar');
    btn.disabled=true;btn.textContent='Salvando...';
    updateDoc(doc(db,'usuarios',_editUID),{nome,email})
      .then(()=>{
        flash.innerHTML='<p style="color:#0f4c2b;font-size:12px">✅ Salvo com sucesso!</p>';
        btn.disabled=false;btn.textContent='💾 Salvar';
        setTimeout(()=>{document.getElementById('mod-gu-edit').style.display='none';renderGuLista();},900);
      })
      .catch(err=>{
        flash.innerHTML='<p style="color:#7f1d1d;font-size:12px">Erro: '+err.message+'</p>';
        btn.disabled=false;btn.textContent='💾 Salvar';
      });
  });
}

// ════════════════════════════════════════════════════════════════════════════
// FIREBASE LISTENERS
// ════════════════════════════════════════════════════════════════════════════
function startListeners(uid){
  _unsub1=onSnapshot(collection(db,"reservas"),snap=>{
    _todas=snap.docs.map(d=>({id:d.id,...d.data()})).filter(r=>r&&r.professor&&r.data&&r.horario);re();
  });
  _unsub2=onSnapshot(query(collection(db,"reservas"),where("professorId","==",uid)),snap=>{
    _minhas=snap.docs.map(d=>({id:d.id,...d.data()})).filter(r=>!r.reservaAutomatica).sort((a,b)=>a.data>b.data?1:-1);re();
  });
  _unsub3=onSnapshot(collection(db,"usuarios"),snap=>{
    _usuarios=snap.docs.map(d=>({id:d.id,...d.data()})).filter(u=>u.ativo!==false);re();
    if(document.getElementById("mod-gu-lista"))renderGuLista();
  });
}
function stopListeners(){[_unsub1,_unsub2,_unsub3].forEach(u=>{try{u&&u();}catch{}});_unsub1=_unsub2=_unsub3=null;}

// ════════════════════════════════════════════════════════════════════════════
// AUTH
// ════════════════════════════════════════════════════════════════════════════
onAuthStateChanged(auth,async user=>{
  stopListeners();_todas=[];_minhas=[];_usuarios=[];
  if(user){
    try{
      const snap=await getDoc(doc(db,"usuarios",user.uid));
      _usuario=snap.exists()?{uid:user.uid,...snap.data()}:{uid:user.uid,email:user.email,perfil:"sem_acesso",ativo:false};
    }catch{_usuario={uid:user.uid,email:user.email,perfil:"sem_acesso",ativo:false};}
    if(_usuario.perfil!=="sem_acesso"&&_usuario.ativo!==false){startListeners(user.uid);iniciarNotificacoes(user.uid);iniciarSinoListener(user.uid);}
    else re();
  }else{
    _usuario=null;
    _unsub1=onSnapshot(collection(db,"reservas"),snap=>{
      _todas=snap.docs.map(d=>({id:d.id,...d.data()})).filter(r=>r&&r.professor&&r.data&&r.horario);re();
    });
    re();
  }
});
</script>

  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('/sw.js')
      .then(r=>console.log('SW registrado:', r.scope))
      .catch(e=>console.log('SW erro:', e));

}

// Banner de instalação PWA
let _deferredPrompt=null;
window.addEventListener('beforeinstallprompt', e=>{
  e.preventDefault();
  _deferredPrompt=e;
  // Mostrar botão de instalação se existir
  const btn=document.getElementById('btn-instalar-pwa');
  if(btn)btn.style.display='flex';
});
window.addEventListener('appinstalled', ()=>{
  _deferredPrompt=null;
  const btn=document.getElementById('btn-instalar-pwa');
  if(btn)btn.style.display='none';
});
window.instalarPWA=async()=>{
  if(!_deferredPrompt)return;
  _deferredPrompt.prompt();
  const{outcome}=await _deferredPrompt.userChoice;
  _deferredPrompt=null;
  const btn=document.getElementById('btn-instalar-pwa');
  if(btn)btn.style.display='none';
};
</script>
