function isDiaLetivo(data){
  if(!data)return false;
  const[a,m,d]=data.split("-").map(Number);
  const dt=new Date(a,m-1,d),dow=dt.getDay();
  if(dow===0||dow===6)return false;
  if(NAO_LETIVOS.has(data))return false;
  if(data<"2026-01-19"||data>"2026-12-10")return false;
  return true;
}
function isDiaLetivoTurma(data,turma){
  if(!isDiaLetivo(data))return false;
  const a=parseInt(turma);
  if(a>=1&&a<=5&&NAO_LETIVOS_INICIAIS.has(data))return false;
  return true;
}
function diasLetivosAte(dataStr){
  const agora=new Date();
  const[a,m,d]=dataStr.split("-").map(Number);
  const alvo=new Date(a,m-1,d,7,10,0);
  let count=0;
  const cur=new Date(agora);cur.setHours(0,0,0,0);
  const fim=new Date(alvo);fim.setHours(0,0,0,0);
  while(cur<fim){
    const ds=`${cur.getFullYear()}-${String(cur.getMonth()+1).padStart(2,"0")}-${String(cur.getDate()).padStart(2,"0")}`;
    if(isDiaLetivo(ds))count++;
    cur.setDate(cur.getDate()+1);
  }
  return count;
}
function isUrgente(data,horario){
  try{
    const agora=new Date();
    const[a,m,d]=data.split("-").map(Number);
    const[h,mn]=horario.split(":").map(Number);
    const ev=new Date(a,m-1,d,h,mn);
    const diff=(ev-agora)/3600000;
    if(diff<=0)return false;
    if(diff<24)return true;
    const dow=agora.getDay(),hora=agora.getHours()+agora.getMinutes()/60;
    if((dow===5&&hora>=17||dow===6||dow===0&&hora<7)&&diasLetivosAte(data)<1)return true;
    if(isDiaLetivo(data)&&diasLetivosAte(data)<1)return true;
    return false;
  }catch{return false;}
}
function isDiaUrgente(data){
  try{
    const agora=new Date();
    const[a,m,d]=data.split("-").map(Number);
    const ev=new Date(a,m-1,d,7,10,0);
    const diff=(ev-agora)/3600000;
    if(diff<=0)return false;
    if(diff<24)return true;
    const dow=agora.getDay(),hora=agora.getHours()+agora.getMinutes()/60;
    if((dow===5&&hora>=17||dow===6||dow===0&&hora<7)&&diasLetivosAte(data)<1)return true;
    if(isDiaLetivo(data)&&diasLetivosAte(data)<1)return true;
    return false;
  }catch{return false;}
}
function addDias(s,n){
  const[a,m,d]=s.split("-").map(Number);
  const dt=new Date(Date.UTC(a,m-1,d+n));
  return dt.toISOString().split("T")[0];
}

}

function logoHTML(size=34){const c=C();return`<div style="width:${size}px;height:${size}px;border-radius:${Math.round(size*.25)}px;background:${c.logoBg};border:1px solid ${c.border};display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,0,.15)"><img src="${ARENA_LOGO}" alt="Arena" style="width:${Math.round(size*.85)}px;height:${Math.round(size*.85)}px;object-fit:contain" /></div>`;}

function inp(){const c=C();return`width:100%;padding:10px 12px;border-radius:8px;font-size:13.5px;border:1.5px solid ${c.inputBorder};background:${c.inputBg};color:${c.text};outline:none;box-sizing:border-box;font-family:inherit`;}
function sel(){return inp()+";cursor:pointer";}

function btn(variant="primary",disabled=false,size="md"){
  const c=C();
  const VM={primary:{bg:c.blueMid,col:"#fff",b:c.blueMid},navy:{bg:c.navy,col:"#fff",b:c.navy},danger:{bg:"#dc2626",col:"#fff",b:"#dc2626"},success:{bg:"#1a6b47",col:"#fff",b:"#1a6b47"},ghost:{bg:"transparent",col:c.textMid,b:c.border},amber:{bg:"#d97706",col:"#fff",b:"#d97706"}};
  const v=VM[variant]||VM.primary;
  const P={sm:"5px 12px",md:"9px 18px",lg:"12px 24px"};
  const F={sm:"12",md:"13.5",lg:"14.5"};
  return`background:${disabled?"#cbd5e1":v.bg};color:${disabled?"#94a3b8":v.col};border:1.5px solid ${disabled?"#cbd5e1":v.b};border-radius:8px;font-weight:700;cursor:${disabled?"not-allowed":"pointer"};padding:${P[size]||P.md};font-size:${F[size]||F.md}px;font-family:inherit`;
}

function alertHTML(type,msg){const c=C();const cfg={error:{bg:c.redBg,b:c.redBorder,col:c.red},success:{bg:c.greenBg,b:c.greenBorder,col:c.green},warning:{bg:c.amberBg,b:c.amberBorder,col:c.amber}};const v=cfg[type]||cfg.error;return`<div style="background:${v.bg};border:1px solid ${v.b};border-radius:8px;padding:10px 14px;font-size:13px;color:${v.col};line-height:1.5;margin-bottom:12px">${msg}</div>`;}

// ─── CALENDÁRIO MENSAL (componente) ──────────────────────────────────────────
function calMensalHTML(cid,ano,mes,porData,dataSel){
  const c=C(),h=fmtHoje();
  const primeiroDia=new Date(Date.UTC(ano,mes,1));
  const diasNoMes=new Date(Date.UTC(ano,mes+1,0)).getUTCDate();
  const inicioGrid=primeiroDia.getUTCDay();
  const cells=[];for(let i=0;i<inicioGrid;i++)cells.push(null);for(let d=1;d<=diasNoMes;d++)cells.push(d);

  let dias="";
  cells.forEach((d,i)=>{
    if(!d){dias+=`<div></div>`;return;}
    const ds=`${ano}-${String(mes+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
    const isH=ds===h,isPast=ds<h,isSel=ds===dataSel,letivo=isDiaLetivo(ds);
    const dow=new Date(Date.UTC(ano,mes,d)).getUTCDay(),isFim=dow===0||dow===6;
    const nao=!letivo&&!isPast;
    const bg=isSel?"#40b07a":isH?"rgba(26,107,71,.12)":nao?"rgba(239,68,68,.08)":"transparent";
    const col=isSel?"#fff":isPast?"#cbd5e1":nao?"#fca5a5":isFim?"#ef4444":c.navy;
    const temRes=(porData[ds]||[]).length>0;
    dias+=`<button onclick="window._calClick('${cid}','${ds}')" ${isPast||!letivo?"disabled":""}
      style="aspect-ratio:1;border-radius:8px;border:none;cursor:${isPast||!letivo?"not-allowed":"pointer"};background:${bg};color:${col};font-weight:${isH||isSel?800:500};font-size:13.5px;position:relative;opacity:${isPast?.4:1};transition:all .15s;font-family:inherit">
      ${d}${temRes&&!isSel?`<div style="position:absolute;bottom:3px;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;background:#40b07a"></div>`:""}
    </button>`;
  });

  return`<div style="background:${c.surface};border-radius:16px;border:1px solid ${c.border};overflow:hidden">
    <div style="display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid ${c.border}">
      <button onclick="window._calNav('${cid}',-1)" style="background:none;border:1px solid ${c.border};border-radius:8px;width:34px;height:34px;cursor:pointer;color:${c.textMid};font-size:16px;font-family:inherit">‹</button>
      <div style="text-align:center"><p style="font-size:17px;font-weight:800;color:${c.navy}">${MESES[mes]}</p><p style="font-size:12px;color:${c.textMuted}">${ano}</p></div>
      <button onclick="window._calNav('${cid}',1)" style="background:none;border:1px solid ${c.border};border-radius:8px;width:34px;height:34px;cursor:pointer;color:${c.textMid};font-size:16px;font-family:inherit">›</button>
    </div>
    <div style="padding:12px 16px 16px">
      <div style="display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:6px">
        ${["D","S","T","Q","Q","S","S"].map((n,i)=>`<div style="text-align:center;font-size:10px;font-weight:700;color:${i===0||i===6?"#ef4444":c.textMuted};padding:4px 0">${n}</div>`).join("")}
      </div>
      <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px">${dias}</div>
    </div>
  </div>`;
}

let _usuario=null,_todas=[],_minhas=[],_usuarios=[];

function re(){
  const c=C();
  document.body.style.background=c.bg;
  document.body.style.color=c.text;
  if(!_usuario){renderPublica();return;}
  if(_usuario.perfil==="sem_acesso"||_usuario.ativo===false){renderSemAcesso();return;}
  renderApp();
}

    </header>
    <div style="max-width:860px;margin:0 auto;padding:24px 14px">
      <div style="text-align:center;margin-bottom:24px">${logoHTML(56)}<h1 style="font-size:24px;font-weight:800;color:${c.navy};margin-top:12px">Reserva de Salas e Equipamentos</h1><p style="font-size:13px;color:${c.textMuted};margin-top:6px">Colégio Arena · Visualize os agendamentos</p></div>

    </div>
    <footer style="margin-top:40px;padding:14px 20px;border-top:1px solid ${c.border};background:${c.surface};text-align:center">
      <p style="font-size:11px;color:${c.textMuted}">Colégio Arena · Reserva Arena v1.5 · Dev: Luciano Galdino de Melo</p>
    </footer>
  </div>
  <div id="modal-login" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);align-items:center;justify-content:center;z-index:2000;padding:1rem">
    <div style="background:${c.surface};border-radius:16px;padding:28px;width:100%;max-width:380px;box-shadow:0 24px 60px rgba(0,0,0,.3)">
      <div style="text-align:center;margin-bottom:20px">${logoHTML(48)}<h2 style="font-size:19px;font-weight:800;color:${c.navy};margin-top:12px">Entrar no Reserva Arena</h2></div>
      <div id="login-erro"></div>
      <div style="display:grid;gap:12px">
        <div><label style="font-size:11px;font-weight:700;color:${c.textMuted};text-transform:uppercase">E-mail</label><br><input id="inp-email" type="email" placeholder="prof@colegioarena.com.br" style="${inp()};margin-top:5px"></div>
        <div><label style="font-size:11px;font-weight:700;color:${c.textMuted};text-transform:uppercase">Senha</label><br><input id="inp-senha" type="password" placeholder="••••••" style="${inp()};margin-top:5px" onkeydown="if(event.key==='Enter')fazerLogin()"></div>
        <button onclick="fazerLogin()" style="${btn("navy")};width:100%;padding:12px;margin-top:4px">Entrar</button>
        <button onclick="recuperarSenha()" style="background:none;border:none;color:${c.blueMid};font-size:12px;cursor:pointer;font-weight:600">Esqueci minha senha</button>
        <button onclick="fecharLogin()" style="${btn("ghost")};width:100%;padding:10px">Cancelar</button>
      </div>
    </div>
  </div>`;
  renderPubCal();
  window._calClick=(cid,data)=>{_pubDiaSel=_pubDiaSel===data?null:data;renderPubCal();renderPubDetalhe(data);};

function renderPubCal(){const porData={};_todas.filter(r=>r.status!=="recusado").forEach(r=>{if(!porData[r.data])porData[r.data]=[];porData[r.data].push(r);});render("pub-cal",calMensalHTML("pub",_pubCal.a,_pubCal.m,porData,_pubDiaSel));}

function renderPubDetalhe(data){
  const c=C(),h=fmtHoje();
  const[a,m,d]=data.split("-");
  const rs=_todas.filter(r=>r.data===data&&r.status!=="recusado").sort((a,b)=>a.horario>b.horario?1:-1);
  let html=`<div class="fade-in" style="background:${c.bg};border-radius:10px;padding:12px 14px;border:1px solid ${c.border}">
    <p style="font-size:12px;font-weight:700;color:${c.navy};margin-bottom:8px">${d}/${m}/${a}</p>`;
  if(!rs.length)html+=`<p style="font-size:13px;color:${c.textMuted}">🎉 Dia livre.</p>`;
  else rs.forEach(r=>{html+=`<div style="display:flex;gap:8px;align-items:center;padding:6px 10px;border-radius:8px;background:${c.surface};border:1px solid ${c.border};border-left:3px solid #40b07a;margin-bottom:4px"><span style="font-family:'DM Mono',monospace;font-weight:800;color:#40b07a;font-size:12px;min-width:38px">${r.horario}</span><span style="font-weight:700;font-size:12px;flex:1;color:${c.navy}">${r.espaco}</span><span style="font-size:11px;color:${c.textMid}">${r.turma}</span><span style="font-size:11px;color:${c.textMuted}">${r.professor.split(" ")[0]}</span></div>`;});
  if(data>=h)html+=`<div style="border-top:1px solid ${c.border};padding-top:10px;margin-top:8px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px"><p style="font-size:12.5px;font-weight:700;color:${c.navy}">Deseja agendar?</p><button onclick="abrirLogin()" style="${btn("success")}">Entrar para agendar →</button></div>`;
  html+=`</div>`;
  render("pub-detalhe",html);
}

window.abrirLogin=()=>{const m=$("modal-login");if(m)m.style.display="flex";};
window.fecharLogin=()=>{const m=$("modal-login");if(m)m.style.display="none";};
window.fazerLogin=async()=>{
  const email=$("inp-email")?.value?.trim(),senha=$("inp-senha")?.value;
  if(!email||!senha){render("login-erro",alertHTML("error","Preencha e-mail e senha."));return;}
  try{await signInWithEmailAndPassword(auth,email,senha);fecharLogin();}
  catch{render("login-erro",alertHTML("error","E-mail ou senha inválidos."));}
};
window.recuperarSenha=async()=>{
  const email=$("inp-email")?.value?.trim();
  if(!email){render("login-erro",alertHTML("warning","Digite seu e-mail acima."));return;}
  try{await sendPasswordResetEmail(auth,email);render("login-erro",alertHTML("success",`Link enviado para ${email}`));}
  catch{render("login-erro",alertHTML("error","Erro ao enviar. Verifique o e-mail."));}
};

let _P={modoProf:"ver",modoCard:"calendario",modoVisu:"semana",filtroGrade:"meus",filtroEspaco:"",semIni:"",diaSel:null,mesCal:null};

function renderProfessorView(){
  const c=C(),h=fmtHoje();

  const pendentes=_minhas.filter(r=>r.status==="pendente");

  html+=`<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:18px">
    ${kpiData.map(k=>`<div onclick="${k.click}" style="background:${k.bg};border-radius:12px;padding:14px 16px;cursor:pointer;transition:transform .15s,box-shadow .15s" onmouseover="this.style.transform='translateY(-2px)';this.style.boxShadow='0 4px 12px rgba(0,0,0,.12)'" onmouseout="this.style.transform='';this.style.boxShadow=''"><p style="font-size:10px;font-weight:700;color:${k.col};text-transform:uppercase;margin-bottom:4px">${k.l}</p><p style="font-size:28px;font-weight:800;color:${k.col};line-height:1">${k.v}</p><p style="font-size:9px;color:${k.col};opacity:.6;margin-top:3px">toque para ver →</p></div>`).join("")}

    </div>
    ${_P.modoProf==='ver'?`<div style="display:flex;background:${c.bg};border-radius:10px;padding:3px;border:1px solid ${c.border};gap:2px">
      ${[{id:"calendario",l:"🗓 Calendário"},{id:"lista",l:"☰ Agenda"}].map(o=>`<button onclick="pSetModo('${o.id}')" style="padding:7px 16px;border-radius:8px;border:none;background:${_P.modoCard===o.id?c.navy:'transparent'};color:${_P.modoCard===o.id?'#fff':c.textMuted};font-weight:700;font-size:13px;cursor:pointer;font-family:inherit">${o.l}</button>`).join("")}
    </div>`:''}
  </div>`;

  // Modo Agendar inline
  if(_P.modoProf==="agendar"){
    html+=renderProfAgendar();
    html+=`</div>`;
    return html;
  }

  if(_P.modoCard==="calendario"){
    // Banner verde
    html+=`<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;padding:10px 14px;background:#1a6b47;margin-top:10px">`;
    if(_P.modoVisu==="semana"){
      const fim=addDias(_P.semIni,4);
      const[,ma,da]=_P.semIni.split("-");const[,mb,db]=fim.split("-");
      const rng=ma===mb?`${da}-${db}/${mb}`:`${da}/${ma}-${db}/${mb}`;
      html+=`<div style="display:flex;align-items:center;gap:6px">
        <button onclick="pNavSem(-1)" style="background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);border-radius:7px;color:#fff;font-size:15px;width:30px;height:30px;cursor:pointer">‹</button>

      </div>`;
    }
    html+=`<div style="display:flex;background:rgba(0,0,0,.18);border-radius:8px;padding:2px">
      ${[{id:"semana",l:"Semana"},{id:"mes",l:"Mês"}].map(o=>`<button onclick="pSetVisu('${o.id}')" style="padding:5px 11px;border-radius:6px;border:none;background:${_P.modoVisu===o.id?"#fff":"transparent"};color:${_P.modoVisu===o.id?"#1a6b47":"rgba(255,255,255,.85)"};font-weight:700;font-size:12px;cursor:pointer">${o.l}</button>`).join("")}
    </div>

      ${[{id:"meus",l:"Meus"},{id:"todos",l:"Todos"}].map(o=>`<button onclick="pSetGrade('${o.id}')" style="padding:5px 11px;border-radius:6px;border:none;background:${_P.filtroGrade===o.id?"#fff":"transparent"};color:${_P.filtroGrade===o.id?"#1a6b47":"rgba(255,255,255,.85)"};font-weight:700;font-size:12px;cursor:pointer">${o.l}</button>`).join("")}
    </div>
    <select onchange="pSetEspaco(this.value)" style="background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);border-radius:7px;color:#fff;font-weight:600;font-size:11.5px;cursor:pointer;outline:none;padding:5px 8px;max-width:140px">
      <option value="" style="background:#1a6b47">Espaços</option>
      ${ESPACOS.map(e=>`<option value="${e.nome}" ${_P.filtroEspaco===e.nome?"selected":""} style="background:#1a6b47">${e.nome}</option>`).join("")}
    </select>`;
    html+=`</div>`;

    const ehMeu=r=>r.professorId===_usuario?.uid||r.professor===_usuario?.nome;
    const fonte=_todas.filter(r=>r?.professor&&r?.status!=="recusado"&&(_P.filtroGrade==="meus"?ehMeu(r):true)&&(!_P.filtroEspaco||r.espaco===_P.filtroEspaco));

    if(_P.modoVisu==="semana"){
      const dias=Array.from({length:5},(_,i)=>addDias(_P.semIni,i));
      const nomes=["Seg.","Ter.","Qua.","Qui.","Sex."];

          <div style="text-align:center;margin-bottom:6px">
            <p style="font-size:10px;font-weight:700;color:${naoL?"#ef4444":c.textMuted};text-transform:uppercase">${nomes[i]}</p>
            <p style="font-size:18px;font-weight:900;line-height:1;color:${isH?c.blueMid:naoL?"#ef4444":c.navy}">${dia}</p>
            ${naoL?`<p style="font-size:8px;color:#ef4444;font-weight:700">não letivo</p>`:""}
          </div>`;
        if(!rsD.length)html+=`<p style="font-size:9px;color:${c.textMuted};opacity:.5;text-align:center">-</p>`;
        else rsD.forEach(r=>{
          const isMeu=ehMeu(r),isPend=r.status==="pendente";
          html+=`<div style="background:${isMeu?c.greenBg:c.surface};border-radius:5px;padding:3px 5px;border:1px solid ${isMeu?c.greenBorder:c.border};border-left:3px solid ${isMeu?c.green:"#94a3b8"};margin-bottom:3px">
            <div style="display:flex;align-items:baseline;gap:3px">
              <p style="font-size:10px;font-weight:800;font-family:'DM Mono',monospace;color:${isMeu?c.green:"#64748b"}">${r.horario}</p>
              <p style="font-size:10px;font-weight:700;color:${c.navy};white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${r.espaco.split(" ")[0]}</p>
              ${isMeu&&isPend?`<span style="font-size:9px;color:${c.amber}">⏳</span>`:""}
            </div>
            <p style="font-size:9px;color:${c.textMuted};white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${r.turma}·${nomeProf(r.professor)}</p>
          </div>`;
        });
        html+=`</div>`;
      });
      html+=`</div><p style="font-size:10px;color:${c.textMuted};opacity:.7;text-align:right;padding:0 14px 10px">Clique no dia para detalhes</p>`;
    }

      const{a,m}=_P.mesCal;
      const porData={};fonte.forEach(r=>{if(!porData[r.data])porData[r.data]=[];porData[r.data].push(r);});
      html+=`<div style="padding:10px 12px">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
          <button onclick="pNavMes(-1)" style="background:none;border:1px solid ${c.border};border-radius:8px;width:30px;height:30px;cursor:pointer;color:${c.textMid};font-size:15px">‹</button>

          <button onclick="pNavMes(1)" style="background:none;border:1px solid ${c.border};border-radius:8px;width:30px;height:30px;cursor:pointer;color:${c.textMid};font-size:15px">›</button>
        </div>
        ${calMensalHTML("pmes",a,m,porData,_P.diaSel)}

  if(_P.modoCard==="lista"){

    else{
      const porData={};futuras.sort((a,b)=>a.data>b.data?1:a.data<b.data?-1:a.horario>b.horario?1:-1).forEach(r=>{if(!porData[r.data])porData[r.data]=[];porData[r.data].push(r);});
      Object.entries(porData).forEach(([data,rs])=>{
        const[,mes,dia]=data.split("-");const isH=data===h;
        html+=`<div style="margin-bottom:14px"><div style="display:flex;align-items:center;gap:8px;margin-bottom:6px"><span style="font-size:11px;font-weight:700;color:${isH?c.green:c.textMid};background:${isH?c.greenBg:"transparent"};padding:${isH?"2px 8px":"0"};border-radius:${isH?20:0}px">${isH?"📌 Hoje":`${dia}/${mes}`}</span><div style="flex:1;height:1px;background:${c.borderLight}"></div></div>`;
        rs.forEach(r=>{html+=profRRow(r);});
        html+=`</div>`;

    html+=`</div>`;
  }

  html+=`</div>`; // fim card
  html+=`</div>`;
  return html;
}

  const bg=isMeu?(isPend?"rgba(255,247,237,.6)":"rgba(226,244,234,.5)"):c.surface;
  const bl=isMeu?(isPend?c.amber:c.green):"#cbd5e1";
  const ex=extraInfo(r);
  return`<div class="row-hover" style="display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:8px;background:${bg};border:1px solid ${c.border};margin-bottom:4px;border-left:4px solid ${bl}">
    <span style="font-size:13px;font-family:'DM Mono',monospace;font-weight:800;color:${isMeu?c.green:"#64748b"};min-width:42px;flex-shrink:0">${r.horario}</span>
    <div style="flex:1;min-width:0">
      <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:2px">

        <span style="font-size:11px;color:${c.textMuted}">·</span>
        <span style="font-size:12px;color:${c.textMid}">${r.turma}</span>

      </div>
      <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
        ${isPend?`<span style="font-size:11.5px;font-weight:800;background:${c.amberBg};color:${c.amber};border:1.5px solid ${c.amberBorder};border-radius:20px;padding:2px 10px">⏳ Pendente</span>`:badge(r.status)}
      </div>

    <div style="display:flex;gap:4px;flex-shrink:0">
      ${isMeu&&r.data>=h&&r.status!=="recusado"?`<button onclick="abrirEdicao('${r.id}')" style="background:none;border:none;color:${c.textMuted};cursor:pointer;font-size:13px;padding:5px 8px">✏️</button><button onclick="cancelarR('${r.id}')" style="background:none;border:none;color:${c.textMuted};cursor:pointer;font-size:13px;padding:5px 8px">✕</button>`:""}

}


function renderProfAgendar(){
  const c=C(),m=_MA;
  const titulos=["Selecione o espaço","Selecione a data","Preencha os horários"];
  let html="";

  if(m.sucesso){
    html+=`<div style="padding:20px 14px;text-align:center">
      <div style="width:64px;height:64px;border-radius:50%;background:${m.sucesso==="confirmado"?"#1a6b47":"#fff7ed"};color:${m.sucesso==="confirmado"?"#fff":"#7c2d12"};display:flex;align-items:center;justify-content:center;font-size:28px;margin:0 auto 16px">${m.sucesso==="confirmado"?"✓":"⏳"}</div>
      <h3 style="font-size:20px;font-weight:800;color:${m.sucesso==="confirmado"?c.green:c.amber};margin-bottom:8px">${m.sucesso==="confirmado"?"Confirmado!":"Pendente — aguardando aprovação"}</h3>
      <p style="font-size:13px;color:${c.textMuted};margin-bottom:20px">${m.espaco} · ${m.data.split("-").reverse().join("/")}</p>
      <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap">
        <button onclick="pSetModoProf('agendar')" style="${btn("success")};padding:10px 24px">＋ Novo agendamento</button>
        <button onclick="pSetModoProf('ver')" style="${btn("ghost")};padding:10px 24px">Ver agendamentos</button>
      </div>
    </div>`;
    return html;
  }

  if(m.resumo){ html+=renderMAResumo(); return html; }

  // Barra de progresso
  html+=`<div style="padding:16px 14px 0">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">
      ${m.step>1?`<button onclick="maBack()" style="background:none;border:1px solid ${c.border};border-radius:8px;width:32px;height:32px;cursor:pointer;color:${c.textMid};font-size:15px;font-family:inherit">‹</button>`:""}
      <div><p style="font-size:11px;color:${c.textMuted};font-weight:700;text-transform:uppercase">Passo ${m.step}/3</p><p style="font-size:16px;font-weight:800;color:${c.navy}">${titulos[m.step-1]}</p></div>
    </div>
    <div style="display:flex;gap:4px;margin-bottom:16px">
      ${[1,2,3].map(s=>`<div style="flex:1;height:3px;border-radius:2px;background:${m.step>=s?"#40b07a":c.borderLight};transition:background .3s"></div>`).join("")}
    </div>`;
  if(m.erro)html+=alertHTML("error",m.erro);

  if(m.step===1){
    ["espaco","laboratorio","equipamento"].forEach(tipo=>{
      const lbl={espaco:"🏛️ Espaços",laboratorio:"🔬 Laboratórios",equipamento:"💻 Equipamentos"}[tipo];
      html+=`<p style="font-size:11px;font-weight:700;color:${c.textMuted};text-transform:uppercase;margin:14px 0 8px">${lbl}</p><div style="display:grid;gap:8px">`;
      ESPACOS.filter(e=>e.tipo===tipo).forEach(e=>{
        const eidx=ESPACOS.indexOf(e);
        html+=`<button onclick="maEspaco(${eidx})" style="display:flex;align-items:center;gap:12px;padding:12px 16px;border-radius:10px;border:1.5px solid ${c.border};background:${c.surface};cursor:pointer;text-align:left;width:100%;font-family:inherit"><span style="font-size:20px">${tipoIcon(tipo)}</span><span style="font-size:14px;font-weight:700;color:${c.navy}">${e.nome}</span>${e.estoque?`<span style="font-size:11px;color:${c.textMuted};margin-left:auto">${e.estoque} disp.</span>`:""}</button>`;
      });
      html+=`</div>`;
    });
  }

  if(m.step===2){
    html+=`<div style="display:flex;align-items:center;gap:10px;padding:10px 14px;background:${c.greenBg};border-radius:10px;margin-bottom:16px;border:1px solid ${c.greenBorder}"><span style="font-size:18px">${tipoIcon(ESPACOS.find(e=>e.nome===m.espaco)?.tipo)}</span><span style="font-size:13px;font-weight:700;color:${c.green}">${m.espaco}</span><button onclick="maBack()" style="margin-left:auto;background:none;border:none;color:${c.textMuted};cursor:pointer;font-size:12px;font-family:inherit">Trocar</button></div>`;
    const porData={};_todas.filter(r=>r.espaco===m.espaco&&r.status!=="recusado").forEach(r=>{if(!porData[r.data])porData[r.data]=[];porData[r.data].push(r);});
    html+=calMensalHTML("pagin",m.calA,m.calM,porData,m.data);
    window._calClick=(cid,data)=>{
      if(cid==="pagin"){
        if(!isDiaLetivo(data)){alert("Este dia não é letivo.");return;}
        _MA.data=data;_MA.step=3;_MA.blocos=[bVazio()];re();
      } else if(cid==="ma"){
        if(!isDiaLetivo(data)){alert("Este dia não é letivo.");return;}
        _MA.data=data;_MA.step=3;_MA.blocos=[bVazio()];renderMA();
      } else {
        if(data>=fmtHoje()&&isDiaLetivo(data)&&_P.modoProf==="ver"){
          _P.modoProf="agendar";
          _MA={step:1,espaco:"",data:data,blocos:[bVazio()],resumo:false,salvando:false,sucesso:null,erro:"",calA:new Date().getFullYear(),calM:new Date().getMonth()};
          re();
        } else {
          _P.diaSel=_P.diaSel===data?null:data;re();
        }
      }
    };
    window._calNav=(cid,dir)=>{
      if(cid==="pagin"||cid==="ma"){
        let nm=_MA.calM+dir,na=_MA.calA;if(nm>11){nm=0;na++;}if(nm<0){nm=11;na--;}_MA.calM=nm;_MA.calA=na;re();
      } else {
        let nm=_P.mesCal.m+dir,na=_P.mesCal.a;if(nm>11){nm=0;na++;}if(nm<0){nm=11;na--;}_P.mesCal={a:na,m:nm};re();
      }
    };
  }

  if(m.step===3){
    html+=`<div style="background:linear-gradient(135deg,#1a6b47,#0f4c2b);padding:10px 14px;border-radius:10px;margin-bottom:14px"><p style="font-size:11px;color:rgba(255,255,255,.7);font-weight:700;text-transform:uppercase;margin-bottom:2px">Agendando em</p><p style="font-size:14px;font-weight:800;color:#fff">${tipoIcon(ESPACOS.find(e=>e.nome===m.espaco)?.tipo)} ${m.espaco} · ${m.data.split("-").reverse().join("/")}</p></div>`;
    if(isDiaUrgente(m.data))html+=alertHTML("warning","⚠️ Menos de 24h de antecedência. Contate o T.E. para garantir disponibilidade.");
    m.blocos.forEach((b,i)=>{html+=maBlocoHTML(b,i);});
    const ult=m.blocos[m.blocos.length-1];
    const eo=ESPACOS.find(e=>e.nome===m.espaco);
    const bVal=b=>b.horario&&b.turma&&b.conteudo&&(eo?.tipo!=="laboratorio"||b.laboratorista);
    const ultVal=bVal(ult),todosVal=m.blocos.every(bVal);
    if(m.blocos.length<HORARIOS.length)html+=`<button id="btn-add-inline" onclick="maAddBloco()" ${!ultVal?"disabled":""} style="${btn(ultVal?"success":"ghost",!ultVal)};width:100%;margin-top:10px;padding:11px;border:2px dashed ${ultVal?"#40b07a":"#cbd5e1"}">+ Agendar outra turma neste dia</button>`;
    html+=`<button id="btn-conf-inline" onclick="maConfirmar()" ${!todosVal?"disabled":""} style="${btn("success",!todosVal)};width:100%;margin-top:14px;padding:14px;font-size:15px;border-radius:12px">${todosVal?`Confirmar ${m.blocos.length} agendamento${m.blocos.length>1?"s":""}`:"Preencha todos os campos"}</button>`;
  }

  html+=`</div>`;
  return html;
}

function renderMA(){

        });
        body+=`</div>`;

function maBlocoHTML(b,i){
  const c=C(),m=_MA;
  const eo=ESPACOS.find(e=>e.nome===m.espaco);
  const isLab=eo?.tipo==="laboratorio",isEquip=eo?.tipo==="equipamento";
  const ocpFire=_todas.filter(r=>r.espaco===m.espaco&&r.data===m.data&&r.status!=="recusado").map(r=>r.horario);
  const ocpOut=m.blocos.filter((_,idx)=>idx!==i).map(b=>b.horario).filter(Boolean);
  const ocpTodos=[...new Set([...ocpFire,...ocpOut])];
  let slots=`<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-top:6px">`;
  HORARIOS.forEach(h=>{
    const ocp=ocpTodos.includes(h),sel=h===b.horario;
    slots+=`<button onclick="maSetHorario(${i},'${h}')" ${ocp?"disabled":""} style="padding:9px 4px;border-radius:8px;border:${sel?"2px solid "+c.blueMid:ocp?"1.5px solid "+c.redBorder:"1.5px solid "+c.greenBorder};background:${sel?c.greenBg:ocp?c.redBg:c.greenBg};color:${sel?c.blueMid:ocp?c.red:c.green};font-size:12px;font-weight:700;cursor:${ocp?"not-allowed":"pointer"};display:flex;flex-direction:column;align-items:center;gap:3px;font-family:'DM Mono',monospace">${h}<span style="font-size:8px;font-weight:600;font-family:inherit">${ocp?"● Ocup":sel?"✓ Sel":"○ Livre"}</span></button>`;
  });
  slots+=`</div>`;
  return`<div style="background:${c.bg};border:1.5px solid ${b.horario?c.blueMid+"55":c.border};border-radius:12px;padding:16px;margin-bottom:12px">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
      <div style="display:flex;align-items:center;gap:8px"><div style="width:24px;height:24px;border-radius:50%;background:${b.horario?"#40b07a":"#cbd5e1"};color:#fff;font-weight:800;font-size:12px;display:flex;align-items:center;justify-content:center">${i+1}</div><span style="font-size:13px;font-weight:700;color:${c.navy}">${b.horario?`Turma ${i+1} · ${b.horario}`:`Turma ${i+1}`}</span></div>
      ${i>0?`<button onclick="maRemBloco(${i})" style="background:none;border:none;color:#ef4444;cursor:pointer;font-size:18px">✕</button>`:""}
    </div>
    <div style="display:grid;gap:13px">
      <div><label style="font-size:12px;font-weight:700;color:${c.textMuted};text-transform:uppercase">Horário *</label>${slots}</div>
      ${isEquip?`<div><label style="font-size:12px;font-weight:700;color:${c.textMuted};text-transform:uppercase">Quantidade (máx ${eo.estoque}) *</label><br><input type="number" min="1" max="${eo.estoque}" value="${b.quantidade||1}" oninput="maSetBlocoRe(${i},'quantidade',this.value)" style="${inp()};width:140px;margin-top:5px"></div>`:""}
      ${isLab?`<div><label style="font-size:12px;font-weight:700;color:${c.textMuted};text-transform:uppercase">Laboratorista? *</label><div style="display:flex;gap:20px;margin-top:4px">${["Sim","Não"].map(op=>`<label style="display:flex;align-items:center;gap:7px;cursor:pointer;font-size:13.5px"><input type="radio" name="lab${i}" value="${op}" ${b.laboratorista===op?"checked":""} onchange="maSetBloco(${i},'laboratorista','${op}')">${op}</label>`).join("")}</div></div>`:""}
      <div><label style="font-size:12px;font-weight:700;color:${c.textMuted};text-transform:uppercase">Turma *</label><br><select onchange="maSetBlocoRe(${i},'turma',this.value)" style="${sel()};margin-top:5px"><option value="">Selecione...</option><optgroup label="Anos Iniciais">${TURMAS.filter(t=>parseInt(t)<=5).map(t=>`<option ${b.turma===t?"selected":""}>${t}</option>`).join("")}</optgroup><optgroup label="Anos Finais">${TURMAS.filter(t=>parseInt(t)>=6).map(t=>`<option ${b.turma===t?"selected":""}>${t}</option>`).join("")}</optgroup></select></div>
      <div><label style="font-size:12px;font-weight:700;color:${c.textMuted};text-transform:uppercase">Conteúdo da Aula *</label><br><textarea oninput="maSetBlocoRe(${i},'conteudo',this.value)" rows="2" placeholder="Descreva o conteúdo..." style="${inp()};resize:vertical;line-height:1.6;margin-top:5px">${b.conteudo}</textarea></div>
      <div><label style="font-size:12px;font-weight:700;color:${c.textMuted};text-transform:uppercase">Páginas do Livro</label><br><input value="${b.paginas}" oninput="maSetBlocoRe(${i},'paginas',this.value)" placeholder="Ex: pp. 45-62" style="${inp()};margin-top:5px"></div>
    </div>
  </div>`;
}

function renderMAResumo(){
  const c=C(),m=_MA;
  const[ano,mes,dia]=m.data.split("-");
  const dow=new Date(Date.UTC(+ano,+mes-1,+dia)).getUTCDay();
  const fimSem=dow===0||dow===6;
  const urgentes=m.blocos.filter(b=>isUrgente(m.data,b.horario));
  const precisaCiencia=urgentes.length>0||fimSem;
  let html=`<div style="padding:28px 20px">
    <div style="text-align:center;margin-bottom:20px"><div style="width:52px;height:52px;border-radius:50%;background:${precisaCiencia?"#fff7ed":"#e2f4ea"};display:flex;align-items:center;justify-content:center;font-size:24px;margin:0 auto 12px">${precisaCiencia?"⚠️":"📋"}</div><h3 style="font-size:17px;font-weight:800;color:${c.navy}">Revisar agendamento</h3></div>`;
  if(precisaCiencia)html+=`<div style="background:#fff7ed;border:1.5px solid #fed7aa;border-radius:10px;padding:10px 14px;margin-bottom:12px"><p style="font-size:12.5px;font-weight:800;color:#7c2d12">${fimSem?"⚠️ Agendamento fora do horário do T.E.":"⚠️ Menos de 24h de antecedência"}</p><p style="font-size:12px;color:#92400e;margin-top:5px;line-height:1.5">${fimSem?"Agendamento em fim de semana fica pendente até aprovação.":"Contate o T.E. para garantir disponibilidade."}</p></div>`;
  html+=`<div style="background:${c.bg};border-radius:10px;padding:12px 16px;margin-bottom:12px"><p style="font-size:11px;font-weight:700;color:${c.textMuted};text-transform:uppercase;margin-bottom:6px">Local e data</p><p style="font-size:14px;font-weight:700;color:${c.navy}">📍 ${m.espaco}</p><p style="font-size:13px;color:${c.textMid};margin-top:2px">📅 ${dia}/${mes}/${ano}</p></div>`;
  html+=`<div style="display:grid;gap:8px;margin-bottom:${precisaCiencia?16:20}px">`;
  m.blocos.forEach((b,i)=>{
    const isUrg=urgentes.includes(b);
    html+=`<div style="display:flex;gap:12px;align-items:flex-start;padding:10px 14px;background:${c.surface};border:1px solid ${isUrg?"#fed7aa":c.border};border-radius:8px;border-left:3px solid ${isUrg?"#f97316":"#40b07a"}"><div style="min-width:42px"><span style="font-family:'DM Mono',monospace;font-weight:800;color:${isUrg?"#c2410c":"#40b07a"};font-size:13px">${b.horario}</span>${isUrg?`<p style="font-size:9px;color:#c2410c;font-weight:700">urgente</p>`:""}</div><div><p style="font-size:13px;font-weight:700;color:${c.navy}">${b.turma}</p><p style="font-size:12px;color:${c.textMuted};margin-top:2px">${b.conteudo}</p></div></div>`;
  });
  html+=`</div>`;
  if(precisaCiencia)html+=`<label style="display:flex;align-items:flex-start;gap:10px;margin-bottom:18px;cursor:pointer;padding:12px 14px;background:${c.surface};border:1.5px solid ${c.border};border-radius:10px"><input type="checkbox" id="chk-ciente" onchange="$('btn-conf').disabled=!this.checked;$('btn-conf').style.background=this.checked?'#1a6b47':'#cbd5e1'" style="width:18px;height:18px;margin-top:1px;accent-color:#1a6b47;flex-shrink:0;cursor:pointer"><span style="font-size:12px;color:${c.navy};line-height:1.5">${fimSem?"Estou ciente: agendamento em fim de semana fica pendente até aprovação do administrador.":"Estou ciente de que este agendamento tem menos de 24h. Entrarei em contato com o T.E. para garantir disponibilidade."}</span></label>`;
  html+=`<div style="display:flex;gap:10px"><button onclick="_MA.resumo=false;renderMA()" style="${btn("ghost")};flex:1;padding:11px">← Revisar</button><button id="btn-conf" onclick="maSalvar()" ${precisaCiencia?"disabled":""} style="${btn("success",precisaCiencia)};flex:2;padding:11px;font-size:13.5px">${m.salvando?"Salvando...":"✓ Confirmar"}</button></div></div>`;
  return html;
}

window.maEspaco=v=>{
  // Aceita índice numérico ou string
  _MA.espaco = (typeof v==="number"||(!isNaN(v)&&v!=="")) ? ESPACOS[parseInt(v)].nome : v;
  _MA.step=2;
  if(_P.modoProf==="agendar"){re();}else{renderMA();}
};
window.maBack=()=>{if(_MA.step===3){_MA.data="";_MA.blocos=[bVazio()];}else if(_MA.step===2)_MA.espaco="";_MA.step--;if(_P.modoProf==="agendar"){re();}else{renderMA();}};
window.maSetHorario=(i,h)=>{_MA.blocos[i].horario=h;if(_P.modoProf==="agendar"){re();}else{renderMA();}};
window.maSetBloco=(i,k,v)=>{_MA.blocos[i][k]=v;};
window.maSetBlocoRe=(i,k,v)=>{
  _MA.blocos[i][k]=v;
  // Revalidar sem re-renderizar tudo — só atualizar botões de confirmar
  const eo=ESPACOS.find(e=>e.nome===_MA.espaco);
  const bVal=b=>b.horario&&b.turma&&b.conteudo&&(eo?.tipo!=="laboratorio"||b.laboratorista);
  const todosVal=_MA.blocos.every(bVal);
  const ultVal=bVal(_MA.blocos[_MA.blocos.length-1]);
  // Atualizar botão confirmar
  const btnConf=document.getElementById("btn-conf-inline");
  if(btnConf){btnConf.disabled=!todosVal;btnConf.style.background=todosVal?"#40b07a":"#cbd5e1";btnConf.style.color=todosVal?"#fff":"#94a3b8";btnConf.textContent=todosVal?`Confirmar ${_MA.blocos.length} agendamento${_MA.blocos.length>1?"s":""}`:"Preencha todos os campos";}
  const btnAdd=document.getElementById("btn-add-inline");
  if(btnAdd){btnAdd.disabled=!ultVal;btnAdd.style.borderColor=ultVal?"#40b07a":"#cbd5e1";btnAdd.style.color=ultVal?"#40b07a":"#cbd5e1";}
};
window.maAddBloco=()=>{_MA.blocos.push(bVazio());if(_P.modoProf==="agendar"){re();}else{renderMA();}};
window.maRemBloco=i=>{_MA.blocos.splice(i,1);if(_P.modoProf==="agendar"){re();}else{renderMA();}};
window.maConfirmar=()=>{_MA.resumo=true;if(_P.modoProf==="agendar"){re();}else{renderMA();}};
window.maSalvar=async()=>{
  _MA.salvando=true;_MA.erro="";renderMA();
  const{espaco,data,blocos}=_MA;
  try{
    for(const b of blocos){
      const snap=await getDocs(query(collection(db,"reservas"),where("espaco","==",espaco),where("data","==",data),where("horario","==",b.horario)));
      const existe=snap.docs.map(d=>d.data()).find(r=>r?.status!=="recusado");
      if(existe){_MA.erro=`Horário ${b.horario} já reservado por ${existe.professor}.`;_MA.salvando=false;_MA.resumo=false;if(_P.modoProf==="agendar"){re();}else{renderMA();}return;}
    }
    const eo=ESPACOS.find(e=>e.nome===espaco);
    let algPend=false;
    for(const b of blocos){
      const urg=isUrgente(data,b.horario);
      const[a,m,d]=data.split("-").map(Number);
      const dow=new Date(Date.UTC(a,m-1,d)).getUTCDay();
      const st=(urg||dow===0||dow===6)?"pendente":"confirmado";
      if(st==="pendente")algPend=true;
      await addDoc(collection(db,"reservas"),{professor:_usuario.nome,professorId:_usuario.uid,professorEmail:_usuario.email,turma:b.turma,espaco,data,horario:b.horario,conteudo:b.conteudo,paginas:b.paginas||"",laboratorista:b.laboratorista||"",quantidade:eo?.tipo==="equipamento"?Number(b.quantidade):null,status:st,criadoEm:Timestamp.now()});
    }
    _MA.sucesso=algPend?"pendente":"confirmado";_MA.salvando=false;if(_P.modoProf==="agendar"){re();}else{renderMA();};
  }catch(e){_MA.erro="Erro ao salvar. Tente novamente.";_MA.salvando=false;_MA.resumo=false;if(_P.modoProf==="agendar"){re();}else{renderMA();};}
};

window.salvarED=async()=>{

        </div>
        <div style="display:flex;flex-direction:column;gap:2px">
          ${urg.slice(0,1).map(r=>`<div style="background:#fff7ed;border:1px solid #f97316;border-radius:4px;padding:2px 5px;font-size:9px;font-weight:700;color:#c2410c;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">⚡${r.horario} ${r.espaco.split(" ")[0]}</div>`).join("")}
          ${pend.slice(0,1).map(r=>`<div style="background:${c.amberBg};border:1px solid ${c.amberBorder};border-radius:4px;padding:2px 5px;font-size:9px;font-weight:700;color:${c.amber};white-space:nowrap;overflow:hidden;text-overflow:ellipsis">⏳${r.horario} ${r.espaco.split(" ")[0]}</div>`).join("")}
          ${conf.slice(0,2).map(r=>`<div style="background:${c.greenBg};border:1px solid ${c.greenBorder};border-radius:4px;padding:2px 5px;font-size:9px;font-weight:600;color:${c.green};white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${r.horario} ${r.espaco.split(" ")[0]}</div>`).join("")}
          ${rsdia.length>3?`<div style="font-size:9px;color:${c.blueMid};font-weight:700;padding-left:2px">+${rsdia.length-3} mais</div>`:""}
        </div>
      </div>`;
    });
    html+=`</div></div>`;

    // Legenda + detalhe dia
    html+=`<div style="display:flex;gap:16px;margin-top:10px;flex-wrap:wrap;align-items:center">${[{l:"Urgente",bg:"#fff7ed",b:"#f97316"},{l:"Pendente",bg:c.amberBg,b:c.amberBorder},{l:"Confirmado",bg:c.greenBg,b:c.greenBorder}].map(l=>`<div style="display:flex;align-items:center;gap:5px"><div style="width:14px;height:14px;border-radius:3px;background:${l.bg};border:1.5px solid ${l.b}"></div><span style="font-size:11.5px;color:${c.textMuted};font-weight:600">${l.l}</span></div>`).join("")}<span style="margin-left:auto;font-size:11px;color:${c.textMuted}">Clique no dia para detalhes</span></div>`;

    if(_A.diaSel){
      const[a2,m2,d2]=_A.diaSel.split("-");
      const rsdia=(porData[_A.diaSel]||[]).sort((a,b)=>a.horario>b.horario?1:-1);
      html+=`<div class="fade-in" style="margin-top:16px;background:${c.surface};border-radius:14px;border:1px solid ${c.border};overflow:hidden;box-shadow:${c.cardShadow}">
        <div style="background:linear-gradient(135deg,#1a6b47,#0f4c2b);padding:12px 18px;display:flex;align-items:center;justify-content:space-between">
          <div><p style="font-size:11px;color:rgba(255,255,255,.75);font-weight:700;text-transform:uppercase">Agendamentos do dia</p><p style="font-size:16px;font-weight:800;color:#fff;margin-top:2px">📅 ${d2}/${m2}/${a2}</p></div>
          <button onclick="_A.diaSel=null;re()" style="background:rgba(255,255,255,.2);border:none;border-radius:8px;color:#fff;font-size:13px;font-weight:700;padding:5px 12px;cursor:pointer">✕ Fechar</button>
        </div>
        <div style="padding:14px 18px">
          ${!rsdia.length?`<p style="font-size:13px;color:${c.textMuted};text-align:center;padding:16px 0">🎉 Nenhum agendamento neste dia.</p>`:rsdia.map(r=>admRow(r)).join("")}
        </div>
      </div>`;
    }
  }

  // MODO AGENDA
  if(_A.modoVisu==="agenda"){
    const urg=filtradas.filter(r=>r.status==="pendente"&&isUrgente(r.data,r.horario));
    const pend=filtradas.filter(r=>r.status==="pendente"&&!isUrgente(r.data,r.horario));
    const conf=filtradas.filter(r=>r.status!=="pendente"&&(_A.historico||r.data>=h));

    html+=`<div style="display:flex;gap:2px;margin-bottom:18px;background:${c.surface};border-radius:10px;padding:4px;border:1px solid ${c.border};width:fit-content">
      ${[{id:"reservas",l:"📋 Reservas"},{id:"espacos",l:"🏛️ Por Espaço"},{id:"turma",l:"🎓 Por Turma"}].map(t=>`<button onclick="aSetAba('${t.id}')" style="${btn(_A.aba===t.id?"navy":"ghost")};padding:7px 15px;font-size:12.5px;white-space:nowrap">${t.l}</button>`).join("")}
    </div>`;

    if(_A.aba==="reservas"){
      if(urg.length){
        html+=`<div style="margin-bottom:18px"><div style="display:flex;align-items:center;gap:8px;margin-bottom:10px"><div style="width:8px;height:8px;border-radius:50%;background:#f97316"></div><p style="font-size:12px;font-weight:800;color:#c2410c;text-transform:uppercase">⚡ Curto prazo · ${urg.length}</p><div style="flex:1;height:1px;background:#fed7aa"></div></div>`;
        urg.sort((a,b)=>a.data>b.data?1:a.data<b.data?-1:a.horario>b.horario?1:-1).forEach(r=>{html+=admRow(r,true);});
        html+=`</div>`;
      }
      if(pend.length){
        html+=`<div style="margin-bottom:18px"><div style="display:flex;align-items:center;gap:8px;margin-bottom:10px"><div style="width:8px;height:8px;border-radius:50%;background:#d97706"></div><p style="font-size:12px;font-weight:800;color:${c.amber};text-transform:uppercase">Pendentes · ${pend.length}</p><div style="flex:1;height:1px;background:${c.amberBorder}"></div></div>`;
        pend.sort((a,b)=>a.data>b.data?1:a.data<b.data?-1:a.horario>b.horario?1:-1).forEach(r=>{html+=admRow(r,true);});
        html+=`</div>`;
      }
      if(conf.length){
        const pd={};conf.sort((a,b)=>a.data>b.data?1:a.data<b.data?-1:a.horario>b.horario?1:-1).forEach(r=>{if(!pd[r.data])pd[r.data]=[];pd[r.data].push(r);});
        html+=`<div><div style="display:flex;align-items:center;gap:8px;margin-bottom:12px"><div style="width:8px;height:8px;border-radius:50%;background:${c.green}"></div><p style="font-size:12px;font-weight:800;color:${c.green};text-transform:uppercase">Confirmados · ${conf.length}</p><div style="flex:1;height:1px;background:${c.greenBorder}"></div></div>`;
        Object.entries(pd).forEach(([data,rs])=>{
          const[a2,m2,d2]=data.split("-");const isH=data===h,isFut=data>=h;
          html+=`<div style="margin-bottom:14px"><div style="display:flex;align-items:center;gap:10px;margin-bottom:8px"><div style="background:${isH?"#40b07a":isFut?c.navy:c.textMuted};color:#fff;border-radius:7px;padding:3px 12px;font-size:11.5px;font-weight:700;white-space:nowrap">${isH?"📌 Hoje":`${d2}/${m2}/${a2}`}</div><div style="flex:1;height:1px;background:${c.borderLight}"></div></div>`;
          rs.forEach(r=>{html+=admRow(r);});
          html+=`</div>`;
        });
        html+=`</div>`;
      }
      if(!urg.length&&!pend.length&&!conf.length)html+=`<p style="text-align:center;padding:32px;color:${c.textMuted};font-size:13px">Nenhuma reserva encontrada.</p>`;
    }

    if(_A.aba==="espacos"){
      ESPACOS.filter(e=>!_A.fEspaco||e.nome===_A.fEspaco).forEach(esp=>{
        const rs=filtradas.filter(r=>r.espaco===esp.nome&&r.status!=="recusado").sort((a,b)=>a.data>b.data?1:a.data<b.data?-1:a.horario>b.horario?1:-1);
        if(!rs.length)return;
        const pd={};rs.forEach(r=>{if(!pd[r.data])pd[r.data]=[];pd[r.data].push(r);});
        const livresHj=HORARIOS.length-rs.filter(r=>r.data===h).length;
        html+=`<div style="margin-bottom:16px;border-radius:12px;border:1px solid ${c.border};overflow:hidden">
          <div style="background:linear-gradient(135deg,${c.navy},${c.navyMid});padding:12px 18px;display:flex;align-items:center;justify-content:space-between">
            <div style="display:flex;align-items:center;gap:10px"><span style="font-size:18px">${tipoIcon(esp.tipo)}</span><div><p style="font-size:14px;font-weight:800;color:#fff">${esp.nome}</p><p style="font-size:11px;color:rgba(255,255,255,.65)">${rs.length} reserva${rs.length!==1?"s":""}</p></div></div>
            <div style="text-align:right"><p style="font-size:20px;font-weight:900;color:#fff;line-height:1">${livresHj}</p><p style="font-size:10px;color:rgba(255,255,255,.7);font-weight:700">livres hoje</p></div>
          </div>
          <div style="background:${c.surface};padding:10px 16px">`;
        Object.entries(pd).forEach(([data,drs])=>{
          const[a2,m2,d2]=data.split("-");const isH=data===h;
          html+=`<p style="font-size:11px;font-weight:700;color:${isH?"#40b07a":c.textMuted};font-family:'DM Mono',monospace;margin-bottom:6px">${isH?"📌 Hoje":`${d2}/${m2}/${a2}`}</p><div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px">`;
          drs.forEach(r=>{html+=`<div style="background:${c.bg};border:1px solid ${c.border};border-radius:8px;padding:6px 12px;font-size:12px;display:flex;align-items:center;gap:8px"><span style="font-weight:800;color:${c.blueMid};font-family:'DM Mono',monospace">${r.horario}</span><span style="color:${c.textMid};font-weight:600">${r.professor.split(" ")[0]}</span><span style="color:${c.textMuted}">${r.turma}</span>${badge(r.status)}</div>`;});
          html+=`</div>`;
        });
        html+=`</div></div>`;
      });
    }

    if(_A.aba==="turma"){
      const turmas=[...new Set(filtradas.map(r=>r.turma))].filter(Boolean).sort();
      turmas.forEach(turma=>{
        const rs=filtradas.filter(r=>r.turma===turma&&r.status!=="recusado").sort((a,b)=>a.data>b.data?1:a.data<b.data?-1:a.horario>b.horario?1:-1);
        if(!rs.length)return;
        html+=`<div style="margin-bottom:14px;border-radius:12px;border:1px solid ${c.border};overflow:hidden"><div style="background:${c.surface};padding:10px 16px;border-bottom:1px solid ${c.border};display:flex;align-items:center;gap:10px"><span style="font-size:16px">🎓</span><p style="font-size:14px;font-weight:800;color:${c.navy}">${turma}</p><span style="font-size:12px;color:${c.textMuted}">${rs.length} reserva${rs.length!==1?"s":""}</span></div><div style="padding:10px 16px">`;
        rs.forEach(r=>{html+=admRow(r,true);});
        html+=`</div></div>`;
      });
    }
  }

  html+=`</div>`;
  return html;
}

function admRow(r,showDate=false){
  const c=C(),h=fmtHoje();
  const urg=isUrgente(r.data,r.horario);
  const bc=r.status==="confirmado"?"#1a6b47":r.status==="pendente"?"#d97706":"#dc2626";
  const[a2,m2,d2]=r.data.split("-");
  const ex=extraInfo(r);
  return`<div class="row-hover" style="display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:10px;margin-bottom:6px;background:${urg?"#fff7ed":r.data===h?"rgba(26,107,71,.05)":c.surface};border:1px solid ${urg?"#f97316":r.data===h?"#40b07a44":c.border};border-left:4px solid ${urg?"#f97316":bc}">
    <div style="min-width:52px;flex-shrink:0;text-align:center"><p style="font-size:13px;font-family:'DM Mono',monospace;font-weight:800;color:${urg?"#c2410c":c.blueMid}">${r.horario}</p>${showDate?`<p style="font-size:10px;color:${c.textMuted};margin-top:1px">${d2}/${m2}</p>`:""}</div>
    <div style="width:1px;height:38px;background:${c.borderLight};flex-shrink:0"></div>
    <div style="flex:1;min-width:0">
      <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:3px">
        <span style="font-weight:700;font-size:13px;color:${c.navy}">${r.espaco}</span>
        <span style="font-size:11px;color:${c.textMuted}">·</span>
        <span style="font-size:12.5px;color:${c.textMid};font-weight:600">${r.professor}</span>
        <span style="font-size:11px;color:${c.textMuted}">·</span>
        <span style="font-size:12px;color:${c.textMuted}">${r.turma}</span>
      </div>
      <div style="display:flex;align-items:center;gap:7px;flex-wrap:wrap">
        ${badge(r.status)}
        ${urg?`<span style="font-size:10.5px;font-weight:800;background:#fff7ed;color:#c2410c;border:1.5px solid #f97316;padding:1px 8px;border-radius:10px">⚡ URGENTE</span>`:""}
        ${r.conteudo?`<span style="font-size:11.5px;color:${c.textMuted};overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:180px">${r.conteudo}</span>`:""}
        ${ex?`<span style="font-size:11px;color:${c.textMuted};background:${c.bg};padding:1px 7px;border-radius:10px;border:1px solid ${c.border}">${ex}</span>`:""}
      </div>
    </div>
    <div style="display:flex;gap:5px;flex-shrink:0;align-items:center">
      <button onclick="abrirEdicao('${r.id}')" style="background:none;border:none;color:${c.textMuted};cursor:pointer;font-size:13px;padding:5px 8px">✏️</button>
      ${r.status==="pendente"?`<button onclick="aModerar('${r.id}','confirmado')" style="${btn("success","","sm")}">✓ Aprovar</button><button onclick="aModerar('${r.id}','recusado')" style="${btn("danger","","sm")}">✗</button>`:""}
      ${r.status==="confirmado"?`<button onclick="aModerar('${r.id}','recusado')" style="${btn("danger","","sm")}">✕ Cancelar</button>`:""}
      <button onclick="aExcluir('${r.id}')" style="background:none;border:none;color:${c.textMuted};cursor:pointer;font-size:13px;padding:4px">🗑</button>
    </div>
  </div>`;
}

function modalGerenciarHTML(){const c=C();return`<div id="mod-gu" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);align-items:center;justify-content:center;z-index:1000;padding:1rem"><div style="background:${c.surface};border-radius:16px;width:100%;max-width:900px;max-height:90vh;overflow-y:auto;box-shadow:0 24px 60px rgba(0,0,0,.3)"><div style="display:flex;align-items:center;justify-content:space-between;padding:18px 24px;border-bottom:1px solid ${c.border}"><p style="font-size:16px;font-weight:800;color:${c.navy}">👤 Gerenciar Usuários</p><button onclick="fecharGerenciarUsuarios()" style="background:none;border:none;font-size:20px;cursor:pointer;color:${c.textMuted}">✕</button></div><div id="mod-gu-body" style="padding:20px 24px"></div></div></div>`;}

let _GU={nome:"",email:"",senha:"",editId:null,editNome:"",flash:null};

window.fecharGerenciarUsuarios=()=>{$("mod-gu").style.display="none";};

function renderGU(){
  const c=C();
  const profs=_usuarios.filter(u=>u.perfil!=="admin");
  const admins=_usuarios.filter(u=>u.perfil==="admin");
  let html="";
  if(_GU.flash){html+=alertHTML(_GU.flash.t,_GU.flash.m);_GU.flash=null;}

    <div><label style="font-size:11px;font-weight:700;color:${c.textMuted};text-transform:uppercase">E-mail *</label><br><input id="gu-email" type="email" placeholder="prof@escola.edu.br" value="${_GU.email}" onchange="_GU.email=this.value" style="${inp()};margin-top:5px"></div>
    <div><label style="font-size:11px;font-weight:700;color:${c.textMuted};text-transform:uppercase">Senha *</label><br><input id="gu-senha" type="password" placeholder="Mín. 6 caracteres" value="${_GU.senha}" onchange="_GU.senha=this.value" style="${inp()};margin-top:5px"></div>
    <button onclick="guCriar()" style="${btn("navy")};height:42px;white-space:nowrap">+ Cadastrar</button>
  </div>
  <p style="font-size:11.5px;color:${c.textMuted};margin-bottom:20px">💡 Informe a senha ao professor. Ele pode alterá-la via "Esqueci minha senha".</p>`;
  html+=`<p style="font-size:13px;font-weight:800;color:${c.navy};margin-bottom:14px;text-transform:uppercase">Professores (${profs.length})</p>`;
  if(!profs.length)html+=`<p style="font-size:13px;color:${c.textMuted};text-align:center;padding:24px 0">Nenhum professor cadastrado.</p>`;
  else{
    html+=`<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:13px"><thead><tr style="background:${c.bg}">${["Professor","E-mail","Status","Ações"].map(h=>`<th style="padding:9px 14px;text-align:left;color:${c.textMuted};font-weight:700;border-bottom:2px solid ${c.border};font-size:11px;text-transform:uppercase">${h}</th>`).join("")}</tr></thead><tbody>`;
    profs.forEach((u,i)=>{
      const td=`padding:10px 14px;border-bottom:1px solid ${c.borderLight};color:${c.textMid}`;
      html+=`<tr style="background:${i%2===0?c.surface:c.bg}">
        <td style="${td}">${_GU.editId===u.id?`<div style="display:flex;gap:6px;align-items:center"><input id="gu-en" value="${_GU.editNome}" onchange="_GU.editNome=this.value" style="${inp()};padding:6px 10px;font-size:12px;width:170px"><button onclick="guSalvarEdit()" style="${btn("success","","sm")}">Salvar</button><button onclick="_GU.editId=null;renderGU()" style="${btn("ghost","","sm")}">✕</button></div>`:`<div style="display:flex;align-items:center;gap:8px">${avatarHTML(u.nome,28)} <span style="font-weight:600;color:${c.navy}">${u.nome}</span></div>`}</td>
        <td style="${td};font-family:'DM Mono',monospace;font-size:12px">${u.email}</td>
        <td style="${td}"><span style="font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;background:${u.ativo!==false?c.greenBg:c.redBg};color:${u.ativo!==false?c.green:c.red}">${u.ativo!==false?"● Ativo":"○ Inativo"}</span></td>
        <td style="${td}"><div style="display:flex;gap:5px;flex-wrap:wrap">
          ${_GU.editId!==u.id?`<button onclick="_GU.editId='${u.id}';_GU.editNome='${u.nome.replace(/'/g,"\\'")}';renderGU()" style="${btn("ghost","","sm")}">✏️ Editar</button>`:""}
          <button onclick="guToggle('${u.id}','${u.nome.replace(/'/g,"\\'")}',${u.ativo!==false})" style="${btn("ghost","","sm")};color:${u.ativo!==false?c.amber:c.green};border-color:${u.ativo!==false?c.amberBorder:c.greenBorder};background:${u.ativo!==false?c.amberBg:c.greenBg}">${u.ativo!==false?"🔒 Desativar":"🔓 Ativar"}</button>
          <button onclick="guSenha('${u.email}')" style="${btn("ghost","","sm")}">🔑 Senha</button>
        </div></td>
      </tr>`;

  if(admins.length){
    html+=`<div style="margin-top:16px;background:${c.surface};border-radius:12px;border:1px solid ${c.border};padding:16px"><p style="font-size:12px;font-weight:700;color:#6d28d9;margin-bottom:10px;text-transform:uppercase">Administradores</p>`;
    admins.forEach(u=>{html+=`<div style="display:flex;align-items:center;gap:10px;padding:6px 0">${avatarHTML(u.nome,28,"purple")}<span style="font-size:13px;font-weight:600;color:${c.navy}">${u.nome}</span><span style="font-size:12px;color:${c.textMuted};font-family:'DM Mono',monospace">${u.email}</span></div>`;});
    html+=`</div>`;
  }
  render("mod-gu-body",html);
}

window.guCriar=async()=>{
  const{nome,email,senha}=_GU;
  if(!nome||!email||senha.length<6){_GU.flash={t:"error",m:"Preencha todos os campos (senha mín. 6 chars)."};renderGU();return;}
  try{
    const cred=await createUserWithEmailAndPassword(secAuth,email,senha);
    await secAuth.signOut();
    await setDoc(doc(db,"usuarios",cred.user.uid),{nome,email,perfil:email===ADMIN_EMAIL?"admin":"professor",ativo:true,criadoEm:Timestamp.now()});
    _GU.nome="";_GU.email="";_GU.senha="";
    _GU.flash={t:"success",m:`Prof(a) ${nome} cadastrado(a)!`};
    renderGU();
  }catch(e){_GU.flash={t:"error",m:e.code==="auth/email-already-in-use"?"E-mail já cadastrado.":"Erro ao cadastrar."};renderGU();}
};
window.guSalvarEdit=async()=>{

  _GU.editId=null;_GU.flash={t:"success",m:"Nome atualizado!"};renderGU();
};
window.guToggle=async(id,nome,ativo)=>{
  if(!confirm(`${ativo?"Desabilitar":"Habilitar"} ${nome}?`))return;
  await updateDoc(doc(db,"usuarios",id),{ativo:!ativo});
};
window.guSenha=async email=>{
  if(!confirm(`Enviar redefinição de senha para ${email}?`))return;
  try{await sendPasswordResetEmail(auth,email);_GU.flash={t:"success",m:`Link enviado para ${email}`};}
  catch{_GU.flash={t:"error",m:"Erro ao enviar."};}
  renderGU();
};

// ════════════════════════════════════════════════════════════════════════════
// FIREBASE LISTENERS
// ════════════════════════════════════════════════════════════════════════════
function startListeners(uid){
  _unsub1=onSnapshot(collection(db,"reservas"),snap=>{
    _todas=snap.docs.map(d=>({id:d.id,...d.data()})).filter(r=>r&&r.professor&&r.data&&r.horario);
    re();
  });
  _unsub2=onSnapshot(query(collection(db,"reservas"),where("professorId","==",uid)),snap=>{
    _minhas=snap.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>a.data>b.data?1:-1);
    re();
  });
  _unsub3=onSnapshot(collection(db,"usuarios"),snap=>{
    _usuarios=snap.docs.map(d=>({id:d.id,...d.data()})).filter(u=>u.ativo!==false);
    re();
  });
}
function stopListeners(){[_unsub1,_unsub2,_unsub3].forEach(u=>{try{u&&u();}catch{}});_unsub1=_unsub2=_unsub3=null;}

// ════════════════════════════════════════════════════════════════════════════
// AUTH
// ════════════════════════════════════════════════════════════════════════════
onAuthStateChanged(auth,async user=>{
  stopListeners();
  _todas=[];_minhas=[];_usuarios=[];
  if(user){
    try{
      const snap=await getDoc(doc(db,"usuarios",user.uid));
      _usuario=snap.exists()?{uid:user.uid,...snap.data()}:{uid:user.uid,email:user.email,perfil:"sem_acesso",ativo:false};
    }catch{_usuario={uid:user.uid,email:user.email,perfil:"sem_acesso",ativo:false};}
    if(_usuario.perfil!=="sem_acesso"&&_usuario.ativo!==false)startListeners(user.uid);
    else re();
  }else{
    _usuario=null;
    // Reservas públicas
    _unsub1=onSnapshot(collection(db,"reservas"),snap=>{
      _todas=snap.docs.map(d=>({id:d.id,...d.data()})).filter(r=>r&&r.professor&&r.data&&r.horario);
      re();
    });
    re();
  }
});
</script>
